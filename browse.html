<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustara — Find your barber</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#141414">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#F8F7F4; --surface:#FFFFFF; --surface-alt:#F1EFEA; --line:#ECE8E2;
    --ink:#111111; --ink-dim:#6F6F6F; --gold:#B88A2A; --gold-soft:#D4A94A;
    --success:#1FA971; --success-bg:#E4F5EE; --warning:#E8A63B; --danger:#E05252;
    --r-card:24px; --r-btn:20px; --r-input:18px;
    --sh-soft:0 20px 50px rgba(17,17,17,0.06), 0 4px 12px rgba(17,17,17,0.04);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden; height:100vh;
    display:flex; flex-direction:column;
  }
  a{ color:inherit; text-decoration:none; }
  .serif{ font-family:'Instrument Serif', serif; font-style:italic; }

  /* ================= NAV / SEARCH BAR ================= */
  nav{
    border-bottom:1px solid var(--line); background:var(--surface); z-index:60; flex-shrink:0;
  }
  .nav-inner{
    max-width:1400px; margin:0 auto; padding:14px 20px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .logo{ font-family:'Instrument Serif', serif; font-style:italic; font-size:22px; flex-shrink:0; margin-right:6px; }
  .logo em{ font-style:normal; color:var(--gold); }

  .search-group{ display:flex; gap:8px; flex:1; min-width:0; flex-wrap:wrap; }
  .search-box{
    display:flex; align-items:center; gap:9px; background:var(--surface-alt); border:1px solid var(--line);
    border-radius:var(--r-btn); padding:12px 16px; flex:1.2; min-width:170px; position:relative;
  }
  .search-box svg{ opacity:0.45; flex-shrink:0; }
  .search-box input{
    background:none; border:none; outline:none; color:var(--ink); font-size:13.5px; width:100%;
    font-family:'Inter', sans-serif;
  }
  .search-box input::placeholder{ color:#A39A8B; }
  .loc-box{ flex:1; min-width:160px; }
  .loc-clear{
    background:none; border:none; color:var(--ink-dim); cursor:pointer; font-size:15px;
    display:none; padding:0 2px; flex-shrink:0;
  }
  .loc-box.has-value .loc-clear{ display:block; }

  .search-btn{
    background:#141414; color:var(--gold-soft); border:none; border-radius:var(--r-btn); padding:12px 24px;
    font-size:13px; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer;
    font-family:'Inter', sans-serif; flex-shrink:0; transition:background .15s;
  }
  .search-btn:hover{ background:#000; }

  .lang-switch{ display:flex; border:1px solid var(--line); border-radius:20px; padding:3px; flex-shrink:0; }
  .lang-switch button{
    background:none; border:none; color:var(--ink-dim); font-family:'Inter', sans-serif;
    font-size:11.5px; font-weight:600; padding:6px 10px; border-radius:16px; cursor:pointer;
  }
  .lang-switch button.active{ background:#141414; color:var(--gold-soft); }

  /* location suggestions dropdown */
  .suggestions{
    position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--surface);
    border:1px solid var(--line); border-radius:16px; box-shadow:var(--sh-soft);
    overflow:hidden; display:none; z-index:100; max-height:280px; overflow-y:auto;
  }
  .suggestions.open{ display:block; }
  .suggestion{
    padding:12px 16px; cursor:pointer; font-size:13.5px; border-bottom:1px solid var(--line);
  }
  .suggestion:last-child{ border-bottom:none; }
  .suggestion:hover, .suggestion.kb-active{ background:var(--surface-alt); }
  .suggestion .s-main{ font-weight:600; }
  .suggestion .s-sub{ font-size:11.5px; color:var(--ink-dim); margin-top:1px; }

  /* ================= LAYOUT ================= */
  .content{ flex:1; display:flex; min-height:0; max-width:1400px; margin:0 auto; width:100%; }
  .list-panel{
    width:440px; flex-shrink:0; overflow-y:auto; padding:18px 18px 90px;
    border-right:1px solid var(--line); background:var(--bg);
  }
  .map-panel{ flex:1; position:relative; }
  #mapEl{ width:100%; height:100%; }

  .results-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; padding:0 2px; }
  .results-count{
    font-size:13px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim);
  }
  .chips-scroll{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; margin-bottom:6px; scrollbar-width:none; }
  .chips-scroll::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; border:1px solid var(--line); color:var(--ink-dim); padding:9px 15px; border-radius:20px;
    font-size:12px; cursor:pointer; background:var(--surface); white-space:nowrap; font-weight:600;
  }
  .chip.selected{ background:#141414; border-color:#141414; color:var(--gold-soft); font-weight:700; }

  /* ================= BARBER CARD ================= */
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:14px;
    margin-bottom:14px; cursor:pointer; transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    box-shadow:var(--sh-soft); position:relative;
  }
  .card:hover, .card.highlighted{ border-color:var(--gold); transform:translateY(-2px); }
  .fav-btn{
    position:absolute; top:14px; right:14px; z-index:5; width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,0.9); border:1px solid var(--line); cursor:pointer; font-size:16px;
    color:var(--ink-dim); display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .fav-btn.favorited{ color:var(--danger); border-color:#F3CFCF; }

  .card-photos{ display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; margin-bottom:12px; }
  .card-photos .ph{
    aspect-ratio:1; border-radius:14px; overflow:hidden; background:var(--surface-alt);
    display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-style:italic; color:var(--gold); font-size:22px;
  }
  .card-photos .ph img{ width:100%; height:100%; object-fit:cover; }

  .card-id-row{ display:flex; align-items:center; gap:11px; margin-bottom:10px; }
  .card-avatar{
    width:44px; height:44px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--surface-alt);
    display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-style:italic; color:var(--gold); font-size:15px;
    border:1px solid var(--line);
  }
  .card-who{ flex:1; min-width:0; }
  .card-name{ font-weight:700; font-size:15px; }
  .card-sub{ font-size:11.5px; color:var(--ink-dim); }
  .card-right{ text-align:right; flex-shrink:0; }
  .card-price{ font-size:13px; font-weight:800; color:var(--gold); }
  .card-dist{ font-size:11px; color:var(--ink-dim); }

  .avail-row{ display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; scrollbar-width:none; }
  .avail-row::-webkit-scrollbar{ display:none; }
  .avail-day{ flex-shrink:0; text-align:center; width:40px; }
  .avail-day .d-label{ font-size:9.5px; color:var(--ink-dim); text-transform:uppercase; font-weight:600; margin-bottom:3px; }
  .avail-day .d-num{
    width:32px; height:32px; margin:0 auto; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:600; border:1.5px solid var(--line); color:var(--ink-dim);
  }
  .avail-day.open .d-num{ border-color:var(--gold); color:var(--gold); }

  .book-btn{
    width:100%; background:#141414; color:var(--gold-soft); border:none; border-radius:var(--r-btn); padding:13px;
    font-size:12.5px; font-weight:800; letter-spacing:0.07em; text-transform:uppercase; cursor:pointer;
    font-family:'Inter', sans-serif; transition:background .15s;
  }
  .book-btn:hover{ background:#000; }

  .empty{ text-align:center; padding:60px 18px; }
  .empty .icon{ font-size:34px; margin-bottom:14px; }
  .empty h3{ font-family:'Instrument Serif', serif; font-style:italic; font-weight:400; font-size:21px; margin-bottom:8px; }
  .empty p{ color:var(--ink-dim); font-size:13px; max-width:300px; margin:0 auto 20px; }
  .empty .btn{ display:inline-block; background:#141414; color:var(--gold-soft); padding:12px 22px; border-radius:var(--r-btn); font-size:12.5px; font-weight:700; }
  .loading{ text-align:center; padding:60px 18px; color:var(--ink-dim); font-size:13px; }

  /* map avatar-photo pins */
  .photo-pin{
    width:46px; height:46px; border-radius:50%; overflow:hidden; border:3px solid #fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.3); background:#141414; display:flex; align-items:center;
    justify-content:center; transition:transform .12s ease, border-color .12s ease;
  }
  .photo-pin img{ width:100%; height:100%; object-fit:cover; }
  .photo-pin span{ color:var(--gold-soft); font-family:'Instrument Serif', serif; font-style:italic; font-size:15px; }
  .photo-pin.active{ border-color:var(--gold); transform:scale(1.2); }

  /* ================= PROFILE OVERLAY (light, per map screen reference) ================= */
  .profile-pop{
    display:none; position:absolute; top:16px; left:16px; bottom:16px; width:min(400px, calc(100% - 32px));
    background:var(--surface); border-radius:var(--r-card); z-index:50; overflow-y:auto;
    box-shadow:0 20px 60px rgba(17,17,17,0.18);
  }
  .profile-pop.open{ display:block; animation:popIn .22s ease; }
  @keyframes popIn{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
  .pop-gallery{ position:relative; aspect-ratio:4/3.1; background:var(--surface-alt); }
  .pop-gallery img{ width:100%; height:100%; object-fit:cover; }
  .pop-gallery .no-photo{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-style:italic; color:var(--gold); font-size:44px;
  }
  .pop-close{
    position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%;
    background:rgba(20,20,20,0.55); color:#fff; border:none; cursor:pointer; font-size:17px;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .gal-nav{
    position:absolute; bottom:12px; right:12px; background:rgba(20,20,20,0.55); color:#fff;
    font-size:11px; padding:4px 10px; border-radius:12px; backdrop-filter:blur(4px);
  }
  .gal-arrow{
    position:absolute; top:50%; transform:translateY(-50%); width:32px; height:32px; border-radius:50%;
    background:rgba(20,20,20,0.45); color:#fff; border:none; cursor:pointer; font-size:15px;
    display:none; align-items:center; justify-content:center;
  }
  .pop-gallery:hover .gal-arrow{ display:flex; }
  .gal-prev{ left:10px; } .gal-next{ right:10px; }

  .pop-body{ padding:18px 20px 24px; }
  .pop-id{ display:flex; gap:12px; align-items:center; margin-bottom:6px; }
  .pop-avatar{
    width:52px; height:52px; border-radius:50%; overflow:hidden; background:var(--surface-alt); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; border:2px solid var(--line);
    font-family:'Instrument Serif', serif; font-style:italic; color:var(--gold); font-size:17px;
  }
  .pop-avatar img{ width:100%; height:100%; object-fit:cover; }
  .pop-name{ font-family:'Instrument Serif', serif; font-style:italic; font-weight:400; font-size:22px; }
  .pop-sub{ font-size:12px; color:var(--ink-dim); }
  .pop-bio{ font-size:13px; line-height:1.6; margin:10px 0 4px; color:var(--ink); }
  .pop-tags{ display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
  .pop-tag{ font-size:10.5px; border:1px solid var(--line); color:var(--ink-dim); padding:4px 9px; border-radius:20px; }

  .pop-section-t{ font-family:'Instrument Serif', serif; font-style:italic; font-size:16px; font-weight:400; margin:16px 0 10px; }
  .service-option{
    display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
    border:1px solid var(--line); border-radius:14px; margin-bottom:8px; cursor:pointer; font-size:13px;
  }
  .service-option:hover{ border-color:var(--gold); background:#FBF7EE; }
  .service-option.selected{ border-color:var(--gold); background:#FBF7EE; box-shadow:inset 0 0 0 1px var(--gold); }
  .booking-summary-line{
    font-size:12.5px; color:var(--ink-dim); background:var(--surface-alt); padding:10px 14px;
    border-radius:12px; margin-bottom:14px;
  }
  .booking-summary-line strong{ color:var(--gold); }
  .svc-price{ font-weight:800; color:var(--gold); }
  .day-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin:12px 0; scrollbar-width:none; }
  .day-tabs::-webkit-scrollbar{ display:none; }
  .day-tab{
    flex-shrink:0; background:var(--surface-alt); border:1.5px solid var(--line); color:var(--ink-dim);
    padding:8px 12px; border-radius:12px; font-size:11.5px; cursor:pointer; min-width:50px; text-align:center; font-weight:700;
  }
  .day-tab.active{ background:#141414; border-color:#141414; color:var(--gold-soft); }
  .slot-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
  .slot-btn{
    background:var(--surface-alt); border:1.5px solid var(--line); color:var(--ink); padding:10px 4px;
    border-radius:14px; font-size:12.5px; cursor:pointer; text-align:center; font-weight:700;
    transition:border-color .12s ease, background .12s ease, transform .1s ease;
  }
  .slot-btn:hover{ border-color:var(--gold); }
  .slot-btn:not(.taken):active{ transform:scale(0.94); }
  .slot-btn.selected{ background:var(--gold); border-color:var(--gold); color:#141414; font-weight:800; }
  .slot-btn.taken{ opacity:0.3; cursor:not-allowed; text-decoration:line-through; }
  .no-slots-msg, .login-prompt{ grid-column:1/-1; text-align:center; padding:14px; color:var(--ink-dim); font-size:12.5px; }
  .login-prompt a{ color:var(--gold); font-weight:700; }
  .booking-toast{ grid-column:1/-1; text-align:center; font-size:13.5px; color:var(--gold); padding:12px; font-family:'Instrument Serif', serif; font-style:italic; }
  .back-link{ font-size:12px; color:var(--ink-dim); cursor:pointer; display:inline-block; margin-bottom:8px; font-weight:600; }
  .confirm-booking-btn{
    grid-column:1/-1; margin-top:6px; background:#141414; color:var(--gold-soft); border:none; padding:14px;
    border-radius:var(--r-btn); font-size:13.5px; font-weight:700; cursor:pointer; font-family:'Inter', sans-serif;
  }
  .confirm-booking-btn:hover{ background:#000; }
  .confirm-booking-btn:disabled{ opacity:0.6; cursor:not-allowed; }
  .ref-photo-row{ grid-column:1/-1; margin-top:8px; }
  .ref-photo-label{
    display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim); cursor:pointer;
    padding:9px 12px; border:1px dashed var(--line); border-radius:14px; justify-content:center;
  }
  .ref-photo-label:hover{ border-color:var(--gold); color:var(--gold); }

  /* ================= MOBILE ================= */
  .view-toggle{
    display:none; position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:70;
    background:#141414; border-radius:26px; padding:5px; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .view-toggle button{
    background:none; border:none; color:rgba(245,243,239,0.55); font-family:'Inter', sans-serif;
    font-size:12.5px; font-weight:700; padding:10px 22px; border-radius:22px; cursor:pointer;
  }
  .view-toggle button.active{ background:var(--gold); color:#141414; }

  @media (max-width:880px){
    body{ overflow:auto; height:auto; }
    .content{ flex-direction:column; }
    .list-panel{ width:100%; border-right:none; min-height:60vh; }
    .map-panel{ display:none; height:calc(100vh - 140px); }
    body.map-mode .list-panel{ display:none; }
    body.map-mode .map-panel{ display:block; }
    body.map-mode{ overflow:hidden; height:100vh; }
    .view-toggle{ display:flex; }
    .profile-pop{ top:10px; left:10px; right:10px; bottom:76px; width:auto; }
    .nav-inner{ padding:10px 14px; }
    .search-btn{ padding:11px 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">ust<em>a</em>ra</a>
    <div class="search-group">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" data-i18n-ph="search_ph" placeholder="Search barbers or services">

        <input type="text" id="locInput" data-i18n-ph="loc_ph" placeholder="Enter your location" autocomplete="off">

        <div class="suggestions" id="locSuggestions"></div>
      </div>
      <button class="search-btn" id="searchBtn" data-i18n="search_btn">Search</button>

    <div class="lang-switch" id="langSwitch">

</nav>

<div class="content">
  <div class="list-panel">

      <span class="results-count" id="resultsCount"></span>

    <div class="chips-scroll" id="specialtyChips"></div>

      <div class="skel-card"><div class="skel-photos"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div><div class="skel skel-btn"></div></div>
      <div class="skel-card"><div class="skel-photos"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div><div class="skel skel-btn"></div></div>

    <div style="text-align:center; font-size:11.5px; color:var(--ink-dim); padding:20px 10px 10px;">
      <a href="terms.html" data-i18n="foot_terms" style="color:inherit; text-decoration:underline;">Terms</a>
      &nbsp;·&nbsp;
      <a href="privacy.html" data-i18n="foot_privacy" style="color:inherit; text-decoration:underline;">Privacy</a>
    </div>
  </div>
  <div class="map-panel">
    <div id="mapEl"></div>
    <div class="profile-pop" id="profilePop"></div>
  </div>
</div>

<div class="view-toggle" id="viewToggle">
  <button class="active" data-mode="list" data-i18n="view_list">List</button>
  <button data-mode="map" data-i18n="view_map">Map</button>
</div>

let currentLang = 'en';

let userLoc = null; // {lat, lng} chosen via location search

function t(k){ return I18N[currentLang][k]; }
function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function formatPrice(n){ return n ? Number(n).toLocaleString('en-US').replace(/,/g,' ') + ' UZS' : ''; }
function localizeSpecialty(s){ const i = SPECIALTIES_EN.indexOf(s); return i === -1 ? s : SPECIALTIES_LOCAL[currentLang][i]; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function distKm(a, b){
  const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
function lowestPrice(barberId){
  const svcs = (servicesByBarber[barberId] || []).filter(s => s.is_active);
  if(!svcs.length) return null;
  const prices = svcs.map(s => s.price).filter(p => p > 0);
  return prices.length ? Math.min(...prices) : null;
}

function applyLang(lang){
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(I18N[lang][el.dataset.i18n] !== undefined) el.textContent = I18N[lang][el.dataset.i18n];
  });

  });

  document.getElementById('htmlRoot').lang = lang;
  renderSpecialtyChips();
  renderResults();
}

/* ================= location autocomplete (Nominatim, no key) ================= */
const locInput = document.getElementById('locInput');
const locSuggestions = document.getElementById('locSuggestions');
const locBox = document.getElementById('locBox');
let suggestTimer = null;
let suggestionItems = [];
let kbIndex = -1;

locInput.addEventListener('input', ()=>{
  locBox.classList.toggle('has-value', !!locInput.value);
  clearTimeout(suggestTimer);
  const q = locInput.value.trim();
  if(q.length < 2){ closeSuggestions(); return; }
  // debounce to respect Nominatim's 1 req/sec usage policy
  suggestTimer = setTimeout(()=> fetchSuggestions(q), 400);
});

async function fetchSuggestions(q){
  try {
    // biased to Uzbekistan; accept-language follows current UI language
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=uz&accept-language=${currentLang}&q=${encodeURIComponent(q)}`;
    const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
    const results = await res.json();
    if(!Array.isArray(results) || results.length === 0){ closeSuggestions(); return; }
    suggestionItems = results;
    kbIndex = -1;
    locSuggestions.innerHTML = results.map((r, i)=>{
      const parts = (r.display_name || '').split(',');
      const main = parts[0] || r.display_name;
      const sub = parts.slice(1, 3).join(',').trim();
      return `<div class="suggestion" data-i="${i}"><div class="s-main">${escapeHtml(main)}</div>${sub ? `<div class="s-sub">${escapeHtml(sub)}</div>` : ''}</div>`;
    }).join('');
    locSuggestions.classList.add('open');
    locSuggestions.querySelectorAll('.suggestion').forEach(el=>{
      el.addEventListener('click', ()=> pickSuggestion(parseInt(el.dataset.i)));
    });
  } catch(e){ console.warn('Location suggest failed:', e); closeSuggestions(); }
}

function pickSuggestion(i){
  const r = suggestionItems[i];
  if(!r) return;
  locInput.value = (r.display_name || '').split(',').slice(0,2).join(',');
  locBox.classList.add('has-value');
  userLoc = { lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
  closeSuggestions();
  if(map) map.setView([userLoc.lat, userLoc.lng], 13);
  renderResults();
}

function closeSuggestions(){ locSuggestions.classList.remove('open'); locSuggestions.innerHTML = ''; kbIndex = -1; }

locInput.addEventListener('keydown', (e)=>{
  const items = locSuggestions.querySelectorAll('.suggestion');
  if(!items.length) return;
  if(e.key === 'ArrowDown'){ e.preventDefault(); kbIndex = Math.min(kbIndex+1, items.length-1); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); kbIndex = Math.max(kbIndex-1, 0); }
  else if(e.key === 'Enter'){ e.preventDefault(); if(kbIndex >= 0) pickSuggestion(kbIndex); return; }
  else if(e.key === 'Escape'){ closeSuggestions(); return; }
  else return;
  items.forEach((el, i)=> el.classList.toggle('kb-active', i === kbIndex));
});

document.addEventListener('click', (e)=>{
  if(!locBox.contains(e.target)) closeSuggestions();
});

document.getElementById('locClear').addEventListener('click', ()=>{
  locInput.value = '';
  userLoc = null;
  locBox.classList.remove('has-value');
  closeSuggestions();
  renderResults();
});

/* ================= chips ================= */
function renderSpecialtyChips(){
  const row = document.getElementById('specialtyChips');
  row.innerHTML = '';
  SPECIALTIES_LOCAL[currentLang].forEach((label, i)=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedSpecialtyFilters.includes(i) ? ' selected' : '');
    chip.textContent = label;
    chip.addEventListener('click', ()=>{
      if(selectedSpecialtyFilters.includes(i)) selectedSpecialtyFilters = selectedSpecialtyFilters.filter(x=>x!==i);
      else selectedSpecialtyFilters.push(i);
      renderSpecialtyChips(); renderResults();
    });
    row.appendChild(chip);
  });
}

/* ================= map ================= */
function initMap(){
  map = L.map('mapEl', { zoomControl:true }).setView([41.2995, 69.2401], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
}
function photoIcon(barber, active){
  const html = barber.avatar_url
    ? `<img src="${escapeHtml(barber.avatar_url)}" alt="">`
    : `<span>${initials(barber.full_name)}</span>`;
  return L.divIcon({
    className: '',
    html: `<div class="photo-pin${active ? ' active' : ''}">${html}</div>`,
    iconSize: null
  });
}
function renderMapPins(barbers){
  Object.values(markersById).forEach(m => map.removeLayer(m));
  markersById = {};
  const bounds = [];
  barbers.forEach(b=>{
    if(!b.latitude || !b.longitude || !b.is_location_verified) return;
    const marker = L.marker([b.latitude, b.longitude], { icon: photoIcon(b, false) }).addTo(map);
    marker.on('click', ()=>{ highlightBarber(b.id); openProfilePop(b); });
    markersById[b.id] = marker;
    bounds.push([b.latitude, b.longitude]);
  });
  if(!userLoc && bounds.length > 0) map.fitBounds(bounds, { padding:[50,50], maxZoom:14 });
}
function highlightBarber(id){
  Object.entries(markersById).forEach(([mid, m])=>{
    const b = allBarbers.find(x => x.id === mid);
    if(b) m.setIcon(photoIcon(b, mid === id));
  });
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('highlighted', c.dataset.id === id));
}

/* ================= availability strip ================= */
function availStripHtml(b){
  const days = [];
  for(let i=0; i<7; i++){
    const d = new Date(); d.setDate(d.getDate()+i);
    const key = JS_DAY_TO_KEY[d.getDay()];
    const open = (b.work_days || []).includes(key);
    days.push(`
      <div class="avail-day${open ? ' open' : ''}">
        <div class="d-label">${t('day_short')[d.getDay()]}</div>
        <div class="d-num">${d.getDate()}</div>
      </div>`);
  }
  return `<div class="avail-row">${days.join('')}</div>`;
}

/* ================= results ================= */
function renderResults(){
  if(!allBarbers) return;
  const area = document.getElementById('resultsArea');
  const search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const activeSpecEn = selectedSpecialtyFilters.map(i => SPECIALTIES_EN[i]);

  let filtered = allBarbers.filter(b=>{
    if(search){
      const inName = (b.full_name || '').toLowerCase().includes(search);
      const inShop = (b.shop_name || '').toLowerCase().includes(search);
      const inSpecs = (b.specialties || []).some(s => localizeSpecialty(s).toLowerCase().includes(search));
      if(!inName && !inShop && !inSpecs) return false;
    }
    if(activeSpecEn.length){
      const specs = b.specialties || [];
      if(!activeSpecEn.every(s => specs.includes(s))) return false;
    }
    return true;
  });

  // sort by distance if user picked a location
  if(userLoc){
    filtered.sort((a,b)=>{
      const da = (a.latitude && a.longitude) ? distKm(userLoc, {lat:a.latitude, lng:a.longitude}) : Infinity;
      const db = (b.latitude && b.longitude) ? distKm(userLoc, {lat:b.latitude, lng:b.longitude}) : Infinity;
      return da - db;
    });
  }

  const count = filtered.length;
  document.getElementById('resultsCount').textContent =
    count + ' ' + (count === 1 ? t('results_one') : t('results_many'));

  if(allBarbers.length === 0){
    area.innerHTML = `<div class="empty"><div class="icon">✂️</div><h3>${t('empty_none_h')}</h3><p>${t('empty_none_p')}</p><a href="auth.html?role=barber" class="btn">${t('empty_btn')}</a></div>`;
    renderMapPins([]); return;
  }
  if(count === 0){
    area.innerHTML = `<div class="empty"><div class="icon">🔍</div><h3>${t('empty_h')}</h3><p>${t('empty_p')}</p></div>`;
    renderMapPins([]); return;
  }

  area.innerHTML = filtered.map(b=>{
    const photos = (photosByBarber[b.id] || []).slice(0,3);
    const photoCells = [0,1,2].map(i =>
      photos[i]
        ? `<div class="ph"><img src="${escapeHtml(photos[i].photo_url)}" alt="" loading="lazy"></div>`
        : `<div class="ph">${i === 1 ? '✂' : initials(b.full_name)[i % 2] || '·'}</div>`
    ).join('');
    const price = lowestPrice(b.id);
    const avatar = b.avatar_url ? `<img src="${escapeHtml(b.avatar_url)}" alt="">` : initials(b.full_name);
    const dist = (userLoc && b.latitude && b.longitude)
      ? distKm(userLoc, {lat:b.latitude, lng:b.longitude}).toFixed(1) + ' ' + t('km') : '';
    return `
      <div class="card" data-id="${b.id}">
        <button class="fav-btn ${favoriteIds.has(b.id) ? 'favorited' : ''}" data-fav="${b.id}">${favoriteIds.has(b.id) ? '♥' : '♡'}</button>
        ${photos.length ? `<div class="card-photos">${photoCells}</div>` : ''}
        <div class="card-id-row">
          <div class="card-avatar">${avatar}</div>
          <div class="card-who">
            <div class="card-name">${escapeHtml(b.full_name)}</div>
            <div class="card-sub">${escapeHtml(b.shop_name || b.district || '')}${b.years_experience ? ' · ' + b.years_experience + ' ' + t('years') : ''}</div>
          </div>
          <div class="card-right">
            ${price !== null ? `<div class="card-price">${t('from')} ${formatPrice(price)}</div>` : ''}
            ${dist ? `<div class="card-dist">${dist}</div>` : ''}
          </div>
        </div>
        ${availStripHtml(b)}
        <button class="book-btn" data-book="${b.id}">${t('book')}</button>
      </div>
    `;
  }).join('');

  area.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mouseenter', ()=> highlightBarber(card.dataset.id));
    card.addEventListener('click', (e)=>{
      if(e.target.closest('[data-book]') || e.target.closest('[data-fav]')) return;
      const b = allBarbers.find(x => x.id === card.dataset.id);
      highlightBarber(b.id);
      if(b.latitude && b.longitude && markersById[b.id]) map.panTo([b.latitude, b.longitude]);
      openProfilePop(b);
      if(window.innerWidth <= 880){
        document.body.classList.add('map-mode');
        document.querySelectorAll('#viewToggle button').forEach(x=>x.classList.toggle('active', x.dataset.mode==='map'));
        setTimeout(()=> map.invalidateSize(), 200);
      }
    });
  });
  area.querySelectorAll('[data-fav]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleFavorite(btn.dataset.fav, btn);
    });
  });
  area.querySelectorAll('[data-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const b = allBarbers.find(x => x.id === btn.dataset.book);
      openProfilePop(b, true);
      if(window.innerWidth <= 880){
        document.body.classList.add('map-mode');
        document.querySelectorAll('#viewToggle button').forEach(x=>x.classList.toggle('active', x.dataset.mode==='map'));
        setTimeout(()=> map.invalidateSize(), 200);
      }
    });
  });

  renderMapPins(filtered);
}

/* ================= profile popup over map ================= */
let popGalleryIndex = 0;
let popPhotos = [];

function openProfilePop(b, jumpToBooking = false){
  const pop = document.getElementById('profilePop');
  popPhotos = photosByBarber[b.id] || [];
  popGalleryIndex = 0;
  const specs = (b.specialties || []).map(s=>`<span class="pop-tag">${escapeHtml(localizeSpecialty(s))}</span>`).join('');
  const avatar = b.avatar_url ? `<img src="${escapeHtml(b.avatar_url)}" alt="">` : initials(b.full_name);

  pop.innerHTML = `
    <div class="pop-gallery" id="popGallery">
      ${popPhotos.length ? `<img id="popGalleryImg" src="${escapeHtml(popPhotos[0].photo_url)}" alt="">` : `<div class="no-photo">${initials(b.full_name)}</div>`}
      <button class="pop-close" id="popClose">&times;</button>
      ${popPhotos.length > 1 ? `
        <button class="gal-arrow gal-prev" id="galPrev">‹</button>
        <button class="gal-arrow gal-next" id="galNext">›</button>
        <div class="gal-nav" id="galNav">1/${popPhotos.length}</div>` : ''}
    </div>
    <div class="pop-body">
      <div class="pop-id">
        <div class="pop-avatar">${avatar}</div>
        <div>
          <div class="pop-name">${escapeHtml(b.full_name)}</div>
          <div class="pop-sub">${escapeHtml(b.shop_name || '')}${b.shop_name ? ' · ' : ''}${escapeHtml(b.district || '')}${b.years_experience ? ' · ' + b.years_experience + ' ' + t('years') : ''}</div>
        </div>
      </div>
      ${b.bio ? `<div class="pop-bio">${escapeHtml(b.bio)}</div>` : ''}
      <div class="pop-tags">${specs}</div>
      <div class="pop-section-t">${t('choose_service')}</div>
      <div id="popServiceList"></div>
    </div>
  `;
  pop.classList.add('open');
  document.getElementById('popClose').addEventListener('click', ()=> pop.classList.remove('open'));

  if(popPhotos.length > 1){
    const img = document.getElementById('popGalleryImg');
    const nav = document.getElementById('galNav');
    const show = (i)=>{
      popGalleryIndex = (i + popPhotos.length) % popPhotos.length;
      img.src = popPhotos[popGalleryIndex].photo_url;
      nav.textContent = (popGalleryIndex+1) + '/' + popPhotos.length;
    };
    document.getElementById('galPrev').addEventListener('click', ()=> show(popGalleryIndex-1));
    document.getElementById('galNext').addEventListener('click', ()=> show(popGalleryIndex+1));
  }

  renderPopServices(b);
  if(jumpToBooking) pop.querySelector('.pop-body').scrollIntoView({ behavior:'smooth' });
}

function renderPopServices(b){
  const listEl = document.getElementById('popServiceList');
  const active = (servicesByBarber[b.id] || []).filter(s => s.is_active);
  if(!active.length){ listEl.innerHTML = `<div class="no-slots-msg">${t('no_slots')}</div>`; return; }
  listEl.innerHTML = active.map(s=>`
    <div class="service-option" data-key="${s.service_key}" data-duration="${s.duration_minutes}" data-price="${s.price || 0}">
      <span>${SERVICES_LOCAL[currentLang][s.service_key] || s.service_key} · ${s.duration_minutes} ${t('min')}</span>
      <span class="svc-price">${formatPrice(s.price)}</span>
    </div>`).join('');
  listEl.querySelectorAll('.service-option').forEach(opt=>{
    opt.addEventListener('click', ()=> showAddonPicker(b, opt.dataset.key, parseInt(opt.dataset.duration), parseInt(opt.dataset.price) || 0, active));
  });
}

function showAddonPicker(b, mainKey, mainDuration, mainPrice, allActiveServices){
  const listEl = document.getElementById('popServiceList');
  const addonOptions = allActiveServices.filter(s => s.service_key !== mainKey);

  if(addonOptions.length === 0){
    // nothing to add on to — go straight to the time picker
    showPopDayPicker(b, mainKey, mainDuration, mainPrice, []);
    return;
  }

  const selectedAddons = new Set();
  listEl.innerHTML = `
    <span class="back-link" id="addonBackBtn">← ${t('back')}</span>
    <div class="pop-section-t">${t('addon_title')}</div>
    ${addonOptions.map(s => `
      <div class="service-option addon-option" data-addon-key="${s.service_key}" data-addon-duration="${s.duration_minutes}" data-addon-price="${s.price || 0}">
        <span>${SERVICES_LOCAL[currentLang][s.service_key] || s.service_key} · ${s.duration_minutes} ${t('min')}</span>
        <span class="svc-price">+${formatPrice(s.price)}</span>
      </div>`).join('')}
    <button class="confirm-booking-btn" id="continueWithAddonsBtn">${t('continue_btn')}</button>
  `;
  document.getElementById('addonBackBtn').addEventListener('click', ()=> renderPopServices(b));

  listEl.querySelectorAll('.addon-option').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      const key = opt.dataset.addonKey;
      if(selectedAddons.has(key)){ selectedAddons.delete(key); opt.classList.remove('selected'); }
      else { selectedAddons.add(key); opt.classList.add('selected'); }
    });
  });

  document.getElementById('continueWithAddonsBtn').addEventListener('click', ()=>{
    let totalDuration = mainDuration, totalPrice = mainPrice;
    const addonKeys = [];
    selectedAddons.forEach(key => {
      const svc = addonOptions.find(s => s.service_key === key);
      if(svc){ totalDuration += svc.duration_minutes; totalPrice += (svc.price || 0); addonKeys.push(key); }
    });
    showPopDayPicker(b, mainKey, totalDuration, totalPrice, addonKeys);
  });
}

function blocksForDay(b, dayKey){
  if(b.availability && b.availability.length > 0){
    return b.availability.filter(block => block.day === dayKey);
  }
  // fallback for barbers who haven't saved new-style availability yet
  if((b.work_days || []).includes(dayKey)){
    return [{ start: (b.work_start || '09:00').slice(0,5), end: (b.work_end || '20:00').slice(0,5) }];
  }
  return [];
}

function generateSlots(b, dateObj, duration, bookedIsoSet){
  const dayKey = JS_DAY_TO_KEY[dateObj.getDay()];
  const blocks = blocksForDay(b, dayKey);
  if(blocks.length === 0) return [];
  const out = []; const now = new Date();
  blocks.forEach(block => {
    const [sh, sm] = block.start.split(':').map(Number);
    const [eh, em] = block.end.split(':').map(Number);
    let cur = new Date(dateObj); cur.setHours(sh, sm, 0, 0);
    const end = new Date(dateObj); end.setHours(eh, em, 0, 0);
    while(cur < end){
      if(cur > now){
        const iso = cur.toISOString();
        out.push({ label: cur.toLocaleTimeString(currentLang==='en'?'en-US':currentLang, {hour:'2-digit',minute:'2-digit'}), iso, taken: bookedIsoSet.has(iso) });
      }
      cur = new Date(cur.getTime() + duration*60000);
    }
  });
  return out;
}

async function showPopDayPicker(b, serviceKey, duration, price, addonKeys = []){
  const listEl = document.getElementById('popServiceList');
  const rs = new Date(); const re = new Date(); re.setDate(re.getDate()+7);
  const { data: existing } = await supabaseClient.from('bookings').select('start_time')
    .eq('barber_id', b.id).in('status',['pending','confirmed'])
    .gte('start_time', rs.toISOString()).lte('start_time', re.toISOString());
  const bookedIsoSet = new Set((existing||[]).map(x => new Date(x.start_time).toISOString()));

  const days = [];
  for(let i=0;i<7;i++){ const d = new Date(); d.setDate(d.getDate()+i); if(blocksForDay(b, JS_DAY_TO_KEY[d.getDay()]).length > 0) days.push(d); }

  const summaryLine = addonKeys.length > 0
    ? `<div class="booking-summary-line">${SERVICES_LOCAL[currentLang][serviceKey] || serviceKey} + ${addonKeys.map(k => SERVICES_LOCAL[currentLang][k] || k).join(', ')} · ${duration} ${t('min')} · <strong>${formatPrice(price)}</strong></div>`
    : '';

  listEl.innerHTML = `
    <span class="back-link" id="popBack">← ${t('back')}</span>
    <div class="pop-section-t" style="margin-top:4px;">${t('book_title')}</div>
    ${summaryLine}
    ${days.length ? `<div class="day-tabs" id="popDayTabs"></div><div class="slot-grid" id="popSlotGrid"></div>` : `<div class="no-slots-msg">${t('no_slots')}</div>`}
  `;
  document.getElementById('popBack').addEventListener('click', ()=> renderPopServices(b));
  if(!days.length) return;

  const tabs = document.getElementById('popDayTabs');
  const grid = document.getElementById('popSlotGrid');
  let selectedSlotIso = null;
  let selectedRefPhoto = null;

  function selectDay(idx){
    selectedSlotIso = null;
    selectedRefPhoto = null;
    let useSavedStyle = false;
    const hasSavedStyle = currentClientProfile && (currentClientProfile.style_notes || currentClientProfile.style_photo_url);
    tabs.querySelectorAll('.day-tab').forEach((el,i)=> el.classList.toggle('active', i===idx));
    const slots = generateSlots(b, days[idx], duration, bookedIsoSet);
    if(!slots.length){ grid.innerHTML = `<div class="no-slots-msg">${t('no_slots')}</div>`; return; }
    grid.innerHTML = slots.map(s=>`<div class="slot-btn ${s.taken?'taken':''}" data-iso="${s.iso}">${s.label}</div>`).join('')
      + (hasSavedStyle ? `
        <div class="ref-photo-row" id="savedStyleRow" style="display:none;">
          <label class="ref-photo-label" id="useSavedStyleBtn" style="cursor:pointer;">✨ <span>${t('use_saved_style')}</span></label>
        </div>` : '')
      + `<div class="ref-photo-row" id="refPhotoRow" style="display:none;">
           <label class="ref-photo-label" for="refPhotoInput">📎 <span id="refPhotoLabelText">${t('attach_reference')}</span></label>
           <input type="file" id="refPhotoInput" accept="image/*" style="display:none;">
         </div>
         <button class="confirm-booking-btn" id="confirmBookingBtn" style="display:none;">${t('confirm_booking_btn')}</button>`;
    const confirmBtn = document.getElementById('confirmBookingBtn');
    const refRow = document.getElementById('refPhotoRow');
    const refInput = document.getElementById('refPhotoInput');
    const savedStyleRow = document.getElementById('savedStyleRow');
    refInput.addEventListener('change', ()=>{
      selectedRefPhoto = refInput.files[0] || null;
      useSavedStyle = false;
      document.getElementById('refPhotoLabelText').textContent = selectedRefPhoto ? selectedRefPhoto.name : t('attach_reference');
      const btn = document.getElementById('useSavedStyleBtn');
      if(btn) btn.querySelector('span').textContent = t('use_saved_style');
    });
    if(savedStyleRow){
      document.getElementById('useSavedStyleBtn').addEventListener('click', ()=>{
        useSavedStyle = !useSavedStyle;
        selectedRefPhoto = null;
        document.getElementById('useSavedStyleBtn').querySelector('span').textContent = useSavedStyle ? t('using_saved_style') : t('use_saved_style');
        document.getElementById('refPhotoLabelText').textContent = t('attach_reference');
      });
    }

    grid.querySelectorAll('.slot-btn:not(.taken)').forEach(el=>{
      el.addEventListener('click', ()=>{
        grid.querySelectorAll('.slot-btn').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selectedSlotIso = el.dataset.iso;
        refRow.style.display = 'flex';
        if(savedStyleRow) savedStyleRow.style.display = 'flex';
        confirmBtn.style.display = 'block';
        confirmBtn.textContent = t('confirm_booking_btn') + ' — ' + el.textContent;
      });
    });

    confirmBtn.addEventListener('click', async ()=>{
      if(!selectedSlotIso) return;
      // re-check auth at click time (avoids race where page loaded before session resolved)
      if(!currentUser) await checkAuth();
      if(!currentUser || !currentClientProfile){
        // not logged in, or logged in as a non-client account (e.g. a barber) — needs a client account to book
        grid.innerHTML = `<div class="login-prompt">${t('login_prompt')}<br><a href="auth.html">${t('login_btn')} →</a></div>`;
        return;
      }
      confirmBtn.disabled = true;
      confirmBtn.textContent = t('booking_in_progress');

      let referencePhotoUrl = null;
      let styleNotesToSave = null;
      if(useSavedStyle && currentClientProfile){
        referencePhotoUrl = currentClientProfile.style_photo_url || null;
        styleNotesToSave = currentClientProfile.style_notes || null;
      } else if(selectedRefPhoto){
        const ext = selectedRefPhoto.name.split('.').pop();
        const path = `${currentUser.id}/${crypto.randomUUID()}.${ext}`;
        const { error: uploadError } = await supabaseClient.storage.from('booking-references').upload(path, selectedRefPhoto);
        if(!uploadError){
          const { data: urlData } = supabaseClient.storage.from('booking-references').getPublicUrl(path);
          referencePhotoUrl = urlData.publicUrl;
        } else {
          console.warn('Reference photo upload failed, continuing without it:', uploadError);
        }
      }

      const { error } = await supabaseClient.from('bookings').insert([{
        barber_id: b.id, client_id: currentUser.id,
        client_name: currentClientProfile.full_name, client_phone: currentClientProfile.phone,
        start_time: selectedSlotIso, status:'pending', service_key: serviceKey, service_duration_minutes: duration,
        service_price: price, reference_photo_url: referencePhotoUrl, style_notes: styleNotesToSave,
        addon_keys: addonKeys
      }]);
      if(error){
        console.error('Booking insert failed:', error);
        const msg = error.code === '23505' ? t('booking_failed')
          : `${t('booking_failed')}<br><span style="font-size:11px; opacity:0.7;">(${escapeHtml(error.message)})</span>`;
        grid.innerHTML = `<div class="no-slots-msg">${msg}</div>`;
        return;
      }
      // booking succeeded — send the client straight to their dashboard to see it
      window.location.href = 'client-dashboard.html';
    });
  }
  tabs.innerHTML = days.map(d=>`<div class="day-tab">${t('day_short')[d.getDay()]} ${d.getDate()}</div>`).join('');
  Array.from(tabs.children).forEach((el,i)=> el.addEventListener('click', ()=> selectDay(i)));
  selectDay(0);
}

/* ================= auth + data load ================= */
async function checkAuth(){
  const { data } = await supabaseClient.auth.getSession();
  if(data.session){
    currentUser = data.session.user;
    const { data: client } = await supabaseClient.from('clients').select('*').eq('id', currentUser.id).single();
    currentClientProfile = client;
    if(currentClientProfile){
      const { data: favs } = await supabaseClient.from('favorites').select('barber_id').eq('client_id', currentUser.id);
      favoriteIds = new Set((favs || []).map(f => f.barber_id));
      renderResults(); // re-render so hearts reflect loaded state
    }
  }
}

async function toggleFavorite(barberId, btn){
  if(!currentUser || !currentClientProfile){ window.location.href = 'auth.html'; return; }
  const isFav = favoriteIds.has(barberId);
  btn.disabled = true;
  if(isFav){
    const { error } = await supabaseClient.from('favorites').delete().eq('client_id', currentUser.id).eq('barber_id', barberId);
    if(!error){ favoriteIds.delete(barberId); btn.classList.remove('favorited'); btn.textContent = '♡'; }
  } else {
    const { error } = await supabaseClient.from('favorites').insert([{ client_id: currentUser.id, barber_id: barberId }]);
    if(!error){ favoriteIds.add(barberId); btn.classList.add('favorited'); btn.textContent = '♥'; }
  }
  btn.disabled = false;
}

async function loadAll(){
  try {
    initMap();
    const { data: barbers, error } = await supabaseClient.from('barbers').select('*')
      .eq('is_published', true).eq('is_approved', true)
      .order('created_at', { ascending:false });
    if(error){
      console.error('Failed to load barbers:', error);
      document.getElementById('resultsArea').innerHTML =
        `<div style="padding:40px; color:var(--err); font-size:13px;">Could not load barbers: ${escapeHtml(error.message)} — please screenshot and report.</div>`;
      allBarbers = []; return;
    }
    allBarbers = barbers || [];

    if(allBarbers.length){
      const ids = allBarbers.map(b => b.id);
      const [{ data: services }, photosRes] = await Promise.all([
        supabaseClient.from('services').select('*').in('barber_id', ids),
        supabaseClient.from('portfolio_photos').select('*').in('barber_id', ids).then(r => r).catch(()=>({ data: [] }))
      ]);
      servicesByBarber = {};
      (services||[]).forEach(s=>{ (servicesByBarber[s.barber_id] = servicesByBarber[s.barber_id] || []).push(s); });
      photosByBarber = {};
      ((photosRes && photosRes.data) || []).forEach(p=>{ (photosByBarber[p.barber_id] = photosByBarber[p.barber_id] || []).push(p); });
    }
    applyLang(currentLang);
  } catch(e){
    console.error('loadAll crashed:', e);
    document.getElementById('resultsArea').innerHTML =
      `<div style="padding:40px; color:var(--err); font-size:13px;">Something failed to load: ${escapeHtml(e.message)} — please screenshot and report.</div>`;
  }
}

loadAll();
checkAuth();
</script>
