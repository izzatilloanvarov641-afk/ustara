  .nav-link{ font-size:13.5px; color:var(--ink-dim); white-space:nowrap; }

  .lang-switch button{

  select.filter-select{

  .chip{

  .chip.selected{ background:var(--brass); border-color:var(--brass); color:var(--bg); font-weight:600; }

  .results-count strong{ color:var(--ink); font-weight:600; }

  /* mobile view toggle */

  .view-toggle button{
    flex:1; background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    padding:11px; border-radius:24px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter', sans-serif;
  }
  .view-toggle button.active{ background:var(--brass); border-color:var(--brass); color:var(--bg); }

  .map-pin-tag{

  .map-pin-tag::after{
    content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
    width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent;

  .map-pin.pin-highlight .map-pin-tag{ background:var(--ink); }

  .booking-section{ border-top:1px solid var(--line); margin-top:24px; padding-top:22px; }

  .service-option{ display:flex; justify-content:space-between; align-items:center; background:var(--bg-alt); border:1px solid var(--line); padding:12px 14px; border-radius:6px; margin-bottom:8px; cursor:pointer; font-size:13.5px; }

  .slot-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }

    background:var(--bg-alt); border:1px solid var(--line); color:var(--ink); padding:10px 6px;

  .booking-toast{ text-align:center; font-size:13.5px; color:var(--brass); padding:10px; font-family:'Fraunces', serif; font-style:italic; }
</style>

// Yandex Maps JS API v3 uses [longitude, latitude] order (GeoJSON-style),
// the opposite of the v2 API and of how we store/read lat/long from Postgres.
const TASHKENT_CENTER_LONLAT = [69.240562, 41.311081];

function loadYandexMaps(){
  return new Promise((resolve, reject)=>{
    if(window.ymaps3){ window.ymaps3.ready.then(resolve); return; }
    const script = document.createElement('script');
    script.src = `https://api-maps.yandex.ru/v3/?apikey=${YANDEX_MAPS_API_KEY}&lang=en_US`;
    script.onload = () => {
      if(window.ymaps3 && window.ymaps3.ready){
        window.ymaps3.ready.then(resolve).catch(reject);
      } else {
        reject(new Error('Yandex Maps failed to initialize (invalid key or service unavailable)'));
      }
    };
    script.onerror = () => reject(new Error('Failed to load Yandex Maps script'));
    document.head.appendChild(script);
  });
}

let cardElsByBarberId = {};
let layoutBuilt = false;
let mobileView = 'list';
const JS_DAY_TO_KEY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(dict[el.dataset.i18n] !== undefined) el.textContent = dict[el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    if(dict[el.dataset.i18nPh] !== undefined) el.placeholder = dict[el.dataset.i18nPh];
  });
  document.querySelectorAll('#langSwitch button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('htmlRoot').lang = lang;
  renderSpecialtyChips();
  renderResults();
}

document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-lang]');
  if(btn) applyLang(btn.dataset.lang);
});

function renderSpecialtyChips(){
  const row = document.getElementById('specialtyChips');
  row.innerHTML = '';
  SPECIALTIES_LOCAL[currentLang].forEach((label, i)=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedSpecialtyFilters.includes(i) ? ' selected' : '');
    chip.textContent = label;
    chip.addEventListener('click', ()=>{
      if(selectedSpecialtyFilters.includes(i)) selectedSpecialtyFilters = selectedSpecialtyFilters.filter(x=>x!==i);
      else selectedSpecialtyFilters.push(i);
      renderSpecialtyChips();
      renderResults();
    });
    row.appendChild(chip);
  });
}

function localizeSpecialty(enTag){
  const idx = SPECIALTIES_EN.indexOf(enTag);
  if(idx === -1) return enTag;
  return SPECIALTIES_LOCAL[currentLang][idx];
}

function localizeService(key){
  const idx = SERVICE_KEYS.indexOf(key);
  return idx === -1 ? key : SERVICES_LOCAL[currentLang][idx];
}

function initials(name){
  return (name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function formatPriceNumber(n){
  return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}
function formatPriceFull(n){
  return formatPriceNumber(n) + ' ' + I18N[currentLang].currency;
}

function cheapestPrice(barberId){
  const services = barberServicesByBarber[barberId] || [];
  const prices = services.filter(s => s.price != null).map(s => s.price);
  return prices.length ? Math.min(...prices) : null;
}

function nextAvailableLabel(barber){
  if(!barber.work_days || barber.work_days.length === 0) return null;
  const dict = I18N[currentLang];
  const today = new Date();
  for(let i = 0; i < 7; i++){
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dayKey = JS_DAY_TO_KEY[d.getDay()];
    if(barber.work_days.includes(dayKey)){
      if(i === 0) return dict.today;
      if(i === 1) return dict.tomorrow;
      return d.toLocaleDateString(currentLang === 'en' ? 'en-US' : currentLang, { weekday:'long' });
    }
  }
  return null;
}

function resultsCountLabel(n){
  const dict = I18N[currentLang];
  if(n === 0) return dict.results_count_zero;
  const word = n === 1 ? dict.results_count_one : dict.results_count_other;
  return `<strong>${n}</strong> ${word}`;
}

function setMobileView(view){
  mobileView = view;
  document.querySelectorAll('.view-toggle button').forEach(b=> b.classList.toggle('active', b.dataset.view === view));
  const listCol = document.getElementById('listCol');
  const mapCol = document.getElementById('mapColOuter');
  if(listCol) listCol.classList.toggle('view-hidden', view !== 'list');
  if(mapCol) mapCol.classList.toggle('view-hidden', view !== 'map');
}

function ensureLayoutShell(){
  if(layoutBuilt) return;
  const area = document.getElementById('resultsArea');
  area.innerHTML = `
    <div class="results-count" id="resultsCount"></div>
    <div class="view-toggle" id="viewToggle">
      <button type="button" data-view="list" class="active" data-i18n="view_list">List</button>
      <button type="button" data-view="map" data-i18n="view_map">Map</button>
    </div>
    <div class="browse-layout">
      <div class="list-col" id="listCol"></div>
      <div class="map-col" id="mapColOuter"><div class="map-container" id="mapContainer"></div></div>
    </div>
  `;
  document.getElementById('viewToggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-view]');
    if(btn) setMobileView(btn.dataset.view);
  });
  setMobileView('list');
  layoutBuilt = true;
}

function renderResults(){
  const dict = I18N[currentLang];
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const district = document.getElementById('districtFilter').value;
  const activeSpecEn = selectedSpecialtyFilters.map(i => SPECIALTIES_EN[i]);

  if(allBarbers.length === 0){
    layoutBuilt = false;
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty">
        <div class="icon">✂️</div>
        <h3>${dict.empty_h}</h3>
        <p>${dict.empty_p}</p>
        <a href="auth.html?role=barber&tab=signup" class="btn">${dict.empty_btn}</a>
      </div>`;
    return;
  }

  let filtered = allBarbers.filter(b=>{
    if(search && !(b.full_name || '').toLowerCase().includes(search)) return false;
    if(district && b.district !== district) return false;
    if(activeSpecEn.length){
      const specs = b.specialties || [];
      if(!activeSpecEn.every(s => specs.includes(s))) return false;
    }
    return true;
  });

  ensureLayoutShell();
  document.getElementById('resultsCount').innerHTML = resultsCountLabel(filtered.length);

  const listCol = document.getElementById('listCol');
  cardElsByBarberId = {};

  if(filtered.length === 0){
    listCol.innerHTML = `<div class="empty-inline"><strong>${dict.no_match_h}</strong><br>${dict.no_match_p}</div>`;
    updateMapPins([]);
    return;
  }

  listCol.innerHTML = '';
  filtered.forEach(b=>{
    const card = document.createElement('div');
    card.className = 'list-card';
    card.dataset.barberId = b.id;
    const specs = (b.specialties || []).slice(0,3).map(s=>`<span class="card-tag">${escapeHtml(localizeSpecialty(s))}</span>`).join('');
    const price = cheapestPrice(b.id);
    const available = nextAvailableLabel(b);
    card.innerHTML = `
      <div class="list-card-avatar">${initials(b.full_name)}</div>
      <div class="list-card-body">
        <div class="list-card-top">
          <div class="list-card-name">${escapeHtml(b.full_name)}</div>
          ${price ? `<div class="list-card-price">${dict.from_label} ${formatPriceFull(price)}</div>` : ''}
        </div>
        <div class="list-card-meta">${escapeHtml(b.district || '')}${b.years_experience ? ' · ' + b.years_experience + ' ' + dict.years : ''}</div>
        <div class="list-card-tags card-tags">${specs}</div>
        <div class="list-card-bottom">
          ${available ? `<div class="list-card-available">${dict.next_label} ${available}</div>` : '<div></div>'}
          <button type="button" class="book-btn" data-book="${b.id}">${dict.book_btn}</button>
        </div>
      </div>
    `;
    card.addEventListener('click', ()=> openModal(b));
    card.addEventListener('mouseenter', ()=> setPinHighlight(b.id, true));
    card.addEventListener('mouseleave', ()=> setPinHighlight(b.id, false));
    card.querySelector('[data-book]').addEventListener('click', (e)=>{
      e.stopPropagation();
      openModal(b);
    });
    listCol.appendChild(card);
    cardElsByBarberId[b.id] = card;
  });

  updateMapPins(filtered);
}

let mapLoadFailed = false;

async function ensureMap(){
  if(ymapInstance || mapLoadFailed) return;
  const container = document.getElementById('mapContainer');
  try{
    await loadYandexMaps();
    if(!container) return;
    const { YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer, YMapControls, YMapZoomControl } = ymaps3;
    ymapInstance = new YMap(container, { location: { center: TASHKENT_CENTER_LONLAT, zoom: 12 } });
    ymapInstance.addChild(new YMapDefaultSchemeLayer());
    ymapInstance.addChild(new YMapDefaultFeaturesLayer());
    ymapInstance.addChild(new YMapControls({ position: 'right' }).addChild(new YMapZoomControl()));
  } catch(err){
    console.error('Yandex Maps failed to load:', err);
    mapLoadFailed = true;
    if(container){
      container.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; padding:24px; text-align:center; color:var(--ink-dim); font-size:13.5px;">${I18N[currentLang].map_unavailable}</div>`;
    }
  }
}

function setPinHighlight(barberId, on){
  const entry = markersByBarberId[barberId];
  if(entry) entry.el.classList.toggle('pin-highlight', on);
}

function setCardHighlightAndScroll(barberId){
  const card = cardElsByBarberId[barberId];
  if(!card) return;
  if(mobileView === 'map' && window.innerWidth <= 900) setMobileView('list');
  card.scrollIntoView({ behavior:'smooth', block:'center' });
  card.classList.add('card-highlight');
  setTimeout(()=> card.classList.remove('card-highlight'), 1600);
}

async function updateMapPins(barbersList){
  await ensureMap();
  if(!ymapInstance) return;
  const { YMapMarker } = ymaps3;
  Object.values(markersByBarberId).forEach(entry => ymapInstance.removeChild(entry.marker));
  markersByBarberId = {};
  barbersList.forEach(b=>{
    if(b.latitude == null || b.longitude == null || !b.is_location_verified) return;
    const price = cheapestPrice(b.id);
    const caption = price ? formatPriceNumber(price) : '—';
    const el = document.createElement('div');
    el.className = 'map-pin';
    el.innerHTML = `<div class="map-pin-tag">${escapeHtml(caption)}</div>`;
    el.addEventListener('click', ()=> setCardHighlightAndScroll(b.id));
    const marker = new YMapMarker({ coordinates: [b.longitude, b.latitude] }, el);
    ymapInstance.addChild(marker);
    markersByBarberId[b.id] = { marker, el };
  });
}

function generateSlotsForDate(barber, dateObj, bookedIsoSet, durationMinutes){
  const dayKey = JS_DAY_TO_KEY[dateObj.getDay()];
  if(!(barber.work_days || []).includes(dayKey)) return [];

  const [startH, startM] = (barber.work_start || '09:00').split(':').map(Number);
  const [endH, endM] = (barber.work_end || '20:00').split(':').map(Number);
  const duration = durationMinutes || 30;

  const slots = [];
  const now = new Date();
  let cursor = new Date(dateObj);
  cursor.setHours(startH, startM, 0, 0);
  const end = new Date(dateObj);
  end.setHours(endH, endM, 0, 0);

  while(cursor < end){
    if(cursor > now){
      const iso = cursor.toISOString();
      slots.push({
        label: cursor.toLocaleTimeString(currentLang === 'en' ? 'en-US' : currentLang, { hour:'2-digit', minute:'2-digit' }),
        iso,
        taken: bookedIsoSet.has(iso)
      });
    }
    cursor = new Date(cursor.getTime() + duration * 60000);
  }
  return slots;
}

async function openModal(b){
  const dict = I18N[currentLang];
  const specs = (b.specialties || []).map(s=>`<span class="card-tag">${escapeHtml(localizeSpecialty(s))}</span>`).join('');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">&times;</button>
    <div class="modal-avatar">${initials(b.full_name)}</div>
    <h2>${escapeHtml(b.full_name)}</h2>
    <div class="m-meta">${escapeHtml(b.district || '')}${b.years_experience ? ' · ' + b.years_experience + ' ' + dict.years : ''}</div>
    ${b.bio ? `<div class="m-bio">${escapeHtml(b.bio)}</div>` : ''}
    <div class="card-tags">${specs}</div>
    <div class="booking-section" id="bookingSection">
      <h4>${dict.booking_title}</h4>
      <div id="bookingBody">${dict.no_slots}</div>
    </div>
  `;
  document.getElementById('modalBackdrop').classList.add('active');
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

  if(!b.work_days || b.work_days.length === 0){
    return; // no availability configured yet, leave the "no_slots" message
  }

  const { data: servicesData } = await supabaseClient
    .from('services')
    .select('*')
    .eq('barber_id', b.id)
    .eq('is_active', true);
  const services = servicesData || [];

  if(services.length === 0){
    document.getElementById('bookingBody').textContent = dict.no_services;
    return;
  }

  const bookingBody = document.getElementById('bookingBody');
  bookingBody.innerHTML = `<div class="booking-section-label" style="font-size:13px; color:var(--ink-dim); margin-bottom:10px;">${dict.choose_service}</div><div id="serviceSelect"></div>`;
  const serviceSelect = document.getElementById('serviceSelect');
  serviceSelect.innerHTML = services.map(s => `
    <div class="service-option" data-key="${s.service_key}" data-duration="${s.duration_minutes}">
      <span>${escapeHtml(localizeService(s.service_key))}</span>
      <span class="dur">${s.duration_minutes} ${dict.min_short}${s.price ? ' · ' + formatPriceFull(s.price) : ''}</span>
    </div>
  `).join('');
  serviceSelect.querySelectorAll('.service-option').forEach(el=>{
    el.addEventListener('click', ()=> selectService(b, el.dataset.key, parseInt(el.dataset.duration)));
  });
}

async function selectService(b, serviceKey, durationMinutes){
  const dict = I18N[currentLang];

  const rangeStart = new Date();
  const rangeEnd = new Date();
  rangeEnd.setDate(rangeEnd.getDate() + 7);
  const { data: existingBookings } = await supabaseClient
    .from('bookings')
    .select('start_time')
    .eq('barber_id', b.id)
    .in('status', ['pending','confirmed'])
    .gte('start_time', rangeStart.toISOString())
    .lte('start_time', rangeEnd.toISOString());
  const bookedIsoSet = new Set((existingBookings || []).map(x => new Date(x.start_time).toISOString()));

  const days = [];
  for(let i = 0; i < 7; i++){
    const d = new Date();
    d.setDate(d.getDate() + i);
    const dayKey = JS_DAY_TO_KEY[d.getDay()];
    if(b.work_days.includes(dayKey)) days.push(d);
  }

  const body = document.getElementById('bookingBody');
  if(days.length === 0){
    body.textContent = dict.no_slots;
    return;
  }

  body.innerHTML = `<div class="day-tabs" id="dayTabs"></div><div class="slot-grid" id="slotGrid"></div>`;
  const dayTabs = document.getElementById('dayTabs');
  const slotGrid = document.getElementById('slotGrid');

  function selectDay(idx){
    document.querySelectorAll('.day-tab').forEach((el,i)=> el.classList.toggle('active', i === idx));
    const slots = generateSlotsForDate(b, days[idx], bookedIsoSet, durationMinutes);
    if(slots.length === 0){
      slotGrid.innerHTML = `<div class="no-slots-msg" style="grid-column:1/-1;">${dict.no_slots}</div>`;
      return;
    }
    slotGrid.innerHTML = slots.map(s =>
      `<div class="slot-btn ${s.taken ? 'taken' : ''}" data-iso="${s.iso}">${s.label}</div>`
    ).join('');
    if(!currentUser){
      slotGrid.querySelectorAll('.slot-btn:not(.taken)').forEach(el=>{
        el.addEventListener('click', ()=>{
          slotGrid.innerHTML = `<div class="login-prompt" style="grid-column:1/-1;">${dict.login_prompt}<br><a href="auth.html">${dict.login_btn} →</a></div>`;
        });
      });
    } else {
      slotGrid.querySelectorAll('.slot-btn:not(.taken)').forEach(el=>{
        el.addEventListener('click', async ()=>{
          const iso = el.dataset.iso;
          el.style.opacity = '0.5';
          const { error } = await supabaseClient.from('bookings').insert([{
            barber_id: b.id,
            client_id: currentUser.id,
            client_name: currentClientProfile.full_name,
            client_phone: currentClientProfile.phone,
            start_time: iso,
            status: 'pending',
            service_key: serviceKey,
            service_duration_minutes: durationMinutes
          }]);
          if(error){
            slotGrid.innerHTML = `<div class="no-slots-msg" style="grid-column:1/-1;">${dict.booking_failed}</div>`;
            return;
          }
          bookedIsoSet.add(iso);
          slotGrid.innerHTML = `<div class="booking-toast" style="grid-column:1/-1;">${dict.booking_confirmed}</div>`;
        });
      });
    }
  }

  dayTabs.innerHTML = days.map((d,i) =>
    `<div class="day-tab">${d.toLocaleDateString(currentLang === 'en' ? 'en-US' : currentLang, { weekday:'short', day:'numeric' })}</div>`
  ).join('');
  Array.from(dayTabs.children).forEach((el, i)=> el.addEventListener('click', ()=> selectDay(i)));
  selectDay(0);
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('active'); }
document.getElementById('modalBackdrop').addEventListener('click', (e)=>{
  if(e.target.id === 'modalBackdrop') closeModal();
});

document.getElementById('searchInput').addEventListener('input', renderResults);
document.getElementById('districtFilter').addEventListener('change', renderResults);

/* ---------- fetch published barbers ---------- */
async function loadBarbers(){
  const { data, error } = await supabaseClient
    .from('barbers')
    .select('*')
    .eq('is_published', true)
    .eq('is_approved', true)
    .order('created_at', { ascending:false });

  if(error){
    console.error('Failed to load barbers:', error);
    allBarbers = [];
  } else {
    allBarbers = data || [];
  }

  if(allBarbers.length > 0){
    const { data: servicesData } = await supabaseClient
      .from('services')
      .select('*')
      .in('barber_id', allBarbers.map(b => b.id))
      .eq('is_active', true);
    barberServicesByBarber = {};
    (servicesData || []).forEach(s=>{
      if(!barberServicesByBarber[s.barber_id]) barberServicesByBarber[s.barber_id] = [];
      barberServicesByBarber[s.barber_id].push(s);
    });
  }

  applyLang(currentLang);
}

async function checkAuth(){
  const { data } = await supabaseClient.auth.getSession();
  if(data.session){
    currentUser = data.session.user;
    const { data: client } = await supabaseClient.from('clients').select('*').eq('id', currentUser.id).single();
    currentClientProfile = client;
  }
}

loadBarbers();
checkAuth();
</script>
