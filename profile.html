<style>
  :root{
    --bg:#12151C; --surface:#1B1F29; --surface-2:#232838; --line:rgba(255,255,255,0.09);
    --ink:#F3EFE2; --ink-dim:#9AA0AD; --gold:#A9DB3A; --gold-soft:#CDFF5E;
    --success:#3D9E2F; --coral:#FF6A4D; --sun:#FFB84D; --r-card:26px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans', sans-serif; line-height:1.5; padding-bottom:100px; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:640px; margin:0 auto; padding:0 20px; }
  .serif{ font-family:'Space Grotesk', sans-serif; font-weight:600; }

  nav{ padding:16px 0; }
  .logo{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:20px; color:var(--ink); }
  .logo em{ font-style:normal; color:var(--gold-soft); }

  .loading, .error-state{ text-align:center; padding:100px 20px; color:var(--ink-dim); }

  /* ================= HERO ================= */
  .hero-photo{
    width:100%; height:260px; position:relative; overflow:hidden; background:var(--surface-2);
  }
  .hero-photo img{ width:100%; height:100%; object-fit:cover; }
  .hero-photo::after{
    content:''; position:absolute; inset:0; background:linear-gradient(to bottom, rgba(20,20,20,0.15), var(--bg) 92%);
  }
  .hero-photo .no-photo-bg{
    width:100%; height:100%;
    background:radial-gradient(circle at 30% 20%, rgba(205,255,94,0.14), transparent 55%), linear-gradient(160deg, #232838, #12151C);
  }

  .hero{ padding:0 20px 20px; text-align:center; margin-top:-64px; position:relative; z-index:2; }
  .avatar{
    width:112px; height:112px; border-radius:50%; margin:0 auto 14px; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:36px; color:var(--gold-soft);
    border:4px solid var(--bg); box-shadow:0 12px 34px rgba(0,0,0,0.4); position:relative;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .verified-badge{
    position:absolute; bottom:6px; right:2px; width:26px; height:26px; border-radius:50%; background:var(--gold);
    display:flex; align-items:center; justify-content:center; border:3px solid var(--bg); font-size:12px; color:#12151C;
  }
  h1{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:27px; }
  .meta{ font-size:13px; color:var(--ink-dim); margin-top:5px; }
  .rating-line{ font-size:14px; color:var(--gold-soft); font-weight:700; margin-top:8px; }
  .rating-line span{ color:var(--ink-dim); font-weight:500; font-size:12.5px; }
  .rating-line.new-badge{ color:var(--ink-dim); font-size:12px; font-family:'Space Grotesk', sans-serif; font-weight:500; }
  .reviews-list{ margin-bottom:8px; }
  .review-card{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:14px 16px; margin-bottom:10px; }
  .review-stars{ color:var(--gold); font-size:14px; margin-bottom:6px; letter-spacing:1px; }
  .review-comment{ font-size:13px; color:var(--ink); line-height:1.5; margin-bottom:6px; }
  .review-date{ font-size:11px; color:var(--ink-dim); }
  .trust-row{ display:flex; justify-content:center; gap:22px; margin-top:16px; padding-top:16px; border-top:1px solid var(--line); }
  .trust-item{ text-align:center; }
  .trust-num{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:19px; color:var(--gold-soft); }
  .trust-label{ font-size:10px; color:var(--ink-dim); font-weight:600; margin-top:2px; text-transform:uppercase; letter-spacing:0.04em; }

  .open-pill{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:800; padding:5px 13px;
    border-radius:20px; margin-top:10px;
  }
  .open-pill.open{ background:rgba(61,158,47,0.18); color:#7ED06F; }
  .open-pill.closed{ background:rgba(255,106,77,0.16); color:var(--coral); }

  .action-row{ display:flex; gap:10px; margin:18px auto 0; max-width:420px; }
  .action-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px;
    border-radius:18px; font-size:13.5px; font-weight:800; cursor:pointer; border:none;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .action-btn.call{ background:var(--gold); color:#12151C; }
  .action-btn.call:hover{ background:var(--gold-soft); }
  .action-btn.map-btn{ background:var(--sun); color:#12151C; }
  .action-btn.map-btn:hover{ opacity:0.9; }

  .hours-card{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:6px 18px; }
  .hours-row{ display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .hours-row:last-child{ border-bottom:none; }
  .hours-row .day{ color:var(--ink-dim); }
  .hours-row .time{ font-weight:700; }
  .hours-row.today .day, .hours-row.today .time{ color:var(--gold-soft); font-weight:800; }
  .hours-row .dayoff{ color:var(--coral); font-weight:700; }

  .review-summary{
    display:flex; gap:20px; align-items:center; background:var(--surface); border:1px solid var(--line);
    border-radius:20px; padding:18px 20px; margin-bottom:12px;
  }
  .rs-left{ text-align:center; flex-shrink:0; }
  .rs-big{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:38px; line-height:1; }
  .rs-stars{ color:var(--gold); font-size:13px; margin-top:4px; letter-spacing:1px; }
  .rs-count{ font-size:11px; color:var(--ink-dim); margin-top:3px; }
  .rs-bars{ flex:1; display:flex; flex-direction:column; gap:5px; }
  .rs-bar-row{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--ink-dim); }
  .rs-bar-track{ flex:1; height:6px; border-radius:4px; background:var(--surface-2); overflow:hidden; }
  .rs-bar-fill{ height:100%; border-radius:4px; background:linear-gradient(90deg, var(--gold), var(--gold-soft)); }
  .rs-bar-n{ width:10px; text-align:right; }
  .rs-bar-c{ width:18px; }

  .contacts-card{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:6px 18px; }
  .contact-row{ display:flex; align-items:center; gap:13px; padding:13px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .contact-row:last-child{ border-bottom:none; }
  .contact-icon{
    width:36px; height:36px; border-radius:12px; background:var(--surface-2); display:flex;
    align-items:center; justify-content:center; font-size:15px; flex-shrink:0;

  .contact-label{ font-size:10.5px; color:var(--ink-dim); }
  .contact-value{ font-weight:700; color:var(--gold-soft); }

  .share-btn-profile{
    position:absolute; top:16px; right:64px; width:38px; height:38px; border-radius:50%;
    background:rgba(20,20,20,0.5); border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-size:15px;
    color:#fff; display:flex; align-items:center; justify-content:center; z-index:3; backdrop-filter:blur(6px);
  }

  .svc-duration-chip{
    display:inline-block; font-size:10.5px; color:var(--ink-dim); background:var(--surface-2);
    padding:3px 9px; border-radius:10px; margin-top:5px;
  }
  .svc-book-chip{
    background:var(--gold); color:#12151C; font-size:11.5px; font-weight:800; padding:8px 16px;
    border-radius:14px; flex-shrink:0; margin-left:10px;
  }
  .service-option .svc-main{ flex:1; min-width:0; }
  .service-option .svc-name{ font-weight:700; }
  .service-option .svc-right{ display:flex; align-items:center; }

  .tags{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:16px; }
  .tag{ font-size:11.5px; border:1px solid var(--line); color:var(--ink-dim); padding:6px 13px; border-radius:20px; background:var(--surface); }
  .bio{ font-size:14px; line-height:1.7; text-align:center; max-width:480px; margin:18px auto 0; color:var(--ink-dim); }

  .section-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:19px; margin:32px 0 14px; }

  .portfolio-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; }
  .portfolio-grid img{ width:100%; aspect-ratio:1; object-fit:cover; border-radius:16px; }

  .service-option{
    display:flex; justify-content:space-between; align-items:center; padding:15px 17px;
    border:1px solid var(--line); border-radius:18px; margin-bottom:9px; cursor:pointer; font-size:14px;
    background:var(--surface); transition:border-color .15s ease;
  }
  .service-option:hover, .service-option.selected{ border-color:var(--gold); }
  .booking-summary-line{
    font-size:12.5px; color:var(--ink-dim); background:var(--surface-2); padding:10px 14px;
    border-radius:12px; margin-bottom:14px;
  }
  .booking-summary-line strong{ color:var(--gold-soft); }
  .svc-price{ font-weight:800; color:var(--gold-soft); }

  .day-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin:14px 0; }
  .day-tab{ flex-shrink:0; background:var(--surface); border:1.5px solid var(--line); color:var(--ink-dim); padding:9px 13px; border-radius:14px; font-size:12px; cursor:pointer; min-width:52px; text-align:center; font-weight:700; }
  .day-tab.active{ background:var(--gold); border-color:var(--gold); color:#12151C; }
  .slot-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
  .slot-btn{ background:var(--surface); border:1.5px solid var(--line); color:var(--ink); padding:11px 6px; border-radius:14px; font-size:13px; cursor:pointer; text-align:center; font-weight:700; }
  .slot-btn:hover{ border-color:var(--gold); }
  .slot-btn.selected{ background:var(--gold); border-color:var(--gold); color:#12151C; }
  .slot-btn.taken{ opacity:0.3; cursor:not-allowed; text-decoration:line-through; }
  .no-slots-msg, .login-prompt{ grid-column:1/-1; text-align:center; padding:14px; color:var(--ink-dim); font-size:13px; }
  .login-prompt a{ color:var(--gold-soft); font-weight:700; }
  .booking-toast{ grid-column:1/-1; text-align:center; font-size:14px; color:var(--gold-soft); padding:10px; font-family:'Space Grotesk', sans-serif; font-weight:600; }
  .back-link{ font-size:12.5px; color:var(--ink-dim); cursor:pointer; margin-bottom:10px; display:inline-block; }
  .confirm-booking-btn{
    grid-column:1/-1; margin-top:6px; background:var(--gold); color:#12151C; border:none; padding:14px;
    border-radius:20px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;
  }
  .confirm-booking-btn:hover{ background:var(--gold-soft); }
  .confirm-booking-btn:disabled{ opacity:0.6; cursor:not-allowed; }
  .ref-photo-row{ grid-column:1/-1; margin-top:8px; }
  .ref-photo-label{
    display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim); cursor:pointer;
    padding:9px 12px; border:1px dashed var(--line); border-radius:14px; justify-content:center;
  }
  .ref-photo-label:hover{ border-color:var(--gold-soft); color:var(--gold-soft); }

  #locationMapEl{ height:220px; border-radius:20px; overflow:hidden; border:1px solid var(--line); }

  .fav-btn-profile{
    position:absolute; top:16px; right:16px; width:38px; height:38px; border-radius:50%;
    background:rgba(20,20,20,0.5); border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-size:17px;
    color:#fff; display:flex; align-items:center; justify-content:center; z-index:3; backdrop-filter:blur(6px);
  }
  .fav-btn-profile.favorited{ color:#E05252; }
  .back-btn{
    position:absolute; top:16px; left:16px; width:38px; height:38px; border-radius:50%;
    background:rgba(20,20,20,0.5); border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-size:16px;
    color:#fff; display:flex; align-items:center; justify-content:center; z-index:3; backdrop-filter:blur(6px);
  }

  .sticky-book-bar{
    position:fixed; bottom:0; left:0; right:0; background:rgba(20,20,20,0.9); backdrop-filter:blur(20px);
    border-top:1px solid var(--line); padding:14px 20px calc(14px + env(safe-area-inset-bottom));
    z-index:40; display:flex; justify-content:center;
  }
  .sticky-book-btn{
    width:100%; max-width:600px; background:var(--gold); color:#12151C; border:none; padding:16px;
    border-radius:20px; font-size:14px; font-weight:800; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;
  }
  .sticky-book-btn:hover{ background:var(--gold-soft); }

  footer{ padding:20px 0 20px; text-align:center; }
</style>
</head>

const T = {

};
const storedLang = localStorage.getItem('ustara_lang');
const browserLang = (navigator.language || 'en').slice(0,2);
const lang = T[storedLang] ? storedLang : (T[browserLang] ? browserLang : 'en');
function t(k){ return T[lang][k]; }
document.getElementById('footTermsLink').textContent = t('foot_terms');
document.getElementById('footPrivacyLink').textContent = t('foot_privacy');
function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function formatPrice(n){ return n ? Number(n).toLocaleString('en-US').replace(/,/g,' ') + ' UZS' : ''; }
function localizeSpecialty(s){ const i = SPECIALTIES_EN.indexOf(s); return i === -1 ? s : SPECIALTIES_LOCAL[lang][i]; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function portfolioPublicUrl(imagePath){
  const { data } = supabaseClient.storage.from('barber-media').getPublicUrl(imagePath);
  return data.publicUrl;
}
function serviceName(key){
  const svc = servicesData.find(s => s.service_key === key);
  return (svc && svc.custom_label) || SERVICES_LOCAL[lang][key] || key;
}

let currentUser = null, currentClientProfile = null, barberData = null, servicesData = [];
let favoriteIds = new Set();

async function init(){
  const params = new URLSearchParams(window.location.search);
  const barberId = params.get('id');
  const content = document.getElementById('content');
  if(!barberId){ content.innerHTML = `<div class="error-state">${t('not_found')}</div>`; return; }

  const { data: barber, error } = await supabaseClient.from('barbers').select('*')
    .eq('id', barberId).eq('is_published', true).eq('is_approved', true).single();
  if(error || !barber){ content.innerHTML = `<div class="error-state">${t('not_found')}</div>`; return; }
  barberData = barber;

  const { data: services } = await supabaseClient.from('services').select('*').eq('barber_id', barberId).eq('is_active', true);
  servicesData = services || [];

  let portfolioPhotos = [];
  try {
    const { data } = await supabaseClient.from('portfolio_photos').select('*').eq('barber_id', barberId).order('created_at', { ascending:false });
    portfolioPhotos = data || [];
  } catch(e){ console.warn('portfolio_photos fetch failed:', e); }

  // real, honest trust indicator
  const { count: completedCount } = await supabaseClient
    .from('bookings').select('*', { count: 'exact', head: true })
    .eq('barber_id', barberId).eq('status', 'completed');

  const { data: reviews } = await supabaseClient
    .from('reviews').select('*').eq('barber_id', barberId).order('created_at', { ascending:false });
  const reviewsData = reviews || [];

  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(sessionData.session){
    currentUser = sessionData.session.user;
    const { data: client } = await supabaseClient.from('clients').select('*').eq('id', currentUser.id).single();
    currentClientProfile = client;
    if(currentClientProfile){
      const { data: favs } = await supabaseClient.from('favorites').select('barber_id').eq('client_id', currentUser.id);
      favoriteIds = new Set((favs || []).map(f => f.barber_id));
    }
  }

  render(portfolioPhotos, completedCount || 0, reviewsData);
}

function isOpenNow(){
  const now = new Date();
  const blocks = blocksForDay(JS_DAY_TO_KEY[now.getDay()]);
  const mins = now.getHours() * 60 + now.getMinutes();
  return blocks.some(bl => {
    const [sh, sm] = bl.start.split(':').map(Number);
    const [eh, em] = bl.end.split(':').map(Number);
    return mins >= sh * 60 + sm && mins < eh * 60 + em;
  });
}

function hoursListHtml(){
  // Monday-first display order; JS_DAY_TO_KEY is Sunday-first
  const order = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const todayKey = JS_DAY_TO_KEY[new Date().getDay()];
  const hasAnyHours = order.some(k => blocksForDay(k).length > 0);
  if(!hasAnyHours) return '';
  return `
    <div class="section-title">🕐 ${t('hours_title')}</div>
    <div class="hours-card">
      ${order.map((key, i) => {
        const blocks = blocksForDay(key);
        const isToday = key === todayKey;
        const timeStr = blocks.length > 0
          ? blocks.map(bl => `${bl.start} – ${bl.end}`).join(', ')
          : `<span class="dayoff">${t('day_off')}</span>`;
        return `
          <div class="hours-row ${isToday ? 'today' : ''}">
            <span class="day">${t('day_names')[i]}${isToday ? ' ' + t('today_word') : ''}</span>
            <span class="time">${timeStr}</span>
          </div>`;
      }).join('')}
    </div>`;
}

function reviewSummaryHtml(reviewsData, avgRating){
  if(reviewsData.length === 0) return '';
  const counts = [0,0,0,0,0];
  reviewsData.forEach(r => { if(r.rating >= 1 && r.rating <= 5) counts[r.rating - 1]++; });
  const max = Math.max(...counts, 1);
  const rounded = Math.round(parseFloat(avgRating));
  return `
    <div class="review-summary">
      <div class="rs-left">
        <div class="rs-big">${avgRating}</div>
        <div class="rs-stars">${'★'.repeat(rounded)}${'☆'.repeat(5 - rounded)}</div>
        <div class="rs-count">${reviewsData.length} ${t('reviews_word')}</div>
      </div>
      <div class="rs-bars">
        ${[5,4,3,2,1].map(n => `
          <div class="rs-bar-row">
            <span class="rs-bar-n">${n}</span>
            <div class="rs-bar-track"><div class="rs-bar-fill" style="width:${(counts[n-1] / max) * 100}%"></div></div>
            <span class="rs-bar-c">${counts[n-1]}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function render(portfolioPhotos, completedCount, reviewsData){

  const specs = (b.specialties || []).map(s => `<span class="tag">${escapeHtml(localizeSpecialty(s))}</span>`).join('');
  const avatar = b.avatar_url ? `<img src="${escapeHtml(b.avatar_url)}" alt="">` : initials(b.full_name);
  const heroPhoto = portfolioPhotos[0]
    ? `<img src="${escapeHtml(portfolioPublicUrl(portfolioPhotos[0].image_path))}" alt="">`
    : `<div class="no-photo-bg"></div>`;

  const avgRating = reviewsData.length > 0
    ? (reviewsData.reduce((sum, r) => sum + r.rating, 0) / reviewsData.length).toFixed(1)
    : null;
  const recentReviews = reviewsData.slice(0, 3);
  const open = isOpenNow();
  const mapUrl = b.latitude && b.longitude ? `https://www.google.com/maps/search/?api=1&query=${b.latitude},${b.longitude}` : null;
  const tgUsername = (b.telegram_username || '').replace(/^@/, '');

  document.title = `${b.full_name} — Ustara`;

  document.getElementById('content').innerHTML = `
    <div class="hero-photo">
      ${heroPhoto}
      <button class="back-btn" onclick="if(history.length > 1){ history.back(); } else { window.location.href='client-dashboard.html'; }">←</button>
      <button class="share-btn-profile" id="shareBtnProfile">↗</button>
      <button class="fav-btn-profile" id="favBtnProfile">${favoriteIds.has(b.id) ? '♥' : '♡'}</button>
    </div>

    <div class="hero">
      <div class="avatar">
        ${avatar}
        ${b.is_approved ? `<div class="verified-badge">✓</div>` : ''}
      </div>
      <h1>${escapeHtml(b.full_name)}</h1>
      <div class="meta">${escapeHtml(b.shop_name || '')}${b.shop_name ? ' · ' : ''}${escapeHtml(b.district || '')}${b.years_experience ? ' · ' + b.years_experience + ' ' + t('years') : ''}</div>
      ${avgRating ? `<div class="rating-line">★ ${avgRating} <span>(${reviewsData.length} ${t('reviews_word')})</span></div>` : `<div class="rating-line new-badge">${t('new_barber')}</div>`}
      <div><span class="open-pill ${open ? 'open' : 'closed'}">${open ? '🟢 ' + t('open_now') : '🔴 ' + t('closed_now')}</span></div>

      ${b.phone || mapUrl ? `
        <div class="action-row">
          ${b.phone ? `<a class="action-btn call" href="tel:${escapeHtml(b.phone)}">📞 ${t('call_btn')}</a>` : ''}
          ${mapUrl ? `<a class="action-btn map-btn" href="${mapUrl}" target="_blank" rel="noopener">📍 ${t('map_btn')}</a>` : ''}
        </div>
      ` : ''}

      <div class="trust-row">
        <div class="trust-item"><div class="trust-num">${completedCount}+</div><div class="trust-label">${t('trust_clients')}</div></div>
        ${b.years_experience ? `<div class="trust-item"><div class="trust-num">${b.years_experience}</div><div class="trust-label">${t('trust_years')}</div></div>` : ''}
        ${b.is_approved ? `<div class="trust-item"><div class="trust-num">✓</div><div class="trust-label">${t('trust_verified')}</div></div>` : ''}
      </div>

      <div class="tags">${specs}</div>
      ${b.bio ? `<div class="bio">${escapeHtml(b.bio)}</div>` : ''}
    </div>

    <div class="wrap">
      <div class="section-title" id="bookingSectionTitle">✂️ ${t('book_title')}</div>
      <div id="bookingArea"></div>

      ${hoursListHtml()}

      ${portfolioPhotos.length > 0 ? `
        <div class="section-title">📸 ${t('portfolio')}</div>
        <div class="portfolio-grid">${portfolioPhotos.map(p => `<img src="${escapeHtml(portfolioPublicUrl(p.image_path))}" alt="">`).join('')}</div>
      ` : ''}

      ${reviewsData.length > 0 ? `
        <div class="section-title">⭐ ${t('reviews_title')}</div>
        ${reviewSummaryHtml(reviewsData, avgRating)}
        <div class="reviews-list">
          ${recentReviews.map(r => `
            <div class="review-card">
              <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
              ${r.comment ? `<div class="review-comment">${escapeHtml(r.comment)}</div>` : ''}
              <div class="review-date">${new Date(r.created_at).toLocaleDateString()}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${b.latitude && b.longitude && b.is_location_verified ? `
        <div class="section-title">📍 ${t('location')}</div>
        <div id="locationMapEl"></div>
      ` : ''}

      ${b.phone || tgUsername ? `
        <div class="section-title">💬 ${t('contacts_title')}</div>
        <div class="contacts-card">
          ${b.phone ? `
            <a class="contact-row" href="tel:${escapeHtml(b.phone)}">
              <div class="contact-icon">📞</div>
              <div><div class="contact-label">${t('contact_phone')}</div><div class="contact-value">${escapeHtml(b.phone)}</div></div>
            </a>` : ''}
          ${tgUsername ? `
            <a class="contact-row" href="https://t.me/${escapeHtml(tgUsername)}" target="_blank" rel="noopener">
              <div class="contact-icon">✈️</div>
              <div><div class="contact-label">${t('contact_telegram')}</div><div class="contact-value">@${escapeHtml(tgUsername)}</div></div>
            </a>` : ''}
        </div>
      ` : ''}
    </div>

    <div class="sticky-book-bar">
      <button class="sticky-book-btn" onclick="document.getElementById('bookingSectionTitle').scrollIntoView({behavior:'smooth'})">
        ${t('sticky_book').replace('{name}', escapeHtml(b.full_name.split(' ')[0]))}
      </button>
    </div>
  `;

  if(b.latitude && b.longitude && b.is_location_verified){
    const m = L.map('locationMapEl').setView([b.latitude, b.longitude], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap contributors', maxZoom:19 }).addTo(m);
    L.marker([b.latitude, b.longitude]).addTo(m).bindPopup(escapeHtml(b.shop_name || b.full_name));
  }

  renderServiceChoices();
  document.getElementById('favBtnProfile').addEventListener('click', ()=> toggleFavorite(b.id));
  document.getElementById('shareBtnProfile').addEventListener('click', async ()=>{
    const url = window.location.href;
    if(navigator.share){
      navigator.share({ title: `${b.full_name} — Ustara`, url }).catch(()=>{});
    } else {
      await navigator.clipboard.writeText(url).catch(()=>{});
      const btn = document.getElementById('shareBtnProfile');
      btn.textContent = '✓';
      setTimeout(()=> btn.textContent = '↗', 1500);
    }
  });
}

function renderServiceChoices(){
  const area = document.getElementById('bookingArea');
  if(servicesData.length === 0){
    area.innerHTML = `<div class="no-slots-msg">${t('no_slots')}</div>`;
    return;
  }
  area.innerHTML = servicesData.map(s => `
    <div class="service-option" data-key="${s.service_key}" data-duration="${s.duration_minutes}" data-price="${s.price || 0}">
      <div class="svc-main">
        <div class="svc-name">${escapeHtml(s.custom_label || SERVICES_LOCAL[lang][s.service_key] || s.service_key)}</div>
        <span class="svc-duration-chip">⏱ ${s.duration_minutes} ${t('min')}</span>
      </div>
      <div class="svc-right">
        <span class="svc-price">${formatPrice(s.price)}</span>
        <span class="svc-book-chip">${t('book_chip')}</span>
      </div>
    </div>
  `).join('');
  area.querySelectorAll('.service-option').forEach(opt=>{
    opt.addEventListener('click', ()=> showAddonPicker(opt.dataset.key, parseInt(opt.dataset.duration), parseInt(opt.dataset.price) || 0));
  });
}

function showAddonPicker(mainKey, mainDuration, mainPrice){
  const area = document.getElementById('bookingArea');
  const addonOptions = servicesData.filter(s => s.service_key !== mainKey);

  if(addonOptions.length === 0){
    showDayPicker(mainKey, mainDuration, mainPrice, []);
    return;
  }

  const selectedAddons = new Set();
  area.innerHTML = `
    <span class="back-link" id="addonBackBtn">← ${t('back')}</span>
    <div class="pop-section-t">${t('addon_title')}</div>
    ${addonOptions.map(s => `
      <div class="service-option addon-option" data-addon-key="${s.service_key}" data-addon-duration="${s.duration_minutes}" data-addon-price="${s.price || 0}">
        <span>${escapeHtml(s.custom_label || SERVICES_LOCAL[lang][s.service_key] || s.service_key)} · ${s.duration_minutes} ${t('min')}</span>
        <span class="svc-price">+${formatPrice(s.price)}</span>
      </div>`).join('')}
    <button class="confirm-booking-btn" id="continueWithAddonsBtn">${t('continue_btn')}</button>
  `;
  document.getElementById('addonBackBtn').addEventListener('click', renderServiceChoices);

  area.querySelectorAll('.addon-option').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      const key = opt.dataset.addonKey;
      if(selectedAddons.has(key)){ selectedAddons.delete(key); opt.classList.remove('selected'); }
      else { selectedAddons.add(key); opt.classList.add('selected'); }
    });
  });

  document.getElementById('continueWithAddonsBtn').addEventListener('click', ()=>{
    let totalDuration = mainDuration, totalPrice = mainPrice;
    const addonKeys = [];
    selectedAddons.forEach(key => {
      const svc = addonOptions.find(s => s.service_key === key);
      if(svc){ totalDuration += svc.duration_minutes; totalPrice += (svc.price || 0); addonKeys.push(key); }
    });
    showDayPicker(mainKey, totalDuration, totalPrice, addonKeys);
  });
}

function blocksForDay(dayKey){
  if(barberData.availability && barberData.availability.length > 0){
    return barberData.availability.filter(block => block.day === dayKey);
  }
  if((barberData.work_days || []).includes(dayKey)){
    return [{ start: (barberData.work_start || '09:00').slice(0,5), end: (barberData.work_end || '20:00').slice(0,5) }];
  }
  return [];
}

function generateSlotsForDate(dateObj, duration, bookedIsoSet){
  const dayKey = JS_DAY_TO_KEY[dateObj.getDay()];
  const blocks = blocksForDay(dayKey);
  if(blocks.length === 0) return [];
  const slots = []; const now = new Date();
  blocks.forEach(block => {
    const [startH, startM] = block.start.split(':').map(Number);
    const [endH, endM] = block.end.split(':').map(Number);
    let cursor = new Date(dateObj); cursor.setHours(startH, startM, 0, 0);
    const end = new Date(dateObj); end.setHours(endH, endM, 0, 0);
    while(cursor < end){
      if(cursor > now){
        const iso = cursor.toISOString();
        slots.push({ label: cursor.toLocaleTimeString(lang==='en'?'en-US':lang, { hour:'2-digit', minute:'2-digit' }), iso, taken: bookedIsoSet.has(iso) });
      }
      cursor = new Date(cursor.getTime() + duration*60000);
    }
  });
  return slots;
}

async function showDayPicker(serviceKey, duration, price, addonKeys = []){
  const area = document.getElementById('bookingArea');
  const rangeStart = new Date(); const rangeEnd = new Date(); rangeEnd.setDate(rangeEnd.getDate()+7);
  const { data: existing } = await supabaseClient.from('bookings').select('start_time').eq('barber_id', barberData.id)
    .in('status', ['pending','confirmed']).gte('start_time', rangeStart.toISOString()).lte('start_time', rangeEnd.toISOString());
  const bookedIsoSet = new Set((existing || []).map(x => new Date(x.start_time).toISOString()));

  const days = [];
  for(let i=0;i<7;i++){ const d = new Date(); d.setDate(d.getDate()+i); if(blocksForDay(JS_DAY_TO_KEY[d.getDay()]).length > 0) days.push(d); }

  const summaryLine = addonKeys.length > 0
    ? `<div class="booking-summary-line">${escapeHtml(serviceName(serviceKey))} + ${escapeHtml(addonKeys.map(k => serviceName(k)).join(', '))} · ${duration} ${t('min')} · <strong>${formatPrice(price)}</strong></div>`
    : '';

  area.innerHTML = `
    <span class="back-link" id="backBtn">← ${t('back')}</span>
    ${summaryLine}
    ${days.length === 0 ? `<div class="no-slots-msg">${t('no_slots')}</div>` : `<div class="day-tabs" id="dayTabs"></div><div class="slot-grid" id="slotGrid"></div>`}
  `;
  document.getElementById('backBtn').addEventListener('click', renderServiceChoices);
  if(days.length === 0) return;

  const dayTabs = document.getElementById('dayTabs');
  const slotGrid = document.getElementById('slotGrid');

  let selectedSlotIso = null;
  let selectedRefPhoto = null;

  function selectDay(idx){
    selectedSlotIso = null;
    selectedRefPhoto = null;
    let useSavedStyle = false;
    const hasSavedStyle = currentClientProfile && (currentClientProfile.style_notes || currentClientProfile.style_photo_url);
    document.querySelectorAll('.day-tab').forEach((el,i)=> el.classList.toggle('active', i===idx));
    const slots = generateSlotsForDate(days[idx], duration, bookedIsoSet);
    if(slots.length === 0){ slotGrid.innerHTML = `<div class="no-slots-msg">${t('no_slots')}</div>`; return; }
    slotGrid.innerHTML = slots.map(s => `<div class="slot-btn ${s.taken?'taken':''}" data-iso="${s.iso}">${s.label}</div>`).join('')
      + (hasSavedStyle ? `
        <div class="ref-photo-row" id="savedStyleRow" style="display:none;">
          <label class="ref-photo-label" id="useSavedStyleBtn" style="cursor:pointer;">✨ <span>${t('use_saved_style')}</span></label>
        </div>` : '')
      + `<div class="ref-photo-row" id="refPhotoRow" style="display:none;">
           <label class="ref-photo-label" for="refPhotoInput">📎 <span id="refPhotoLabelText">${t('attach_reference')}</span></label>
           <input type="file" id="refPhotoInput" accept="image/*" style="display:none;">
         </div>
         <button class="confirm-booking-btn" id="confirmBookingBtn" style="display:none;">${t('confirm_booking_btn')}</button>`;
    const confirmBtn = document.getElementById('confirmBookingBtn');
    const refRow = document.getElementById('refPhotoRow');
    const refInput = document.getElementById('refPhotoInput');
    const savedStyleRow = document.getElementById('savedStyleRow');
    refInput.addEventListener('change', ()=>{
      selectedRefPhoto = refInput.files[0] || null;
      useSavedStyle = false;
      document.getElementById('refPhotoLabelText').textContent = selectedRefPhoto ? selectedRefPhoto.name : t('attach_reference');
      const btn = document.getElementById('useSavedStyleBtn');
      if(btn) btn.querySelector('span').textContent = t('use_saved_style');
    });
    if(savedStyleRow){
      document.getElementById('useSavedStyleBtn').addEventListener('click', ()=>{
        useSavedStyle = !useSavedStyle;
        selectedRefPhoto = null;
        document.getElementById('useSavedStyleBtn').querySelector('span').textContent = useSavedStyle ? t('using_saved_style') : t('use_saved_style');
        document.getElementById('refPhotoLabelText').textContent = t('attach_reference');
      });
    }

    slotGrid.querySelectorAll('.slot-btn:not(.taken)').forEach(el=>{
      el.addEventListener('click', ()=>{
        slotGrid.querySelectorAll('.slot-btn').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selectedSlotIso = el.dataset.iso;
        refRow.style.display = 'flex';
        if(savedStyleRow) savedStyleRow.style.display = 'flex';
        confirmBtn.style.display = 'block';
        confirmBtn.textContent = t('confirm_booking_btn') + ' — ' + el.textContent;
      });
    });

    confirmBtn.addEventListener('click', async ()=>{
      if(!selectedSlotIso) return;
      if(!currentUser){
        const { data: sessionData } = await supabaseClient.auth.getSession();
        if(sessionData.session){
          currentUser = sessionData.session.user;
          const { data: client } = await supabaseClient.from('clients').select('*').eq('id', currentUser.id).single();
          currentClientProfile = client;
        }
      }
      if(!currentUser || !currentClientProfile){
        slotGrid.innerHTML = `<div class="login-prompt">${t('login_prompt')}<br><a href="auth.html">${t('login_btn')} →</a></div>`;
        return;
      }
      confirmBtn.disabled = true;
      confirmBtn.textContent = t('booking_in_progress');

      let referencePhotoUrl = null;
      let styleNotesToSave = null;
      if(useSavedStyle && currentClientProfile){
        referencePhotoUrl = currentClientProfile.style_photo_url || null;
        styleNotesToSave = currentClientProfile.style_notes || null;
      } else if(selectedRefPhoto){
        const ext = selectedRefPhoto.name.split('.').pop();
        const path = `${currentUser.id}/${crypto.randomUUID()}.${ext}`;
        const { error: uploadError } = await supabaseClient.storage.from('booking-references').upload(path, selectedRefPhoto);
        if(!uploadError){
          const { data: urlData } = supabaseClient.storage.from('booking-references').getPublicUrl(path);
          referencePhotoUrl = urlData.publicUrl;
        } else {
          console.warn('Reference photo upload failed, continuing without it:', uploadError);
        }
      }

      const { error } = await supabaseClient.from('bookings').insert([{
        barber_id: barberData.id, client_id: currentUser.id,
        client_name: currentClientProfile.full_name, client_phone: currentClientProfile.phone,
        start_time: selectedSlotIso, status:'pending', service_key: serviceKey, service_label: serviceName(serviceKey),
        service_duration_minutes: duration,
        service_price: price, reference_photo_url: referencePhotoUrl, style_notes: styleNotesToSave,
        addon_keys: addonKeys
      }]);
      if(error){
        console.error('Booking insert failed:', error);
        slotGrid.innerHTML = `<div class="no-slots-msg">${t('booking_failed')}${error.code !== '23505' ? `<br><span style="font-size:11px; opacity:0.7;">(${escapeHtml(error.message)})</span>` : ''}</div>`;
        return;
      }
      window.location.href = 'client-dashboard.html';
    });
  }
  dayTabs.innerHTML = days.map(d => `<div class="day-tab">${d.toLocaleDateString(lang==='en'?'en-US':lang,{weekday:'short',day:'numeric'})}</div>`).join('');
  Array.from(dayTabs.children).forEach((el,i)=> el.addEventListener('click', ()=> selectDay(i)));
  selectDay(0);
}

async function toggleFavorite(barberId){
  if(!currentUser || !currentClientProfile){ window.location.href = 'auth.html'; return; }
  const btn = document.getElementById('favBtnProfile');
  const isFav = favoriteIds.has(barberId);
  btn.disabled = true;
  if(isFav){
    const { error } = await supabaseClient.from('favorites').delete().eq('client_id', currentUser.id).eq('barber_id', barberId);
    if(!error){ favoriteIds.delete(barberId); btn.classList.remove('favorited'); btn.textContent = '♡'; }
  } else {
    const { error } = await supabaseClient.from('favorites').insert([{ client_id: currentUser.id, barber_id: barberId }]);
    if(!error){ favoriteIds.add(barberId); btn.classList.add('favorited'); btn.textContent = '♥'; }
  }
  btn.disabled = false;
}

init();
