<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ustara — Your dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#F7F4EF; --surface:#FFFFFF; --surface-alt:#EFEAE1; --line:#E9E2D3;
    --ink:#1C1A17; --ink-dim:#8A8175; --brass:#A67C1A; --brass-soft:#C79A2E;
    --err:#B3432B; --err-bg:#FBEDE9; --ok:#3F7A54; --ok-bg:#EBF5EE; --warn-bg:#FCF3E3; --warn:#96701A;
    --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:28px;
    --sh-sm:0 1px 2px rgba(28,26,23,0.05), 0 1px 1px rgba(28,26,23,0.04);
    --sh-md:0 6px 20px rgba(28,26,23,0.07), 0 2px 6px rgba(28,26,23,0.04);
    --sh-lg:0 16px 40px rgba(28,26,23,0.12);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; font-feature-settings:"cv11","ss01";
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
    min-height:100vh; position:relative;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--brass); color:#fff; }

  .view{ display:none; }
  .view.active{ display:block; animation:fadein .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadein{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }

  .wrap{ padding:0 20px; }

  /* ================= HERO ================= */
  .hero-card{
    position:relative; margin:16px 16px 0; border-radius:var(--r-xl); overflow:hidden;
    height:230px; display:flex; align-items:flex-end; box-shadow:var(--sh-lg);
    background:linear-gradient(135deg, #3A3226, #1C1A17);
  }
  .hero-card video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.78; }
  .hero-card .hero-fallback-anim{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(199,154,46,0.35), transparent 55%),
      linear-gradient(120deg, #2B2620, #4A3B1F, #1C1A17, #3A3226);
    background-size:auto, 300% 300%; animation:heroShift 14s ease infinite; opacity:0.95;
  }
  @keyframes heroShift{ 0%{ background-position:0 0, 0% 50%; } 50%{ background-position:0 0, 100% 50%; } 100%{ background-position:0 0, 0% 50%; } }
  .hero-card::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(15,13,11,0.92), rgba(15,13,11,0.15) 55%, transparent);
  }
  .hero-content{ position:relative; z-index:2; padding:24px 24px 22px; color:#FBF9F5; width:100%; }
  .hero-eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass-soft);
    font-weight:700; margin-bottom:7px; display:flex; align-items:center; gap:6px;
  }
  .hero-eyebrow::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--brass-soft); display:inline-block; }
  .hero-greeting{ font-family:'Fraunces', serif; font-size:25px; font-weight:500; line-height:1.2; letter-spacing:-0.01em; }
  .hero-greeting em{ font-style:italic; color:var(--brass-soft); }

  /* ================= SECTIONS ================= */
  section{ padding:32px 0 4px; }
  .section-title{
    font-family:'Fraunces', serif; font-size:18px; font-weight:500; letter-spacing:-0.01em;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
  }
  .see-all{
    font-size:12.5px; color:var(--brass); font-weight:700; display:flex; align-items:center; gap:3px;
    cursor:pointer;
  }
  .see-all::after{ content:'→'; font-size:12px; transition:transform .15s; }
  .see-all:active::after{ transform:translateX(2px); }

  /* ================= STAT PILLS ================= */
  .pill-row{ display:flex; gap:12px; overflow-x:auto; padding:2px 20px 8px; margin:0 -20px 4px; }
  .pill{
    flex-shrink:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md);
    padding:16px 20px; min-width:118px; box-shadow:var(--sh-sm); position:relative;
  }
  .pill .num{ font-family:'Fraunces', serif; font-size:24px; color:var(--brass); font-weight:500; letter-spacing:-0.01em; }
  .pill .label{ font-size:11.5px; color:var(--ink-dim); margin-top:3px; font-weight:500; }

  /* ================= SKELETON LOADING ================= */
  .skel-pill{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:16px 20px; min-width:118px; }
  .skel-line{
    height:14px; border-radius:6px;
    background:linear-gradient(90deg, var(--surface-alt) 25%, #F5F0E5 50%, var(--surface-alt) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }
  .skel-line.w40{ width:40%; height:20px; margin-bottom:6px; }
  .skel-line.w60{ width:60%; height:11px; }
  .skel-card-row{
    display:flex; gap:14px; align-items:center; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--r-lg); padding:16px; margin-bottom:12px; box-shadow:var(--sh-sm);
  }
  .skel-avatar{ width:52px; height:52px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(90deg, var(--surface-alt) 25%, #F5F0E5 50%, var(--surface-alt) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite; }
  .skel-card-body{ flex:1; }
  .skel-card-body .skel-line{ margin-bottom:8px; }
  .skel-card-body .skel-line:last-child{ margin-bottom:0; }

  /* ================= BOOKING CARD ================= */
  .booking-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:center;
    transition:transform .15s cubic-bezier(.2,.8,.2,1), box-shadow .15s ease; position:relative; overflow:hidden;
    box-shadow:var(--sh-sm);
  }
  .booking-card:active{ transform:scale(0.98); box-shadow:var(--sh-sm); }
  .booking-card .avatar{
    width:52px; height:52px; border-radius:50%; background:var(--surface-alt); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces', serif;
    font-style:italic; color:var(--brass); font-size:18px; overflow:hidden; border:1px solid var(--line);
  }
  .booking-card .avatar img{ width:100%; height:100%; object-fit:cover; }
  .booking-info{ flex:1; min-width:0; }
  .booking-info .name{ font-weight:700; font-size:14.5px; letter-spacing:-0.005em; }
  .booking-info .meta{ font-size:12.5px; color:var(--ink-dim); margin-top:3px; font-weight:500; }
  .booking-status{
    font-size:10.5px; padding:5px 11px; border-radius:20px; text-transform:capitalize;
    background:var(--surface-alt); flex-shrink:0; font-weight:700; letter-spacing:0.01em;
  }
  .booking-status.confirmed{ background:var(--ok-bg); color:var(--ok); }
  .booking-status.pending{ background:var(--warn-bg); color:var(--warn); }
  .booking-status.cancelled{ background:var(--err-bg); color:var(--err); }
  .booking-status.completed{ background:var(--surface-alt); color:var(--ink-dim); }

  .cancel-booking-btn{
    font-size:10.5px; font-weight:700; color:var(--err); background:none; border:1px solid #ECC9BE;
    padding:5px 12px; border-radius:20px; cursor:pointer; font-family:'Inter', sans-serif;
    transition:background .15s ease;
  }
  .cancel-booking-btn:hover{ background:var(--err-bg); }
  .cancel-booking-btn:active{ transform:scale(0.95); }
  .cancel-booking-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  /* ================= EMPTY STATE ================= */
  .empty-state{
    text-align:center; padding:40px 24px; border:1.5px dashed var(--line); border-radius:var(--r-lg);
    color:var(--ink-dim); font-size:13.5px;
  }
  .empty-state .icon{
    font-size:26px; margin:0 auto 14px; width:52px; height:52px; border-radius:50%;
    background:var(--surface-alt); display:flex; align-items:center; justify-content:center;
  }
  .empty-state strong{ font-family:'Fraunces', serif; font-size:16px; font-weight:500; color:var(--ink); display:block; margin-bottom:4px; }
  .empty-state .btn{
    display:inline-block; margin-top:16px; background:var(--brass); color:#fff; padding:12px 22px;
    border-radius:24px; font-size:13px; font-weight:700; box-shadow:0 4px 14px rgba(166,124,26,0.28);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .empty-state .btn:active{ transform:scale(0.96); }

  /* ================= MAP TEASER ================= */
  .map-teaser{
    position:relative; border-radius:var(--r-lg); overflow:hidden; height:176px;
    background:var(--surface-alt); border:1px solid var(--line); margin-bottom:8px; box-shadow:var(--sh-sm);
  }
  .map-teaser svg{ position:absolute; inset:0; width:100%; height:100%; opacity:0.45; }
  .map-teaser .teaser-content{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:20px; gap:6px;
    background:linear-gradient(to top, rgba(247,244,239,0.94), rgba(247,244,239,0.5));
  }
  .map-teaser .teaser-content strong{ font-family:'Fraunces', serif; font-size:16.5px; font-weight:500; }
  .map-teaser .teaser-content span{ font-size:12.5px; color:var(--ink-dim); }
  .map-pin-anim{
    width:36px; height:36px; border-radius:50% 50% 50% 0; background:var(--brass);
    transform:rotate(-45deg); position:relative; margin-bottom:8px; animation:pinBounce 2.6s ease-in-out infinite;
    box-shadow:0 4px 10px rgba(166,124,26,0.3);
  }
  .map-pin-anim::after{
    content:''; position:absolute; width:13px; height:13px; background:#fff; border-radius:50%;
    top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg);
  }
  @keyframes pinBounce{ 0%,100%{ transform:rotate(-45deg) translateY(0); } 50%{ transform:rotate(-45deg) translateY(-7px); } }

  /* ================= ACCOUNT ================= */
  .info-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:4px 20px; box-shadow:var(--sh-sm); }
  .info-row{ display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--ink-dim); font-weight:500; }
  .info-row .v{ font-weight:600; }

  .logout-btn{
    width:100%; margin-top:24px; font-size:13.5px; color:var(--err); background:var(--surface);
    border:1px solid var(--line); padding:15px; border-radius:var(--r-md); cursor:pointer;
    font-family:'Inter', sans-serif; font-weight:700; transition:background .15s ease, border-color .15s ease;
  }
  .logout-btn:hover{ background:var(--err-bg); border-color:#ECC9BE; }
  .logout-btn:active{ transform:scale(0.98); }

  .lang-row{ display:flex; gap:8px; margin-top:16px; }
  .lang-btn{
    flex:1; padding:12px; border-radius:var(--r-sm); border:1px solid var(--line); background:var(--surface);
    color:var(--ink-dim); font-size:13px; font-weight:700; cursor:pointer; transition:all .15s ease;
  }
  .lang-btn.active{ background:var(--brass); border-color:var(--brass); color:#fff; box-shadow:0 3px 10px rgba(166,124,26,0.25); }

  /* ================= BOTTOM NAV ================= */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:560px; background:rgba(255,255,255,0.88); backdrop-filter:blur(16px) saturate(1.4);
    border-top:1px solid var(--line);
    display:flex; padding:9px 6px calc(9px + env(safe-area-inset-bottom));
    z-index:50; box-shadow:0 -8px 24px rgba(28,26,23,0.05);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 4px;
    background:none; border:none; color:var(--ink-dim); font-family:'Inter', sans-serif; font-size:10.5px;
    font-weight:700; cursor:pointer; border-radius:14px; position:relative; transition:color .15s ease;
  }
  .nav-btn.active{ color:var(--brass); }
  .nav-btn svg{ width:21px; height:21px; transition:transform .15s ease; }
  .nav-btn.active svg{ transform:translateY(-1px); }
  .nav-btn:active{ transform:scale(0.92); }

  @media (min-width:561px){ body{ box-shadow:0 0 50px rgba(28,26,23,0.07); } }
</style>
</head>

<!-- ============ BOOKINGS ============ -->

    <div class="section-title"><span data-i18n="bookings_title">Your bookings</span></div>

</div>

<!-- ============ ACCOUNT ============ -->
<div class="view" data-view="account">

</div>

let currentLang = 'en';
let clientData = null;
let userEmail = '';
let bookingsData = [];
let currentFilter = 'all';

function t(key){ return I18N[currentLang][key]; }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(dict[el.dataset.i18n] !== undefined) el.textContent = dict[el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    if(dict[el.dataset.i18nHtml] !== undefined) el.innerHTML = dict[el.dataset.i18nHtml];
  });
  document.querySelectorAll('#langSwitch .lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('htmlRoot').lang = lang;
  if(clientData) document.getElementById('nameInsert').textContent = clientData.full_name.split(' ')[0];
  renderStatPills();
  renderHomeBookings();
  renderAllBookings();
  if(clientData) renderInfoCard();
}

document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('.lang-btn');
  if(btn) applyLang(btn.dataset.lang);
});

/* ---------- navigation ---------- */
function goToView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  window.scrollTo({ top:0, behavior:'smooth' });
}
document.getElementById('bottomNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn');
  if(btn) goToView(btn.dataset.view);
});
document.querySelectorAll('[data-nav]').forEach(el=>{
  el.addEventListener('click', ()=> goToView(el.dataset.nav));
});

/* ---------- init ---------- */
async function init(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    window.location.href = 'auth.html';
    return;
  }
  const user = sessionData.session.user;
  userEmail = user.email;

  const { data: client, error } = await supabaseClient.from('clients').select('*').eq('id', user.id).single();
  if(error || !client){
    document.body.innerHTML = '<p style="padding:40px;">Could not load your account. Please contact support.</p>';
    return;
  }
  clientData = client;

  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name, avatar_url, shop_name, latitude, longitude, is_location_verified, district)')
    .eq('client_id', user.id)
    .order('start_time', { ascending:true });
  bookingsData = bookings || [];

  applyLang(currentLang);
  setupClientMap();
}

/* ---------- home ---------- */
function renderStatPills(){
  const now = new Date();
  const upcoming = bookingsData.filter(b => new Date(b.start_time) > now && b.status !== 'cancelled').length;
  const total = bookingsData.filter(b => b.status === 'confirmed').length;
  document.getElementById('statPills').innerHTML = `
    <div class="pill"><div class="num">${upcoming}</div><div class="label">${t('stat_upcoming')}</div></div>
    <div class="pill"><div class="num">${total}</div><div class="label">${t('stat_total')}</div></div>
  `;
}

function bookingCardHtml(b){
  const barber = b.barbers || {};
  const initials = (barber.full_name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const avatar = barber.avatar_url ? `<img src="${escapeHtml(barber.avatar_url)}" alt="">` : initials;
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  return `
    <div class="booking-card" data-booking-id="${b.id}">
      <div class="avatar">${avatar}</div>
      <div class="booking-info">
        <div class="name">${escapeHtml(barber.full_name || 'Barber')}</div>
        <div class="meta">${new Date(b.start_time).toLocaleString()}</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:7px;">
        <span class="booking-status ${b.status}">${t(b.status) || b.status}</span>
        ${canCancel ? `<button class="cancel-booking-btn" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
      </div>
    </div>
  `;
}

function attachCancelHandlers(container){
  container.querySelectorAll('[data-cancel-id]').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm(t('cancel_confirm'))) return;
      btn.disabled = true;
      btn.textContent = '...';
      const { error } = await supabaseClient.from('bookings').update({
        status: 'cancelled',
        cancelled_by: 'client',
        barber_seen_cancellation: false
      }).eq('id', btn.dataset.cancelId);
      if(error){
        console.error('Cancel failed:', error);
        btn.disabled = false;
        btn.textContent = t('cancel_booking');
        return;
      }
      await refreshBookings();
    });
  });
}

async function refreshBookings(){
  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name, avatar_url, shop_name, latitude, longitude, is_location_verified, district)')
    .eq('client_id', clientData.id)
    .order('start_time', { ascending:true });
  bookingsData = bookings || [];
  renderStatPills();
  renderHomeBookings();
  renderAllBookings();
}

function renderHomeBookings(){
  const now = new Date();
  const upcoming = bookingsData.filter(b => new Date(b.start_time) > now && b.status !== 'cancelled').slice(0,3);
  const area = document.getElementById('homeBookings');
  if(upcoming.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">✂️</div>
        <strong>${t('empty_h')}</strong>
        <span style="font-size:12.5px;">${t('empty_p')}</span><br>
        <a href="browse.html" class="btn">${t('empty_btn')}</a>
      </div>`;
    return;
  }
  area.innerHTML = upcoming.map(bookingCardHtml).join('');
  attachCancelHandlers(area);
}

/* ---------- bookings tab ---------- */
function renderAllBookings(){
  const area = document.getElementById('allBookingsArea');
  const filtered = currentFilter === 'all' ? bookingsData : bookingsData.filter(b => b.status === currentFilter);
  if(filtered.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">✂️</div>
        <strong>${t('empty_h')}</strong>
        <span style="font-size:12.5px;">${t('empty_p')}</span><br>
        <a href="browse.html" class="btn">${t('empty_btn')}</a>
      </div>`;
    return;
  }
  area.innerHTML = filtered.map(bookingCardHtml).join('');
  attachCancelHandlers(area);
}
document.getElementById('bookingFilterTabs').addEventListener('click', (e)=>{
  const tab = e.target.closest('[data-status]');
  if(!tab) return;
  document.querySelectorAll('#bookingFilterTabs .lang-btn').forEach(b=>b.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.status;
  renderAllBookings();
});

/* ---------- account ---------- */
function renderInfoCard(){
  document.getElementById('infoCard').innerHTML = `
    <div class="info-row"><span class="k">${t('rv_name')}</span><span class="v">${escapeHtml(clientData.full_name)}</span></div>
    <div class="info-row"><span class="k">${t('rv_phone')}</span><span class="v">${escapeHtml(clientData.phone || '—')}</span></div>
    <div class="info-row"><span class="k">${t('rv_email')}</span><span class="v">${escapeHtml(userEmail)}</span></div>
  `;
}

/* ---------- real map, lazy-initialized on first visit to Map tab ---------- */
let clientMap = null;
let mapInitialized = false;

function nextBookingWithBarber(){
  const now = new Date();
  const upcoming = bookingsData
    .filter(b => new Date(b.start_time) > now && b.status !== 'cancelled' && b.barbers)
    .sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
  return upcoming[0] || null;
}

function setupClientMap(){
  const statusMsg = document.getElementById('mapStatusMsg');
  const mapWrap = document.getElementById('clientMapWrap');
  const booking = nextBookingWithBarber();

  if(!booking){
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>${t('map_no_booking')}</div>`;
    mapWrap.style.display = 'none';
    return;
  }
  const barber = booking.barbers;
  if(!barber.latitude || !barber.longitude || !barber.is_location_verified){
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>${t('map_no_location')}</div>`;
    mapWrap.style.display = 'none';
    return;
  }

  statusMsg.innerHTML = '';
  mapWrap.style.display = 'block';
  document.getElementById('mapBarberLabel').innerHTML =
    `<strong>${escapeHtml(barber.shop_name || barber.full_name)}</strong> · ${escapeHtml(barber.district || '')}<br>` +
    `<a href="https://www.openstreetmap.org/directions?to=${barber.latitude},${barber.longitude}" target="_blank" style="color:var(--brass); font-weight:600;">${t('map_directions')} →</a>`;

  // Actual Leaflet init only happens once the tab is genuinely visible
  const tryInit = () => {
    const el = document.getElementById('clientMapEl');
    if(el.offsetWidth === 0){ requestAnimationFrame(tryInit); return; } // wait until visible
    if(!mapInitialized){
      clientMap = L.map('clientMapEl').setView([barber.latitude, barber.longitude], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
      }).addTo(clientMap);
      L.marker([barber.latitude, barber.longitude]).addTo(clientMap)
        .bindPopup(escapeHtml(barber.shop_name || barber.full_name));
      mapInitialized = true;
    } else {
      clientMap.invalidateSize();
      clientMap.setView([barber.latitude, barber.longitude], 15);
    }
  };

  // if Map tab is currently active, init now; otherwise init on first nav to it
  if(document.querySelector('.view[data-view="map"]').classList.contains('active')){
    tryInit();
  } else {
    document.querySelector('.nav-btn[data-view="map"]').addEventListener('click', tryInit, { once:true });
  }
}

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
});

init();
</script>
