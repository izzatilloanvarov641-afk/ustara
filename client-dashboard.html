<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ustara — Your dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#141414">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    /* light surfaces — bookings, map, account */
    --bg:#F8F7F4; --surface:#FFFFFF; --surface-alt:#F1EFEA; --line:#ECE8E2;
    --ink:#111111; --ink-dim:#6F6F6F;
    /* dark surfaces — home dashboard hero */
    --dark-bg:#141414; --dark-surface:#1E1C19; --dark-surface-2:#242220; --dark-line:rgba(255,255,255,0.08);
    --on-dark:#F5F3EF; --on-dark-dim:#9B9691;
    /* shared */
    --gold:#B88A2A; --gold-soft:#D4A94A;
    --success:#1FA971; --success-bg:#E4F5EE; --warning:#E8A63B; --warning-bg:#FBF1DF; --danger:#E05252; --danger-bg:#FCEAEA;
    --r-card:28px; --r-btn:20px; --r-input:18px;
    --sh-soft:0 20px 50px rgba(17,17,17,0.06), 0 4px 12px rgba(17,17,17,0.04);
    --sh-dark:0 24px 60px rgba(0,0,0,0.45);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; font-feature-settings:"cv11","ss01";
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
    min-height:100vh; position:relative;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--gold); color:#fff; }
  .serif{ font-family:'Instrument Serif', serif; font-style:italic; }

  .view{ display:none; }
  .view.active{ display:block; animation:fadein .45s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadein{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }

  .wrap{ padding:0 20px; }
  button{ font-family:'Inter', sans-serif; }
  button:active{ transform:scale(0.96); }
  button, .tap{ transition:transform .12s cubic-bezier(.3,1.5,.5,1), opacity .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease; }

  /* ================= HOME (dark hero dashboard) ================= */
  .home-dark{ background:var(--dark-bg); color:var(--on-dark); padding:22px 20px 36px; border-radius:0 0 36px 36px; margin-bottom:-20px; }
  .home-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; }
  .home-greeting{ font-family:'Instrument Serif', serif; font-style:italic; font-size:28px; line-height:1.15; }
  .home-greeting .wave{ font-style:normal; }
  .notif-bell{
    width:40px; height:40px; border-radius:50%; background:var(--dark-surface); border:1px solid var(--dark-line);
    color:var(--on-dark); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    position:relative; flex-shrink:0;
  }
  .notif-badge{
    position:absolute; top:-3px; right:-3px; background:var(--danger); color:#fff; font-size:9.5px; font-weight:800;
    min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    padding:0 3px; border:2px solid var(--dark-bg);
  }

  .eyebrow-gold{ font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-soft); font-weight:700; margin-bottom:10px; }

  .appt-card{
    background:var(--dark-surface); border:1px solid var(--dark-line); border-radius:var(--r-card);
    padding:20px; box-shadow:var(--sh-dark); position:relative; overflow:hidden; margin-bottom:16px;
  }
  .appt-card::after{
    content:''; position:absolute; top:-60px; right:-60px; width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle, rgba(184,138,42,0.18), transparent 70%);
  }
  .appt-top{ display:flex; gap:12px; align-items:center; position:relative; z-index:1; }
  .appt-avatar{
    width:52px; height:52px; border-radius:50%; background:var(--dark-surface-2); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif', serif; font-style:italic;
    color:var(--gold-soft); font-size:19px; border:1px solid var(--dark-line);
  }
  .appt-avatar img{ width:100%; height:100%; object-fit:cover; }
  .appt-info{ flex:1; min-width:0; }
  .appt-name{ font-weight:700; font-size:15.5px; }
  .appt-meta{ font-size:12.5px; color:var(--on-dark-dim); margin-top:2px; }
  .appt-svc{ font-size:12.5px; color:var(--gold-soft); font-weight:700; margin-top:4px; }
  .appt-qr{ width:52px; height:52px; border-radius:12px; overflow:hidden; flex-shrink:0; background:#fff; padding:4px; }
  .appt-qr img{ width:100%; height:100%; object-fit:contain; }
  .appt-actions{ display:flex; gap:8px; margin-top:16px; position:relative; z-index:1; }
  .appt-btn{
    flex:1; padding:11px; border-radius:var(--r-btn); font-size:12.5px; font-weight:700; text-align:center;
    cursor:pointer; border:1px solid var(--dark-line); color:var(--on-dark); background:transparent;
  }
  .appt-btn.solid{ background:var(--gold); border-color:var(--gold); color:#141414; }
  .appt-btn.solid:hover{ background:var(--gold-soft); }
  .appt-cancel-link{ font-size:11.5px; color:var(--danger); text-align:center; margin-top:10px; cursor:pointer; font-weight:600; position:relative; z-index:1; }

  .dark-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .dark-tile{
    background:var(--dark-surface); border:1px solid var(--dark-line); border-radius:20px; padding:16px;
  }
  .loyalty-tile{ grid-column:span 2; display:flex; flex-direction:column; gap:10px; }
  .loyalty-head{ display:flex; justify-content:space-between; align-items:center; }
  .loyalty-tier{ font-size:12.5px; font-weight:700; color:var(--gold-soft); display:flex; align-items:center; gap:6px; }
  .loyalty-pts{ font-size:11.5px; color:var(--on-dark-dim); font-weight:600; }
  .loyalty-bar-track{ height:7px; border-radius:6px; background:var(--dark-surface-2); overflow:hidden; }
  .loyalty-bar-fill{ height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-soft)); border-radius:6px; transition:width .6s cubic-bezier(.2,.8,.2,1); }

  .stat-dark-num{ font-family:'Instrument Serif', serif; font-style:italic; font-size:24px; color:var(--gold-soft); }
  .stat-dark-label{ font-size:11px; color:var(--on-dark-dim); font-weight:600; margin-top:2px; }

  .fav-dark-card{ display:flex; align-items:center; gap:12px; }
  .fav-dark-avatar{
    width:48px; height:48px; border-radius:50%; overflow:hidden; flex-shrink:0; border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif', serif; font-style:italic;
    color:var(--gold-soft); font-size:17px; background:var(--dark-surface-2);
  }
  .fav-dark-avatar img{ width:100%; height:100%; object-fit:cover; }
  .fav-dark-info{ flex:1; min-width:0; }
  .fav-dark-name{ font-weight:700; font-size:14px; }
  .fav-dark-label{ font-size:11px; color:var(--on-dark-dim); }
  .fav-dark-arrow{ color:var(--on-dark-dim); font-size:16px; }
  .fav-row-dark{ display:flex; gap:12px; overflow-x:auto; padding:2px; margin-top:2px; }
  .fav-chip-dark{ flex-shrink:0; text-align:center; width:58px; }
  .fav-chip-avatar{
    width:48px; height:48px; border-radius:50%; background:var(--dark-surface-2); border:1px solid var(--dark-line);
    display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif', serif; font-style:italic;
    color:var(--gold-soft); font-size:15px; overflow:hidden; margin:0 auto 5px;
  }
  .fav-chip-avatar img{ width:100%; height:100%; object-fit:cover; }
  .fav-chip-name{ font-size:10px; color:var(--on-dark-dim); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .rebook-dark{
    background:linear-gradient(135deg, rgba(184,138,42,0.14), transparent); border:1px solid rgba(184,138,42,0.3);
    border-radius:20px; padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .rebook-dark .icon{ font-size:20px; flex-shrink:0; }
  .rebook-dark .text{ flex:1; font-size:12px; color:var(--on-dark); }
  .rebook-dark .cta{ flex-shrink:0; background:var(--gold); color:#141414; padding:8px 14px; border-radius:16px; font-size:11px; font-weight:700; }

  .empty-dark{
    text-align:center; padding:36px 20px; border:1.5px dashed var(--dark-line); border-radius:var(--r-card);
    color:var(--on-dark-dim); font-size:13px; margin-bottom:16px;
  }
  .empty-dark .icon{ font-size:24px; margin:0 auto 12px; width:48px; height:48px; border-radius:50%; background:var(--dark-surface-2); display:flex; align-items:center; justify-content:center; }
  .empty-dark strong{ font-family:'Instrument Serif', serif; font-style:italic; font-size:17px; color:var(--on-dark); display:block; margin-bottom:4px; }
  .empty-dark .btn{ display:inline-block; margin-top:14px; background:var(--gold); color:#141414; padding:11px 20px; border-radius:var(--r-btn); font-size:12.5px; font-weight:700; }

  /* ================= LIGHT SECTIONS (bookings/map/account) ================= */
  section{ padding:26px 0 4px; }
  .section-title{
    font-family:'Instrument Serif', serif; font-style:italic; font-size:20px; font-weight:400;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
  }
  .see-all{ font-size:12px; color:var(--gold); font-weight:700; cursor:pointer; }

  .filter-pills{ display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; }
  .filter-pill{
    flex:none; padding:11px 16px; border-radius:var(--r-btn); border:1px solid var(--line); background:var(--surface);
    color:var(--ink-dim); font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .filter-pill.active{ background:#141414; border-color:#141414; color:var(--gold-soft); }

  .wallet-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:16px;
    margin-bottom:12px; box-shadow:var(--sh-soft); display:flex; gap:13px; align-items:center;
  }
  .wallet-avatar{
    width:50px; height:50px; border-radius:50%; background:var(--surface-alt); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif', serif; font-style:italic;
    color:var(--gold); font-size:17px; border:1px solid var(--line);
  }
  .wallet-avatar img{ width:100%; height:100%; object-fit:cover; }
  .wallet-info{ flex:1; min-width:0; }
  .wallet-name{ font-weight:700; font-size:14.5px; }
  .wallet-meta{ font-size:12px; color:var(--ink-dim); margin-top:2px; }
  .wallet-svc{ font-size:12px; color:var(--gold); font-weight:700; margin-top:3px; }
  .wallet-right{ display:flex; flex-direction:column; align-items:flex-end; gap:7px; flex-shrink:0; }
  .status-badge{
    font-size:10px; padding:5px 11px; border-radius:20px; text-transform:capitalize; font-weight:700;
  }
  .status-badge.confirmed{ background:var(--success-bg); color:var(--success); }
  .status-badge.pending{ background:var(--warning-bg); color:var(--warning); }
  .status-badge.cancelled{ background:var(--danger-bg); color:var(--danger); }
  .status-badge.completed{ background:var(--surface-alt); color:var(--ink-dim); }
  .wallet-cancel{
    font-size:10.5px; font-weight:700; color:var(--danger); background:none; border:1px solid #F3CFCF;
    padding:5px 11px; border-radius:16px; cursor:pointer;
  }
  .wallet-remove{
    font-size:10.5px; font-weight:600; color:var(--ink-dim); background:none; border:1px solid var(--line);
    padding:5px 11px; border-radius:16px; cursor:pointer;
  }
  .wallet-remove:hover{ background:var(--surface-alt); }
  .wallet-share{
    font-size:10.5px; font-weight:700; color:#141414; background:var(--gold-soft); border:none;
    padding:5px 11px; border-radius:16px; cursor:pointer;
  }
  .wallet-share:hover{ background:var(--gold); }

  .share-step-icon{ font-size:32px; text-align:center; margin-bottom:8px; }
  .share-photo-preview{
    width:100%; aspect-ratio:4/5; background:var(--surface-alt); border-radius:16px; margin:12px 0;
    display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px dashed var(--line);
  }
  .share-upload-label{
    display:flex; flex-direction:column; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-dim);
    cursor:pointer; font-weight:600; text-align:center; padding:20px;
  }

  .empty-state{
    text-align:center; padding:40px 24px; border:1.5px dashed var(--line); border-radius:var(--r-card);
    color:var(--ink-dim); font-size:13.5px;
  }
  .empty-state .icon{ font-size:26px; margin:0 auto 14px; width:52px; height:52px; border-radius:50%; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; }
  .empty-state strong{ font-family:'Instrument Serif', serif; font-style:italic; font-size:18px; color:var(--ink); display:block; margin-bottom:4px; font-weight:400; }
  .empty-state .btn{ display:inline-block; margin-top:16px; background:#141414; color:var(--gold-soft); padding:13px 22px; border-radius:var(--r-btn); font-size:13px; font-weight:700; }

  .notification-row{
    background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:14px 16px;
    margin-bottom:10px; font-size:13px; box-shadow:var(--sh-soft); position:relative;
  }
  .notification-row.unread{ border-left:3px solid var(--gold); }
  .notification-row .n-time{ font-size:11px; color:var(--ink-dim); margin-top:4px; }

  .lang-row{ display:flex; gap:8px; margin-top:16px; }
  .lang-btn{
    flex:1; padding:13px; border-radius:var(--r-input); border:1px solid var(--line); background:var(--surface);
    color:var(--ink-dim); font-size:13px; font-weight:700; cursor:pointer;
  }
  .lang-btn.active{ background:#141414; border-color:#141414; color:var(--gold-soft); }

  .info-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:4px 20px; box-shadow:var(--sh-soft); }
  .info-row{ display:flex; justify-content:space-between; align-items:center; padding:17px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--ink-dim); font-weight:500; }
  .info-row .v{ font-weight:700; }

  .logout-btn{
    width:100%; margin-top:24px; font-size:13.5px; color:var(--danger); background:var(--surface);
    border:1px solid var(--line); padding:16px; border-radius:var(--r-input); cursor:pointer; font-weight:700;
  }
  .logout-btn:hover{ background:var(--danger-bg); }

  /* ================= FLOATING BOTTOM NAV ================= */
  .bottom-nav{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    width:calc(100% - 32px); max-width:400px; background:rgba(20,20,20,0.85); backdrop-filter:blur(20px) saturate(1.6);
    border:1px solid rgba(255,255,255,0.08); border-radius:28px;
    display:flex; padding:10px 8px;
    z-index:50; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 4px;
    background:none; border:none; color:rgba(245,243,239,0.45); font-size:10px;
    font-weight:700; cursor:pointer; border-radius:16px;
  }
  .nav-btn.active{ color:var(--gold-soft); }
  .nav-btn svg{ width:20px; height:20px; }

  @media (min-width:561px){ body{ box-shadow:0 0 60px rgba(17,17,17,0.08); } }

  /* map avatar-photo pins */
  .photo-pin{
    width:44px; height:44px; border-radius:50%; overflow:hidden; border:3px solid #fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.3); background:#141414; display:flex; align-items:center;
    justify-content:center; transition:transform .12s ease, border-color .12s ease;
  }
  .photo-pin img{ width:100%; height:100%; object-fit:cover; }
  .photo-pin span{ color:var(--gold-soft); font-family:'Instrument Serif', serif; font-style:italic; font-size:14px; }
  .photo-pin.active{ border-color:var(--gold); transform:scale(1.2); }

  /* ================= BOOKING DETAILS MODAL ================= */
  .details-modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:flex;
    align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px);
  }
  .details-modal{
    background:var(--surface); border-radius:var(--r-card); padding:28px 24px; max-width:340px; width:100%;
    text-align:center; position:relative; box-shadow:0 30px 70px rgba(0,0,0,0.3);
  }
  .details-modal-close{
    position:absolute; top:14px; right:14px; background:var(--surface-alt); border:none; width:30px; height:30px;
    border-radius:50%; font-size:16px; color:var(--ink-dim); cursor:pointer;
  }
  .details-modal-avatar{
    width:64px; height:64px; border-radius:50%; margin:0 auto 12px; background:var(--surface-alt);
    display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif', serif; font-style:italic;
    color:var(--gold); font-size:22px; overflow:hidden;
  }
  .details-modal-avatar img{ width:100%; height:100%; object-fit:cover; }
  .details-modal-name{ font-family:'Instrument Serif', serif; font-style:italic; font-size:19px; margin-bottom:14px; }
  .details-modal-row{ font-size:13.5px; color:var(--ink); text-align:left; padding:8px 0; border-top:1px solid var(--line); display:flex; gap:10px; align-items:center; }
  .details-modal-row a{ color:var(--gold); font-weight:700; }
  .details-modal-directions{ display:inline-block; margin-top:16px; color:var(--gold); font-weight:700; font-size:13px; }

  .star-picker{ display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
  .star-picker .star{ font-size:32px; color:var(--surface-alt); cursor:pointer; transition:transform .1s ease, color .15s ease; }
  .star-picker .star:active{ transform:scale(0.9); }
  .star-picker .star.filled{ color:var(--gold); }
  .review-textarea{
    width:100%; min-height:70px; border:1px solid var(--line); border-radius:var(--r-input); padding:12px;
    font-family:'Inter', sans-serif; font-size:13.5px; resize:vertical; margin-bottom:14px; color:var(--ink);
  }
  .review-submit-btn{
    width:100%; background:#141414; color:var(--gold-soft); border:none; padding:14px; border-radius:var(--r-btn);
    font-size:13.5px; font-weight:700; cursor:pointer;
  }
  .review-submit-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .review-skip-link{ font-size:12px; color:var(--ink-dim); margin-top:12px; cursor:pointer; }

  /* skeleton */
  .skel-line{ height:14px; border-radius:6px; background:linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }
  .skel-appt{ background:var(--dark-surface); border-radius:var(--r-card); padding:20px; margin-bottom:16px; }
  .skel-appt .skel-line.w40{ width:40%; height:11px; margin-bottom:10px; }
  .skel-appt .skel-line.w70{ width:70%; height:18px; }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div class="view active" data-view="home">
  <div class="home-dark">
    <div class="home-head">
      <div>
        <div class="eyebrow-gold" data-i18n="hero_eyebrow">Ustara</div>
        <div class="home-greeting"><span class="wave">👋</span> <span data-i18n="hero_greeting_text">Good to see you,</span><br><span id="nameInsert">there</span></div>
      </div>
      <button class="notif-bell" id="notifBellBtn">
        🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span>
      </button>
    </div>

    <div id="rebookNudge"></div>

    <div id="homeBookings">
      <div class="skel-appt"><div class="skel-line w40"></div><div class="skel-line w70"></div></div>
    </div>

    <div class="dark-grid" id="dashboardTiles">
      <div class="dark-tile" style="grid-column:span 2;"><div class="skel-line w40"></div><div class="skel-line w70"></div></div>
    </div>
  </div>
</div>

<!-- ============ BOOKINGS ============ -->
<div class="view" data-view="bookings">
  <div class="wrap" style="padding-top:24px;">
    <div class="section-title"><span data-i18n="bookings_title">Your bookings</span></div>
    <div class="filter-pills" id="bookingFilterTabs">
      <div class="filter-pill active" data-status="all" data-i18n="filter_all">All</div>

function t(key){ return I18N[currentLang][key]; }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function avatarFor(barber){
  const initials = (barber.full_name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return barber.avatar_url ? `<img src="${escapeHtml(barber.avatar_url)}" alt="">` : initials;
}

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(dict[el.dataset.i18n] !== undefined) el.textContent = dict[el.dataset.i18n];
  });
  document.querySelectorAll('#langSwitch .lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('htmlRoot').lang = lang;
  if(clientData) document.getElementById('nameInsert').textContent = clientData.full_name.split(' ')[0];
  renderHomeBookings();
  renderDashboardTiles();
  renderAllBookings();
  if(clientData) renderInfoCard();
}

document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('.lang-btn');
  if(btn) applyLang(btn.dataset.lang);
});

/* ---------- navigation ---------- */
function goToView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  window.scrollTo({ top:0, behavior:'smooth' });
}
document.getElementById('bottomNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn');
  if(btn) goToView(btn.dataset.view);
});
document.querySelectorAll('[data-nav]').forEach(el=>{
  el.addEventListener('click', ()=> goToView(el.dataset.nav));
});

/* ---------- init ---------- */
async function init(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    window.location.href = 'auth.html';
    return;
  }
  const user = sessionData.session.user;
  userEmail = user.email;

  const { data: client, error } = await supabaseClient.from('clients').select('*').eq('id', user.id).single();
  if(error || !client){
    document.body.innerHTML = '<p style="padding:40px;">Could not load your account. Please contact support.</p>';
    return;
  }
  clientData = client;

  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name, avatar_url, shop_name, latitude, longitude, is_location_verified, district, phone)')
    .eq('client_id', user.id)
    .order('start_time', { ascending:true });
  bookingsData = bookings || [];

  const { data: favs } = await supabaseClient
    .from('favorites').select('*, barbers(id, full_name, avatar_url)').eq('client_id', user.id);
  favoritesData = favs || [];

  const { data: notifs } = await supabaseClient
    .from('notifications').select('*').eq('client_id', user.id).order('created_at', { ascending:false });
  notificationsData = notifs || [];

  const { data: myReviews } = await supabaseClient.from('reviews').select('booking_id').eq('client_id', user.id);
  reviewedBookingIds = new Set((myReviews || []).map(r => r.booking_id));

  applyLang(currentLang);
  setupClientMap();
  renderNotifBadge();
  renderRebookNudge();
  checkForReviewPrompt();
  setupStyleProfile();
}

/* ---------- home: appointment card ---------- */
function bigTileHtml(b){
  const barber = b.barbers || {};
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  const svcName = b.service_key ? (SERVICES_LOCAL[currentLang][b.service_key] || b.service_key) : '';
  const svcPrice = b.service_price ? formatPrice(b.service_price) : '';
  const qrData = encodeURIComponent(`USTARA-BOOKING-${b.id}`);
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${qrData}`;
  return `
    <div class="appt-card" data-booking-id="${b.id}">
      <div class="appt-top">
        <div class="appt-avatar">${avatarFor(barber)}</div>
        <div class="appt-info">
          <div class="appt-name">${escapeHtml(barber.full_name || 'Barber')}</div>
          <div class="appt-meta">${new Date(b.start_time).toLocaleString()}${barber.district ? ' · ' + escapeHtml(barber.district) : ''}</div>
          ${svcName ? `<div class="appt-svc">${escapeHtml(svcName)}${svcPrice ? ' · ' + svcPrice : ''}</div>` : ''}
        </div>
        <div class="appt-qr"><img src="${qrUrl}" alt="QR" loading="lazy"></div>
      </div>
      <div class="appt-actions">
        <button class="appt-btn" data-view-booking="${b.id}">${t('view_details')}</button>
        <button class="appt-btn solid" data-calendar="${b.id}">${t('add_calendar')}</button>
      </div>
      ${canCancel ? `<div class="appt-cancel-link" data-cancel-id="${b.id}">${t('cancel_booking')}</div>` : ''}
    </div>
  `;
}

  const barber = b.barbers || {};
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  return `
    <div class="wallet-card" data-booking-id="${b.id}">
      <div class="wallet-avatar">${avatarFor(barber)}</div>
      <div class="wallet-info">
        <div class="wallet-name">${escapeHtml(barber.full_name || 'Barber')}</div>

        ${canCancel ? `<button class="wallet-cancel" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
      </div>
    </div>
  `;
}

function bookingListRowHtml(b){
  const barber = b.barbers || {};
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  const canRemove = b.status !== 'confirmed'; // never let a confirmed (real upcoming) booking be hidden
  const svcName = b.service_key ? (SERVICES_LOCAL[currentLang][b.service_key] || b.service_key) : '';
  const svcPrice = b.service_price ? formatPrice(b.service_price) : '';
  const shareAction = b.status === 'completed'
    ? (b.after_photo_url
        ? `<button class="wallet-share" data-share-id="${b.id}">${t('share_action')}</button>`
        : `<button class="wallet-share" data-add-photo-id="${b.id}">${t('add_after_photo')}</button>`)
    : '';
  return `
    <div class="wallet-card" data-booking-id="${b.id}">
      <div class="wallet-avatar">${avatarFor(barber)}</div>
      <div class="wallet-info">
        <div class="wallet-name">${escapeHtml(barber.full_name || 'Barber')}</div>
        <div class="wallet-meta">${new Date(b.start_time).toLocaleString()}</div>
        ${svcName ? `<div class="wallet-svc">${escapeHtml(svcName)}${svcPrice ? ' · ' + svcPrice : ''}</div>` : ''}
      </div>
      <div class="wallet-right">
        <span class="status-badge ${b.status}">${t(b.status) || b.status}</span>
        ${canCancel ? `<button class="wallet-cancel" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
        ${canRemove ? `<button class="wallet-remove" data-remove-id="${b.id}">${t('remove_booking')}</button>` : ''}
        ${shareAction}
      </div>
    </div>
  `;
}

function attachShareHandlers(container){
  container.querySelectorAll('[data-share-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const b = bookingsData.find(x => x.id === btn.dataset.shareId);
      if(!b || !b.after_photo_url) return;
      btn.disabled = true;
      try {
        const res = await fetch(b.after_photo_url);
        const blob = await res.blob();
        const file = new File([blob], 'photo.jpg', { type: blob.type });
        const myReview = await supabaseClient.from('reviews').select('rating').eq('booking_id', b.id).single();
        await generateAndShareCard(file, b.barbers, (myReview.data && myReview.data.rating) || 5);
      } finally {
        btn.disabled = false;
      }
    });
  });
  container.querySelectorAll('[data-add-photo-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const b = bookingsData.find(x => x.id === btn.dataset.addPhotoId);
      if(!b) return;
      const { data: myReview } = await supabaseClient.from('reviews').select('rating').eq('booking_id', b.id).single();
      const overlay = document.createElement('div');
      overlay.className = 'details-modal-overlay';
      overlay.innerHTML = '<div class="details-modal"></div>';
      document.body.appendChild(overlay);
      showShareStep(overlay, b, (myReview && myReview.rating) || 5);
    });
  });

function attachCalendarHandlers(container){
  container.querySelectorAll('[data-calendar]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const b = bookingsData.find(x => x.id === btn.dataset.calendar);
      if(!b) return;
      const start = new Date(b.start_time);
      const end = new Date(start.getTime() + (b.service_duration_minutes || 30) * 60000);
      const fmt = d => d.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
      const barberName = (b.barbers && b.barbers.full_name) || 'Barber';
      const ics = [
        'BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
        `DTSTART:${fmt(start)}`, `DTEND:${fmt(end)}`,
        `SUMMARY:Haircut with ${barberName} — Ustara`,
        `DESCRIPTION:Booked via Ustara`,
        'END:VEVENT','END:VCALENDAR'
      ].join('\n');
      const blob = new Blob([ics], { type:'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'ustara-appointment.ics'; a.click();
      URL.revokeObjectURL(url);
    });
  });
}

/* ---------- home: loyalty / streak / favorite tiles (derived from real data, no new schema) ---------- */
function renderDashboardTiles(){
  const container = document.getElementById('dashboardTiles');
  const completed = bookingsData.filter(b => b.status === 'completed');
  const completedCount = completed.length;

  // loyalty: every 10 completed visits = a tier; points shown out of 1000 (100 pts/visit)
  const tierNames = ['Bronze', 'Silver', 'Gold', 'Platinum'];
  const tierIndex = Math.min(Math.floor(completedCount / 10), tierNames.length - 1);
  const pointsThisTier = (completedCount % 10) * 100;

  // visit streak: consecutive weeks (from today backward) with at least one completed visit
  let streak = 0;
  if(completed.length > 0){
    const weekMs = 7 * 86400000;
    const now = new Date();
    let cursor = new Date(now);
    for(let i=0; i<52; i++){
      const weekStart = new Date(cursor.getTime() - weekMs);
      const hasVisit = completed.some(b => {
        const d = new Date(b.completed_at || b.start_time);
        return d >= weekStart && d <= cursor;
      });
      if(!hasVisit) break;
      streak++;
      cursor = weekStart;
    }
  }

  // favorite barber: explicit favorites first, else most-visited barber
  let favBarbers = favoritesData.map(f => f.barbers).filter(Boolean);
  if(favBarbers.length === 0 && completed.length > 0){
    const counts = {};
    completed.forEach(b => { counts[b.barber_id] = (counts[b.barber_id]||0) + 1; });
    const topId = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const topBooking = completed.find(b => b.barber_id === topId);
    if(topBooking && topBooking.barbers) favBarbers = [{ id: topId, full_name: topBooking.barbers.full_name, avatar_url: topBooking.barbers.avatar_url }];
  }

  let html = `
    <div class="dark-tile loyalty-tile">
      <div class="loyalty-head">
        <span class="loyalty-tier">👑 ${tierNames[tierIndex]} ${t('loyalty_member')}</span>
        <span class="loyalty-pts">${pointsThisTier} / 1000 pts</span>
      </div>
      <div class="loyalty-bar-track"><div class="loyalty-bar-fill" style="width:${pointsThisTier/10}%;"></div></div>
    </div>
    <div class="dark-tile">
      <div class="stat-dark-num">🔥 ${streak}</div>
      <div class="stat-dark-label">${t('visit_streak')}${streak ? ' · ' + streak + ' ' + t('weeks') : ''}</div>
    </div>
    <div class="dark-tile">
      <div class="stat-dark-num">${completedCount}</div>
      <div class="stat-dark-label">${t('stat_total')}</div>
    </div>
  `;

  if(favBarbers.length === 1){
    const fb = favBarbers[0];
    html += `
      <a href="profile.html?id=${fb.id}" class="dark-tile fav-dark-card" style="grid-column:span 2;">
        <div class="fav-dark-avatar">${avatarFor(fb)}</div>
        <div class="fav-dark-info">
          <div class="fav-dark-name">${escapeHtml(fb.full_name)}</div>
          <div class="fav-dark-label">${t('your_barber')}</div>
        </div>
        <span class="fav-dark-arrow">→</span>
      </a>`;
  } else if(favBarbers.length > 1){
    html += `
      <div class="dark-tile" style="grid-column:span 2;">
        <div class="fav-dark-label" style="margin-bottom:8px; font-weight:700;">${t('favorites_title')}</div>
        <div class="fav-row-dark">
          ${favBarbers.map(fb => `
            <a href="profile.html?id=${fb.id}" class="fav-chip-dark">
              <div class="fav-chip-avatar">${avatarFor(fb)}</div>
              <div class="fav-chip-name">${escapeHtml(fb.full_name.split(' ')[0])}</div>
            </a>
          `).join('')}
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

let clientMap = null;
let mapInitialized = false;

function nextBookingWithBarber(){
  const now = new Date();
  const upcoming = bookingsData
    .filter(b => new Date(b.start_time) > now && b.status !== 'cancelled' && b.status !== 'completed' && b.barbers)
    .sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
  return upcoming[0] || null;
}

let allBarbersForMap = [];

async function setupClientMap(){
  const statusMsg = document.getElementById('mapStatusMsg');
  const mapWrap = document.getElementById('clientMapWrap');
  const myBooking = nextBookingWithBarber();
  const myBarberId = myBooking ? myBooking.barber_id : null;

  const { data: barbers, error } = await supabaseClient
    .from('barbers').select('id, full_name, avatar_url, shop_name, district, latitude, longitude, is_location_verified, phone')
    .eq('is_published', true).eq('is_approved', true);

  if(error){
    console.error('Failed to load barbers for map:', error);
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>Could not load the map: ${escapeHtml(error.message)}</div>`;
    mapWrap.style.display = 'none';
    return;
  }

  allBarbersForMap = (barbers || []).filter(b => b.latitude && b.longitude && b.is_location_verified);

  if(allBarbersForMap.length === 0){
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>${t('map_no_booking')}</div>`;
    mapWrap.style.display = 'none';
    return;
  }

  statusMsg.innerHTML = '';
  mapWrap.style.display = 'block';

  const myBarber = myBarberId ? allBarbersForMap.find(b => b.id === myBarberId) : null;
  if(myBarber){
    document.getElementById('mapBarberLabel').innerHTML =
      `<strong>${escapeHtml(myBarber.shop_name || myBarber.full_name)}</strong> · ${escapeHtml(myBarber.district || '')}<br>` +
      `<a href="https://www.openstreetmap.org/directions?to=${myBarber.latitude},${myBarber.longitude}" target="_blank" style="color:var(--gold); font-weight:600;">${t('map_directions')} →</a>`;
  } else {
    document.getElementById('mapBarberLabel').innerHTML = `<span style="color:var(--ink-dim);">${t('map_browse_hint')}</span>`;
  }

  const tryInit = () => {
    const el = document.getElementById('clientMapEl');
    if(el.offsetWidth === 0){ requestAnimationFrame(tryInit); return; }
    if(!mapInitialized){
      clientMap = L.map('clientMapEl').setView([41.2995, 69.2401], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
      }).addTo(clientMap);
      mapInitialized = true;
    }
    renderClientMapPins(myBarberId);
    if(myBarber){
      clientMap.setView([myBarber.latitude, myBarber.longitude], 15);
    } else {
      const bounds = allBarbersForMap.map(b => [b.latitude, b.longitude]);
      clientMap.fitBounds(bounds, { padding:[40,40], maxZoom:14 });
    }
    clientMap.invalidateSize();
  };

  if(document.querySelector('.view[data-view="map"]').classList.contains('active')){
    tryInit();
  } else {
    document.querySelector('.nav-btn[data-view="map"]').addEventListener('click', tryInit, { once:true });
  }
}

/* ---------- rebooking nudge ---------- */
function renderRebookNudge(){
  const el = document.getElementById('rebookNudge');
  const completed = bookingsData.filter(b => b.status === 'completed' && b.completed_at && b.barbers);
  if(completed.length === 0){ el.innerHTML = ''; return; }

  const lastVisitByBarber = {};
  completed.forEach(b => {
    const id = b.barber_id;
    if(!lastVisitByBarber[id] || new Date(b.completed_at) > new Date(lastVisitByBarber[id].completed_at)){
      lastVisitByBarber[id] = b;
    }
  });

  const now = new Date();
  const overdue = Object.values(lastVisitByBarber)
    .map(b => ({ booking: b, daysSince: Math.floor((now - new Date(b.completed_at)) / 86400000) }))
    .filter(x => x.daysSince >= 21)
    .sort((a,b) => b.daysSince - a.daysSince);

  if(overdue.length === 0){ el.innerHTML = ''; return; }
  const target = overdue[0].booking;
  const barberName = target.barbers.full_name;

  el.innerHTML = `
    <div class="rebook-dark">
      <div class="icon">✂️</div>
      <div class="text">${t('rebook_nudge').replace('{barber}', `<strong class="serif">${escapeHtml(barberName)}</strong>`)}</div>
      <a href="profile.html?id=${target.barber_id}" class="cta">${t('rebook_cta')}</a>
    </div>
  `;
}

/* ---------- review prompt (shown automatically after a haircut completes) ---------- */
function checkForReviewPrompt(){
  const unreviewed = bookingsData.filter(b => b.status === 'completed' && !reviewedBookingIds.has(b.id) && !b.hidden_by_client && b.barbers);
  if(unreviewed.length === 0) return;
  // most recently completed first
  unreviewed.sort((a,b) => new Date(b.completed_at || b.start_time) - new Date(a.completed_at || a.start_time));
  showReviewModal(unreviewed[0]);
}

function showReviewModal(booking){
  const barber = booking.barbers;
  const overlay = document.createElement('div');
  overlay.className = 'details-modal-overlay';
  overlay.innerHTML = `
    <div class="details-modal">
      <button class="details-modal-close">&times;</button>
      <div class="details-modal-avatar">${avatarFor(barber)}</div>
      <div class="details-modal-name">${t('review_prompt_title').replace('{barber}', escapeHtml(barber.full_name))}</div>
      <div class="star-picker" id="starPicker">
        ${[1,2,3,4,5].map(n => `<span class="star" data-star="${n}">★</span>`).join('')}
      </div>
      <textarea id="reviewComment" class="review-textarea" placeholder="${t('review_comment_ph')}"></textarea>
      <button class="review-submit-btn" id="reviewSubmitBtn" disabled>${t('review_submit')}</button>
      <div class="review-skip-link" id="reviewSkipLink">${t('review_skip')}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  let selectedRating = 0;
  const stars = overlay.querySelectorAll('.star');
  const submitBtn = overlay.querySelector('#reviewSubmitBtn');
  stars.forEach(star => {
    star.addEventListener('click', ()=>{
      selectedRating = parseInt(star.dataset.star);
      stars.forEach(s => s.classList.toggle('filled', parseInt(s.dataset.star) <= selectedRating));
      submitBtn.disabled = false;
    });
  });

  const close = () => overlay.remove();
  overlay.querySelector('.details-modal-close').addEventListener('click', close);
  overlay.querySelector('#reviewSkipLink').addEventListener('click', close);

  submitBtn.addEventListener('click', async ()=>{
    if(selectedRating === 0) return;
    submitBtn.disabled = true;
    submitBtn.textContent = '...';
    const comment = overlay.querySelector('#reviewComment').value.trim();
    const { error } = await supabaseClient.from('reviews').insert([{
      booking_id: booking.id, barber_id: booking.barber_id, client_id: clientData.id,
      rating: selectedRating, comment: comment || null
    }]);
    if(error){
      console.error('Review submit failed:', error);
      alert('Could not submit review: ' + error.message);
      submitBtn.disabled = false;
      submitBtn.textContent = t('review_submit');
      return;
    }
    reviewedBookingIds.add(booking.id);
    showShareStep(overlay, booking, selectedRating);
  });
}

        afterPhotoUrl = urlData.publicUrl;
        await supabaseClient.from('bookings').update({ after_photo_url: afterPhotoUrl }).eq('id', booking.id);
        const b = bookingsData.find(x => x.id === booking.id);
        if(b) b.after_photo_url = afterPhotoUrl;
      }
    }
    await generateAndShareCard(afterPhotoFile, barber, rating);
    close();
  });
}

async function generateAndShareCard(photoFile, barber, rating){
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1920;
  const ctx = canvas.getContext('2d');

  // background: the photo if provided, else a dark gradient fallback
  if(photoFile){
    const img = await new Promise((resolve)=>{
      const image = new Image();
      image.onload = ()=> resolve(image);
      image.src = URL.createObjectURL(photoFile);
    });
    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
  } else {
    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#2B2620'); grad.addColorStop(1, '#141414');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // dark gradient overlay at the bottom for text legibility
  const overlay = ctx.createLinearGradient(0, canvas.height * 0.55, 0, canvas.height);
  overlay.addColorStop(0, 'rgba(15,13,11,0)'); overlay.addColorStop(1, 'rgba(15,13,11,0.92)');
  ctx.fillStyle = overlay; ctx.fillRect(0, 0, canvas.width, canvas.height);

  // text
  ctx.textAlign = 'left';
  ctx.fillStyle = '#D4A94A';
  ctx.font = 'italic 44px "Instrument Serif", serif';
  ctx.fillText('ustara', 60, canvas.height - 240);

  ctx.fillStyle = '#F5F3EF';
  ctx.font = '600 52px Inter, sans-serif';
  ctx.fillText(t('share_card_line').replace('{barber}', barber.full_name), 60, canvas.height - 160);

  ctx.font = '400 34px Inter, sans-serif';
  ctx.fillStyle = '#D4A94A';
  ctx.fillText('★'.repeat(rating) + '☆'.repeat(5 - rating), 60, canvas.height - 100);

  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  const file = new File([blob], 'ustara-fresh-cut.png', { type: 'image/png' });

  if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
    try {
      await navigator.share({ files: [file], title: 'Ustara' });
      return;
    } catch(e) { /* user cancelled share sheet, fall through to download */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ustara-fresh-cut.png'; a.click();
  URL.revokeObjectURL(url);
}

/* ---------- saved style profile ---------- */
let pendingStylePhoto = null;

function renderStylePreview(){
  const preview = document.getElementById('stylePhotoPreview');
  if(pendingStylePhoto){
    preview.innerHTML = `<img src="${URL.createObjectURL(pendingStylePhoto)}" style="width:100%;height:100%;object-fit:cover;">`;
  } else if(clientData.style_photo_url){
    preview.innerHTML = `<img src="${escapeHtml(clientData.style_photo_url)}" style="width:100%;height:100%;object-fit:cover;">`;
  } else {
    preview.textContent = '—';
  }
}

function setupStyleProfile(){
  document.getElementById('styleNotesInput').value = clientData.style_notes || '';
  renderStylePreview();

  document.getElementById('stylePhotoInput').addEventListener('change', (e)=>{
    pendingStylePhoto = e.target.files[0] || null;
    renderStylePreview();
  });

  document.getElementById('saveStyleBtn').addEventListener('click', async ()=>{
    const btn = document.getElementById('saveStyleBtn');
    const msg = document.getElementById('styleSaveMsg');
    btn.disabled = true;
    const notes = document.getElementById('styleNotesInput').value.trim();
    const updates = { style_notes: notes || null };

    if(pendingStylePhoto){
      const ext = pendingStylePhoto.name.split('.').pop();
      const path = `${clientData.id}/style.${ext}`;
      const { error: uploadError } = await supabaseClient.storage.from('booking-references').upload(path, pendingStylePhoto, { upsert: true });
      if(!uploadError){
        const { data: urlData } = supabaseClient.storage.from('booking-references').getPublicUrl(path);
        updates.style_photo_url = urlData.publicUrl;
      } else {
        console.warn('Style photo upload failed:', uploadError);
      }
    }

    const { error } = await supabaseClient.from('clients').update(updates).eq('id', clientData.id);
    btn.disabled = false;
    if(!error){
      Object.assign(clientData, updates);
      pendingStylePhoto = null;
      renderStylePreview();
      msg.textContent = t('style_saved');
      msg.style.display = 'block';
      setTimeout(()=> msg.style.display = 'none', 1800);
    } else {
      console.error('Style profile save failed:', error);
      alert('Could not save: ' + error.message);
    }
  });
}

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
});

init();

      navigator.serviceWorker.register('/sw.js').catch(console.warn);
    });
