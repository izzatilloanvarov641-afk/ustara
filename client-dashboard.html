<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustara — Your dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{ --bg:#171614; --bg-alt:#1D1B18; --surface:#221F1B; --line:#34302A; --bone:#F2EDE4; --bone-dim:#A39A8B; --brass:#C9A227; --brass-soft:#E4C25A; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--bone); font-family:'Inter', sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 24px; }
  @media (max-width:640px){ .wrap{ padding:0 18px; } }

  nav{ border-bottom:1px solid var(--line); background:rgba(23,22,20,0.9); backdrop-filter:blur(10px); position:sticky; top:0; z-index:10; }
  nav .inner{ max-width:760px; margin:0 auto; padding:0 24px; height:68px; display:flex; align-items:center; justify-content:space-between; }
  .logo{ font-family:'Fraunces', serif; font-size:19px; }
  .logo em{ font-style:italic; color:var(--brass); }
  .logout-btn{ font-size:13px; color:var(--bone-dim); background:none; border:1px solid var(--line); padding:8px 16px; border-radius:20px; cursor:pointer; font-family:'Inter', sans-serif; }
  .logout-btn:hover{ border-color:var(--bone-dim); color:var(--bone); }

  main{ padding:44px 0 100px; }
  h1{ font-family:'Fraunces', serif; font-weight:500; font-size:clamp(26px,4vw,34px); margin-bottom:4px; }
  .sub{ color:var(--bone-dim); font-size:14.5px; margin-bottom:40px; }

  .section-title{ font-family:'Fraunces', serif; font-size:19px; font-weight:500; margin:40px 0 18px; }

  .empty-state{ text-align:center; padding:56px 24px; border:1px dashed var(--line); border-radius:8px; }
  .empty-state .icon{ font-size:32px; margin-bottom:16px; }
  .empty-state p{ color:var(--bone-dim); font-size:14.5px; margin-bottom:22px; max-width:340px; margin-left:auto; margin-right:auto; }
  .empty-state .btn{ display:inline-block; background:var(--brass); color:var(--bg); padding:13px 24px; border-radius:4px; font-size:13.5px; font-weight:600; }

  .booking-row{ display:flex; justify-content:space-between; align-items:center; padding:18px 22px; background:var(--surface); border:1px solid var(--line); border-radius:6px; margin-bottom:10px; font-size:14px; gap:12px; }
  .booking-status{ font-size:11.5px; padding:4px 10px; border-radius:12px; text-transform:capitalize; background:var(--line); flex-shrink:0; }

  .info-card{ background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:22px 24px; }
  .info-row{ display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--bone-dim); }
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">ust<em>a</em>ra</a>
    <button class="logout-btn" id="logoutBtn" data-i18n="logout">Log out</button>
  </div>
</nav>

<main>
  <div class="wrap">
    <h1 data-i18n="welcome">Welcome back<span id="nameInsert"></span></h1>
    <p class="sub" data-i18n="sub">Your bookings and account, in one place.</p>

    <div class="section-title" data-i18n="bookings_title">Your bookings</div>
    <div id="bookingsArea"></div>

    <div class="section-title" data-i18n="account_title">Account</div>
    <div class="info-card" id="infoCard"></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://gbvfesorkmsxugpvcuqy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_k7wdvlBvnpPHPNCrl9i_eg_ktsfJAst';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const I18N = {
  en:{ logout:"Log out", welcome:"Welcome back", sub:"Your bookings and account, in one place.",
    bookings_title:"Your bookings", account_title:"Account",
    empty_h:"No bookings yet", empty_p:"Browse barbers and book your first appointment.",
    empty_btn:"Browse barbers", rv_name:"Name", rv_phone:"Phone", rv_email:"Email" },
  uz:{ logout:"Chiqish", welcome:"Xush kelibsiz", sub:"Bandlaringiz va hisobingiz bir joyda.",
    bookings_title:"Bandlaringiz", account_title:"Hisob",
    empty_h:"Hozircha bandlar yo'q", empty_p:"Sartaroshlarni ko'ring va birinchi bandingizni yarating.",
    empty_btn:"Sartaroshlarni ko'rish", rv_name:"Ism", rv_phone:"Telefon", rv_email:"Email" },
  ru:{ logout:"Выйти", welcome:"С возвращением", sub:"Ваши записи и аккаунт — в одном месте.",
    bookings_title:"Ваши записи", account_title:"Аккаунт",
    empty_h:"Записей пока нет", empty_p:"Посмотрите барберов и запишитесь на первую стрижку.",
    empty_btn:"Смотреть барберов", rv_name:"Имя", rv_phone:"Телефон", rv_email:"Email" }
};
const browserLang = (navigator.language || 'en').slice(0,2);
const currentLang = I18N[browserLang] ? browserLang : 'en';
function t(key){ return I18N[currentLang][key]; }
document.querySelectorAll('[data-i18n]').forEach(el=> el.textContent = t(el.dataset.i18n));

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

async function init(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    window.location.href = 'client-auth.html';
    return;
  }
  const user = sessionData.session.user;

  const { data: client, error } = await supabaseClient.from('clients').select('*').eq('id', user.id).single();
  if(error || !client){
    document.querySelector('main .wrap').innerHTML = '<p style="color:var(--bone-dim)">Could not load your account. Please contact us.</p>';
    return;
  }

  document.getElementById('nameInsert').textContent = ', ' + client.full_name.split(' ')[0];
  document.getElementById('infoCard').innerHTML = `
    <div class="info-row"><span class="k">${t('rv_name')}</span><span>${escapeHtml(client.full_name)}</span></div>
    <div class="info-row"><span class="k">${t('rv_phone')}</span><span>${escapeHtml(client.phone || '—')}</span></div>
    <div class="info-row"><span class="k">${t('rv_email')}</span><span>${escapeHtml(user.email)}</span></div>
  `;

  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name)')
    .eq('client_id', user.id)
    .order('start_time', { ascending:true });

  const area = document.getElementById('bookingsArea');
  if(!bookings || bookings.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">✂️</div>
        <p>${t('empty_p')}</p>
        <a href="browse.html" class="btn">${t('empty_btn')}</a>
      </div>`;
    return;
  }
  area.innerHTML = bookings.map(b => `
    <div class="booking-row">
      <div>
        <strong>${escapeHtml(b.barbers ? b.barbers.full_name : 'Barber')}</strong><br>
        <span style="color:var(--bone-dim); font-size:12.5px;">${new Date(b.start_time).toLocaleString()}</span>
      </div>
      <span class="booking-status">${escapeHtml(b.status)}</span>
    </div>
  `).join('');
}

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
});

init();
</script>
</body>
</html>
