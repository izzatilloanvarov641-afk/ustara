<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ustara — Your dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#F7F4EF; --surface:#FFFFFF; --surface-alt:#EFEAE1; --line:#E9E2D3;
    --ink:#1C1A17; --ink-dim:#8A8175; --brass:#A67C1A; --brass-soft:#C79A2E;
    --err:#B3432B; --err-bg:#FBEDE9; --ok:#3F7A54; --ok-bg:#EBF5EE; --warn-bg:#FCF3E3; --warn:#96701A;
    --r-sm:12px; --r-md:18px; --r-lg:20px;
    --sh-sm:0 1px 2px rgba(28,26,23,0.05), 0 1px 1px rgba(28,26,23,0.04);
    --sh-lg:0 16px 40px rgba(28,26,23,0.12);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; font-feature-settings:"cv11","ss01";
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
    min-height:100vh; position:relative;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--brass); color:#fff; }

  .view{ display:none; }
  .view.active{ display:block; animation:fadein .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadein{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }

  .wrap{ padding:0 20px; }

  /* ================= HERO ================= */
  .hero-card{
    position:relative; margin:16px 16px 0; border-radius:26px; overflow:hidden;
    height:190px; display:flex; align-items:flex-end; box-shadow:var(--sh-lg);
    background:linear-gradient(135deg, #3A3226, #1C1A17);
  }
  .hero-card video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.78; }
  .hero-card .hero-fallback-anim{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(199,154,46,0.35), transparent 55%),
      linear-gradient(120deg, #2B2620, #4A3B1F, #1C1A17, #3A3226);
    background-size:auto, 300% 300%; animation:heroShift 14s ease infinite; opacity:0.95;
  }
  @keyframes heroShift{ 0%{ background-position:0 0, 0% 50%; } 50%{ background-position:0 0, 100% 50%; } 100%{ background-position:0 0, 0% 50%; } }
  .hero-card::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(15,13,11,0.9), rgba(15,13,11,0.1) 55%, transparent);
  }
  .hero-content{ position:relative; z-index:2; padding:20px 22px 18px; color:#FBF9F5; width:100%; }
  .hero-eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass-soft);
    font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px;
  }
  .hero-eyebrow::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--brass-soft); display:inline-block; }
  .hero-greeting{ font-family:'Fraunces', serif; font-size:22px; font-weight:500; line-height:1.2; letter-spacing:-0.01em; }
  .hero-greeting em{ font-style:italic; color:var(--brass-soft); }

  /* ================= BENTO GRID ================= */
  .bento-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px 16px 4px; }
  .tile{ border-radius:var(--r-lg); }

  .tile-big{
    grid-column:span 2; background:var(--ink); color:#fff; padding:22px; position:relative;
    overflow:hidden; box-shadow:var(--sh-lg);
  }
  .tile-big::after{
    content:''; position:absolute; top:-40px; right:-40px; width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle, rgba(199,154,46,0.32), transparent 70%);
  }
  .tile-big .tag{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--brass-soft); font-weight:700; margin-bottom:10px; position:relative; z-index:1; }
  .tile-big .name{ font-family:'Fraunces', serif; font-size:21px; margin-bottom:4px; position:relative; z-index:1; letter-spacing:-0.01em; }
  .tile-big .meta{ font-size:12.5px; color:rgba(255,255,255,0.62); position:relative; z-index:1; font-weight:500; }
  .tile-big .status-badge{
    position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.14); padding:5px 13px;
    border-radius:20px; font-size:10px; font-weight:700; text-transform:capitalize; z-index:1;
  }
  .tile-big .cancel-dark{
    margin-top:14px; font-size:10.5px; font-weight:700; color:#fff; background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2); padding:6px 13px; border-radius:20px; cursor:pointer;
    font-family:'Inter', sans-serif; position:relative; z-index:1;
  }
  .tile-big .cancel-dark:disabled{ opacity:0.5; }

  .tile-stat{
    background:var(--surface); border:1px solid var(--line); text-align:left; padding:16px 18px;
    box-shadow:var(--sh-sm);
  }
  .tile-stat .num{ font-family:'Fraunces', serif; font-size:26px; color:var(--brass); font-weight:500; letter-spacing:-0.01em; }
  .tile-stat .label{ font-size:11px; color:var(--ink-dim); margin-top:3px; font-weight:600; }

  .tile-next{
    grid-column:span 2; background:var(--surface); border:1px solid var(--line);
    display:flex; align-items:center; gap:12px; padding:14px 16px; box-shadow:var(--sh-sm);
    margin-bottom:0;
  }
  .tile-next .avatar{
    width:42px; height:42px; border-radius:50%; background:var(--surface-alt); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces', serif;
    font-style:italic; color:var(--brass); font-size:14px; overflow:hidden; border:1px solid var(--line);
  }
  .tile-next .avatar img{ width:100%; height:100%; object-fit:cover; }
  .tile-next .info{ flex:1; min-width:0; }
  .tile-next .name{ font-weight:700; font-size:13.5px; }
  .tile-next .meta{ font-size:11.5px; color:var(--ink-dim); margin-top:2px; font-weight:500; }
  .tile-next .right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }

  .booking-status{
    font-size:10px; padding:4px 10px; border-radius:20px; text-transform:capitalize;
    background:var(--surface-alt); flex-shrink:0; font-weight:700; letter-spacing:0.01em;
  }
  .booking-status.confirmed{ background:var(--ok-bg); color:var(--ok); }
  .booking-status.pending{ background:var(--warn-bg); color:var(--warn); }
  .booking-status.cancelled{ background:var(--err-bg); color:var(--err); }
  .booking-status.completed{ background:var(--surface-alt); color:var(--ink-dim); }

  .cancel-booking-btn{
    font-size:10px; font-weight:700; color:var(--err); background:none; border:1px solid #ECC9BE;
    padding:4px 11px; border-radius:20px; cursor:pointer; font-family:'Inter', sans-serif;
    transition:background .15s ease;
  }
  .cancel-booking-btn:hover{ background:var(--err-bg); }
  .cancel-booking-btn:active{ transform:scale(0.95); }
  .cancel-booking-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .tile-empty{
    grid-column:span 2; text-align:center; padding:32px 22px; border:1.5px dashed var(--line);
    color:var(--ink-dim); font-size:13px; background:var(--surface);
  }
  .tile-empty .icon{
    font-size:22px; margin:0 auto 12px; width:46px; height:46px; border-radius:50%;
    background:var(--surface-alt); display:flex; align-items:center; justify-content:center;
  }
  .tile-empty strong{ font-family:'Fraunces', serif; font-size:15px; font-weight:500; color:var(--ink); display:block; margin-bottom:4px; }
  .tile-empty .btn{
    display:inline-block; margin-top:14px; background:var(--brass); color:#fff; padding:11px 20px;
    border-radius:22px; font-size:12.5px; font-weight:700; box-shadow:0 4px 14px rgba(166,124,26,0.28);
  }
  .tile-empty .btn:active{ transform:scale(0.96); }

  .tile-map{
    grid-column:span 2; position:relative; height:130px; overflow:hidden; cursor:pointer;
    background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:22px 22px; background-color:var(--surface-alt); border:1px solid var(--line); box-shadow:var(--sh-sm);
  }
  .tile-map-label{
    position:absolute; bottom:14px; left:16px; right:16px; background:var(--surface); padding:10px 14px;
    border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,0.08); font-size:12.5px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .tile-map-label .pin-dot{
    width:8px; height:8px; border-radius:50%; background:var(--brass); flex-shrink:0;
    box-shadow:0 0 0 4px rgba(166,124,26,0.15); animation:pinPulse 2s ease-in-out infinite;
  }
  @keyframes pinPulse{ 0%,100%{ box-shadow:0 0 0 4px rgba(166,124,26,0.15); } 50%{ box-shadow:0 0 0 7px rgba(166,124,26,0.08); } }

  /* skeleton */
  .skel-line{ height:14px; border-radius:6px; background:linear-gradient(90deg, var(--surface-alt) 25%, #F5F0E5 50%, var(--surface-alt) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }
  .skel-big{ grid-column:span 2; background:#2B2620; border-radius:var(--r-lg); padding:22px; }
  .skel-big .skel-line{ background:linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.08) 75%); background-size:200% 100%; }
  .skel-big .skel-line.w40{ width:40%; height:11px; margin-bottom:10px; }
  .skel-big .skel-line.w70{ width:70%; height:20px; }
  .skel-stat{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px; }
  .skel-stat .skel-line.w40{ width:40%; height:22px; margin-bottom:6px; }
  .skel-stat .skel-line.w60{ width:60%; height:10px; }

  /* ================= SECTIONS (bookings/account views) ================= */
  section{ padding:28px 0 4px; }
  .section-title{
    font-family:'Fraunces', serif; font-size:18px; font-weight:500; letter-spacing:-0.01em;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
  }

  .booking-list-row{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; box-shadow:var(--sh-sm);
  }
  .booking-list-row .avatar{
    width:44px; height:44px; border-radius:50%; background:var(--surface-alt); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces', serif;
    font-style:italic; color:var(--brass); font-size:15px; overflow:hidden; border:1px solid var(--line);
  }
  .booking-list-row .avatar img{ width:100%; height:100%; object-fit:cover; }
  .booking-list-row .info{ flex:1; min-width:0; }
  .booking-list-row .name{ font-weight:700; font-size:13.5px; }
  .booking-list-row .meta{ font-size:11.5px; color:var(--ink-dim); margin-top:2px; font-weight:500; }
  .booking-list-row .right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }

  .empty-state{
    text-align:center; padding:40px 24px; border:1.5px dashed var(--line); border-radius:var(--r-lg);
    color:var(--ink-dim); font-size:13.5px;
  }
  .empty-state .icon{
    font-size:26px; margin:0 auto 14px; width:52px; height:52px; border-radius:50%;
    background:var(--surface-alt); display:flex; align-items:center; justify-content:center;
  }
  .empty-state strong{ font-family:'Fraunces', serif; font-size:16px; font-weight:500; color:var(--ink); display:block; margin-bottom:4px; }
  .empty-state .btn{
    display:inline-block; margin-top:16px; background:var(--brass); color:#fff; padding:12px 22px;
    border-radius:24px; font-size:13px; font-weight:700; box-shadow:0 4px 14px rgba(166,124,26,0.28);
  }
  .empty-state .btn:active{ transform:scale(0.96); }

  .lang-btn{
    flex:1; padding:12px; border-radius:var(--r-sm); border:1px solid var(--line); background:var(--surface);
    color:var(--ink-dim); font-size:13px; font-weight:700; cursor:pointer; transition:all .15s ease;
  }
  .lang-btn.active{ background:var(--brass); border-color:var(--brass); color:#fff; box-shadow:0 3px 10px rgba(166,124,26,0.25); }
  .lang-row{ display:flex; gap:8px; margin-top:16px; }
  .filter-tabs{ display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; }
  .filter-tabs .lang-btn{ flex:none; white-space:nowrap; }

  .info-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:4px 20px; box-shadow:var(--sh-sm); }
  .info-row{ display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--ink-dim); font-weight:500; }
  .info-row .v{ font-weight:600; }

  .logout-btn{
    width:100%; margin-top:24px; font-size:13.5px; color:var(--err); background:var(--surface);
    border:1px solid var(--line); padding:15px; border-radius:var(--r-md); cursor:pointer;
    font-family:'Inter', sans-serif; font-weight:700; transition:background .15s ease, border-color .15s ease;
  }
  .logout-btn:hover{ background:var(--err-bg); border-color:#ECC9BE; }
  .logout-btn:active{ transform:scale(0.98); }

  /* ================= BOTTOM NAV ================= */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:560px; background:rgba(255,255,255,0.88); backdrop-filter:blur(16px) saturate(1.4);
    border-top:1px solid var(--line);
    display:flex; padding:9px 6px calc(9px + env(safe-area-inset-bottom));
    z-index:50; box-shadow:0 -8px 24px rgba(28,26,23,0.05);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 4px;
    background:none; border:none; color:var(--ink-dim); font-family:'Inter', sans-serif; font-size:10.5px;
    font-weight:700; cursor:pointer; border-radius:14px; transition:color .15s ease;
  }
  .nav-btn.active{ color:var(--brass); }
  .nav-btn svg{ width:21px; height:21px; transition:transform .15s ease; }
  .nav-btn.active svg{ transform:translateY(-1px); }
  .nav-btn:active{ transform:scale(0.92); }

  @media (min-width:561px){ body{ box-shadow:0 0 50px rgba(28,26,23,0.07); } }
</style>
</head>

<!-- ============ HOME ============ -->
<div class="view active" data-view="home">
  <div class="hero-card">
    <div class="hero-fallback-anim" id="heroFallback"></div>
    <video id="heroVideo" autoplay muted loop playsinline
           onerror="document.getElementById('heroFallback').style.display='block'; this.style.display='none';">

<!-- ============ BOOKINGS ============ -->
<div class="view" data-view="bookings">

    <div class="filter-tabs" id="bookingFilterTabs">
      <div class="lang-btn active" data-status="all" data-i18n="filter_all">All</div>

</div>

<!-- ============ MAP ============ -->
<div class="view" data-view="map">

    <div class="section-title"><span data-i18n="map_title">Your barber's spot</span></div>
    <div id="mapStatusMsg"></div>
    <div id="clientMapWrap" style="display:none;">
      <div id="clientMapEl" style="height:320px; border-radius:var(--r-lg); overflow:hidden; border:1px solid var(--line); box-shadow:var(--sh-sm);"></div>
      <div id="mapBarberLabel" style="margin-top:14px; font-size:13.5px; color:var(--ink-dim);"></div>
    </div>
  </div>
</div>

<!-- ============ ACCOUNT ============ -->
<div class="view" data-view="account">
  <div class="wrap" style="padding-top:26px;">
    <div class="section-title"><span data-i18n="account_title">Account</span></div>
    <div class="info-card" id="infoCard"></div>

    <div class="section-title" style="margin-top:30px;"><span data-i18n="language_title">Language</span></div>
    <div class="lang-row" id="langSwitch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>

    <button class="logout-btn" id="logoutBtn" data-i18n="logout">Log out</button>
  </div>
</div>

<!-- ============ BOTTOM NAV ============ -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>

  <button class="nav-btn" data-view="map">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z"/></svg>
    <span data-i18n="nav_map">Map</span>

  <button class="nav-btn" data-view="account">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>
    <span data-i18n="nav_account">Account</span>

</nav>

let currentLang = 'en';
let clientData = null;
let userEmail = '';
let bookingsData = [];
let currentFilter = 'all';

function t(key){ return I18N[currentLang][key]; }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(dict[el.dataset.i18n] !== undefined) el.textContent = dict[el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    if(dict[el.dataset.i18nHtml] !== undefined) el.innerHTML = dict[el.dataset.i18nHtml];
  });
  document.querySelectorAll('#langSwitch .lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('htmlRoot').lang = lang;
  if(clientData) document.getElementById('nameInsert').textContent = clientData.full_name.split(' ')[0];
  renderStatPills();
  renderHomeBookings();
  renderAllBookings();
  renderMapTeaser();
  if(clientData) renderInfoCard();
}

document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('.lang-btn');
  if(btn) applyLang(btn.dataset.lang);
});

/* ---------- navigation ---------- */
function goToView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  window.scrollTo({ top:0, behavior:'smooth' });
}
document.getElementById('bottomNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn');
  if(btn) goToView(btn.dataset.view);
});
document.querySelectorAll('[data-nav]').forEach(el=>{
  el.addEventListener('click', ()=> goToView(el.dataset.nav));
});

/* ---------- init ---------- */
async function init(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){
    window.location.href = 'auth.html';
    return;
  }
  const user = sessionData.session.user;
  userEmail = user.email;

  const { data: client, error } = await supabaseClient.from('clients').select('*').eq('id', user.id).single();
  if(error || !client){
    document.body.innerHTML = '<p style="padding:40px;">Could not load your account. Please contact support.</p>';
    return;
  }
  clientData = client;

  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name, avatar_url, shop_name, latitude, longitude, is_location_verified, district)')
    .eq('client_id', user.id)
    .order('start_time', { ascending:true });
  bookingsData = bookings || [];

  applyLang(currentLang);
  setupClientMap();
}

/* ---------- home: bento grid ---------- */
function renderStatPills(){
  const now = new Date();
  const upcoming = bookingsData.filter(b => new Date(b.start_time) > now && b.status !== 'cancelled').length;
  const total = bookingsData.filter(b => b.status === 'confirmed').length;
  document.getElementById('statPills').innerHTML = `
    <div class="tile tile-stat"><div class="num">${upcoming}</div><div class="label">${t('stat_upcoming')}</div></div>
    <div class="tile tile-stat"><div class="num">${total}</div><div class="label">${t('stat_total')}</div></div>
  `;
}

function avatarFor(barber){
  const initials = (barber.full_name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return barber.avatar_url ? `<img src="${escapeHtml(barber.avatar_url)}" alt="">` : initials;
}

function bigTileHtml(b){
  const barber = b.barbers || {};
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  const svcName = b.service_key ? (SERVICES_LOCAL[currentLang][b.service_key] || b.service_key) : '';
  const svcPrice = b.service_price ? formatPrice(b.service_price) : '';
  return `
    <div class="tile tile-big" data-booking-id="${b.id}">
      <span class="status-badge">${t(b.status) || b.status}</span>
      <div class="tag">${t('upcoming_title')}</div>
      <div class="name">${escapeHtml(barber.full_name || 'Barber')}</div>
      <div class="meta">${new Date(b.start_time).toLocaleString()}${barber.district ? ' · ' + escapeHtml(barber.district) : ''}</div>
      ${svcName ? `<div class="meta" style="color:var(--brass-soft); font-weight:700; margin-top:4px;">${escapeHtml(svcName)}${svcPrice ? ' · ' + svcPrice : ''}</div>` : ''}
      ${canCancel ? `<button class="cancel-dark" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
    </div>
  `;
}

function bookingCardHtml(b){
  const barber = b.barbers || {};
  const avatar = avatarFor(barber);
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  return `
    <div class="tile tile-next" data-booking-id="${b.id}">
      <div class="avatar">${avatar}</div>
      <div class="info">
        <div class="name">${escapeHtml(barber.full_name || 'Barber')}</div>
        <div class="meta">${new Date(b.start_time).toLocaleString()}</div>
      </div>
      <div class="right">
        <span class="booking-status ${b.status}">${t(b.status) || b.status}</span>
        ${canCancel ? `<button class="cancel-booking-btn" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
      </div>
    </div>
  `;
}

function bookingListRowHtml(b){
  const barber = b.barbers || {};
  const avatar = avatarFor(barber);
  const canCancel = (b.status === 'pending' || b.status === 'confirmed') && new Date(b.start_time) > new Date();
  const svcName = b.service_key ? (SERVICES_LOCAL[currentLang][b.service_key] || b.service_key) : '';
  const svcPrice = b.service_price ? formatPrice(b.service_price) : '';
  return `
    <div class="booking-list-row" data-booking-id="${b.id}">
      <div class="avatar">${avatar}</div>
      <div class="info">
        <div class="name">${escapeHtml(barber.full_name || 'Barber')}</div>
        <div class="meta">${new Date(b.start_time).toLocaleString()}</div>
        ${svcName ? `<div class="meta" style="color:var(--brass); font-weight:700; margin-top:3px;">${escapeHtml(svcName)}${svcPrice ? ' · ' + svcPrice : ''}</div>` : ''}
      </div>
      <div class="right">
        <span class="booking-status ${b.status}">${t(b.status) || b.status}</span>
        ${canCancel ? `<button class="cancel-booking-btn" data-cancel-id="${b.id}">${t('cancel_booking')}</button>` : ''}
      </div>
    </div>
  `;
}

function attachCancelHandlers(container){
  container.querySelectorAll('[data-cancel-id]').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm(t('cancel_confirm'))) return;
      btn.disabled = true;
      btn.textContent = '...';
      const { error } = await supabaseClient.from('bookings').update({
        status: 'cancelled',
        cancelled_by: 'client',
        barber_seen_cancellation: false
      }).eq('id', btn.dataset.cancelId);
      if(error){
        console.error('Cancel failed:', error);
        btn.disabled = false;
        btn.textContent = t('cancel_booking');
        return;
      }
      await refreshBookings();
    });
  });
}

async function refreshBookings(){
  const { data: bookings } = await supabaseClient
    .from('bookings')
    .select('*, barbers(full_name, avatar_url, shop_name, latitude, longitude, is_location_verified, district)')
    .eq('client_id', clientData.id)
    .order('start_time', { ascending:true });
  bookingsData = bookings || [];
  renderStatPills();
  renderHomeBookings();
  renderAllBookings();
  renderMapTeaser();
}

function renderHomeBookings(){
  const now = new Date();
  const upcoming = bookingsData.filter(b => new Date(b.start_time) > now && b.status !== 'cancelled').slice(0,3);
  const area = document.getElementById('homeBookings');
  if(upcoming.length === 0){
    area.innerHTML = `
      <div class="tile tile-empty">
        <div class="icon">✂️</div>
        <strong>${t('empty_h')}</strong>
        <span style="font-size:12px;">${t('empty_p')}</span><br>
        <a href="browse.html" class="btn">${t('empty_btn')}</a>
      </div>`;
    return;
  }
  const [first, ...rest] = upcoming;
  area.innerHTML = bigTileHtml(first) + rest.map(bookingCardHtml).join('');
  attachCancelHandlers(area);
}

/* ---------- bookings tab ---------- */
function renderAllBookings(){
  const area = document.getElementById('allBookingsArea');
  const filtered = currentFilter === 'all' ? bookingsData : bookingsData.filter(b => b.status === currentFilter);
  if(filtered.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">✂️</div>
        <strong>${t('empty_h')}</strong><br>
        <span style="font-size:12.5px;">${t('empty_p')}</span><br>
        <a href="browse.html" class="btn">${t('empty_btn')}</a>
      </div>`;
    return;
  }
  area.innerHTML = filtered.map(bookingListRowHtml).join('');
  attachCancelHandlers(area);
}
document.getElementById('bookingFilterTabs').addEventListener('click', (e)=>{
  const tab = e.target.closest('[data-status]');
  if(!tab) return;
  document.querySelectorAll('#bookingFilterTabs .lang-btn').forEach(b=>b.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.status;
  renderAllBookings();
});

/* ---------- account ---------- */
function renderInfoCard(){
  document.getElementById('infoCard').innerHTML = `
    <div class="info-row"><span class="k">${t('rv_name')}</span><span class="v">${escapeHtml(clientData.full_name)}</span></div>
    <div class="info-row"><span class="k">${t('rv_phone')}</span><span class="v">${escapeHtml(clientData.phone || '—')}</span></div>
    <div class="info-row"><span class="k">${t('rv_email')}</span><span class="v">${escapeHtml(userEmail)}</span></div>
  `;
}

function renderMapTeaser(){
  const label = document.getElementById('mapTeaserText');
  const booking = nextBookingWithBarber();
  if(!booking){
    label.textContent = t('map_teaser_no_booking');
    return;
  }
  const barber = booking.barbers;
  if(!barber.latitude || !barber.longitude || !barber.is_location_verified){
    label.textContent = t('map_teaser_no_location');
    return;
  }
  label.textContent = escapeHtml(barber.shop_name || barber.full_name) + (barber.district ? ' · ' + escapeHtml(barber.district) : '');
}

/* ---------- real map, lazy-initialized on first visit to Map tab ---------- */
let clientMap = null;
let mapInitialized = false;

function nextBookingWithBarber(){
  const now = new Date();
  const upcoming = bookingsData
    .filter(b => new Date(b.start_time) > now && b.status !== 'cancelled' && b.barbers)
    .sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
  return upcoming[0] || null;
}

function setupClientMap(){
  const statusMsg = document.getElementById('mapStatusMsg');
  const mapWrap = document.getElementById('clientMapWrap');
  const booking = nextBookingWithBarber();

  if(!booking){
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>${t('map_no_booking')}</div>`;
    mapWrap.style.display = 'none';
    return;
  }
  const barber = booking.barbers;
  if(!barber.latitude || !barber.longitude || !barber.is_location_verified){
    statusMsg.innerHTML = `<div class="empty-state"><div class="icon">📍</div>${t('map_no_location')}</div>`;
    mapWrap.style.display = 'none';
    return;
  }

  statusMsg.innerHTML = '';
  mapWrap.style.display = 'block';
  document.getElementById('mapBarberLabel').innerHTML =
    `<strong>${escapeHtml(barber.shop_name || barber.full_name)}</strong> · ${escapeHtml(barber.district || '')}<br>` +
    `<a href="https://www.openstreetmap.org/directions?to=${barber.latitude},${barber.longitude}" target="_blank" style="color:var(--brass); font-weight:600;">${t('map_directions')} →</a>`;

  const tryInit = () => {
    const el = document.getElementById('clientMapEl');
    if(el.offsetWidth === 0){ requestAnimationFrame(tryInit); return; }
    if(!mapInitialized){
      clientMap = L.map('clientMapEl').setView([barber.latitude, barber.longitude], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
      }).addTo(clientMap);
      L.marker([barber.latitude, barber.longitude]).addTo(clientMap)
        .bindPopup(escapeHtml(barber.shop_name || barber.full_name));
      mapInitialized = true;
    } else {
      clientMap.invalidateSize();
      clientMap.setView([barber.latitude, barber.longitude], 15);
    }
  };

  if(document.querySelector('.view[data-view="map"]').classList.contains('active')){
    tryInit();
  } else {
    document.querySelector('.nav-btn[data-view="map"]').addEventListener('click', tryInit, { once:true });
  }
}

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
});

init();
</script>
