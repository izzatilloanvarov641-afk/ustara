<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustara — Client login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{ --bg:#171614; --surface:#221F1B; --line:#34302A; --bone:#F2EDE4; --bone-dim:#A39A8B; --brass:#C9A227; --brass-soft:#E4C25A; --err:#c0392b; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--bg); color:var(--bone); font-family:'Inter', sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  a{ color:inherit; text-decoration:none; }
  .card{ width:100%; max-width:400px; }
  .logo{ font-family:'Fraunces', serif; font-size:22px; text-align:center; margin-bottom:36px; display:block; }
  .logo em{ font-style:italic; color:var(--brass); }
  .eyebrow{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); font-weight:600; display:block; text-align:center; margin-bottom:10px; }
  h1{ font-family:'Fraunces', serif; font-weight:500; font-size:26px; text-align:center; margin-bottom:24px; }

  .tabs{ display:flex; border:1px solid var(--line); border-radius:24px; padding:3px; margin-bottom:28px; }
  .tabs button{ flex:1; background:none; border:none; color:var(--bone-dim); font-family:'Inter', sans-serif; font-size:13px; font-weight:600; padding:10px; border-radius:20px; cursor:pointer; }
  .tabs button.active{ background:var(--brass); color:var(--bg); }

  .field-group{ margin-bottom:16px; }
  label{ display:block; font-size:13px; color:var(--bone-dim); margin-bottom:7px; }
  input{ width:100%; background:var(--surface); border:1px solid var(--line); color:var(--bone); padding:13px 15px; border-radius:4px; font-size:14.5px; font-family:'Inter', sans-serif; }
  input:focus{ outline:none; border-color:var(--brass); }
  .error-text{ font-size:12.5px; color:var(--err); margin-top:14px; display:none; text-align:center; }
  .info-text{ font-size:12.5px; color:var(--brass); margin-top:14px; display:none; text-align:center; }
  .info-text a{ color:var(--brass); font-weight:600; text-decoration:underline; }
  .btn{ width:100%; background:var(--brass); color:var(--bg); border:none; padding:14px; border-radius:4px; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; }
  .btn:hover{ background:var(--brass-soft); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .form-panel{ display:none; }
  .form-panel.active{ display:block; }
  .foot-link{ text-align:center; font-size:13.5px; color:var(--bone-dim); margin-top:24px; }
  .foot-link a{ color:var(--brass); font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">ust<em>a</em>ra</a>
  <span class="eyebrow" data-i18n="eyebrow">For clients</span>

  <div class="tabs">
    <button type="button" class="active" data-tab="login" data-i18n="tab_login">Log in</button>
    <button type="button" data-tab="signup" data-i18n="tab_signup">Sign up</button>
  </div>

  <div class="form-panel active" data-panel="login">
    <h1 data-i18n="login_title">Welcome back</h1>
    <form id="loginForm">
      <div class="field-group"><label data-i18n="l_email">Email</label><input type="email" id="loginEmail" required></div>
      <div class="field-group"><label data-i18n="l_password">Password</label><input type="password" id="loginPassword" required></div>
      <div class="error-text" id="loginError" data-i18n="err_login">Incorrect email or password.</div>
      <button type="submit" class="btn" id="loginBtn" data-i18n="submit_login">Log in</button>
    </form>
  </div>

  <div class="form-panel" data-panel="signup">
    <h1 data-i18n="signup_title">Create your account</h1>
    <form id="signupForm">
      <div class="field-group"><label data-i18n="l_name">Full name</label><input type="text" id="signupName" required></div>
      <div class="field-group"><label data-i18n="l_phone">Phone number</label><input type="tel" id="signupPhone" placeholder="+998 90 123 45 67" required></div>
      <div class="field-group"><label data-i18n="l_email">Email</label><input type="email" id="signupEmail" required></div>
      <div class="field-group"><label data-i18n="l_password">Password</label><input type="password" id="signupPassword" minlength="6" required></div>
      <div class="error-text" id="signupError" data-i18n="err_signup">Something went wrong. Try again.</div>
      <button type="submit" class="btn" id="signupBtn" data-i18n="submit_signup">Create account</button>
    </form>
    <div class="info-text" id="signupInfo" data-i18n-html="check_email">Account created — check your email to activate it, then log in.</div>
  </div>

  <div class="foot-link" data-i18n-html="foot">Are you a barber? <a href="barber-login.html">Log in here</a></div>
</div>
<script>
const SUPABASE_URL = 'https://gbvfesorkmsxugpvcuqy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_k7wdvlBvnpPHPNCrl9i_eg_ktsfJAst';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const I18N = {
  en:{ eyebrow:"For clients", tab_login:"Log in", tab_signup:"Sign up",
    login_title:"Welcome back", signup_title:"Create your account",
    l_email:"Email", l_password:"Password", l_name:"Full name", l_phone:"Phone number",
    err_login:"Incorrect email or password.", err_signup:"Something went wrong. Try again.",
    check_email:'Account created — check your email to activate it, then <a href="client-auth.html">log in</a>.',
    submit_login:"Log in", submit_signup:"Create account",
    foot:'Are you a barber? <a href="barber-login.html">Log in here</a>' },
  uz:{ eyebrow:"Mijozlar uchun", tab_login:"Kirish", tab_signup:"Ro'yxatdan o'tish",
    login_title:"Xush kelibsiz", signup_title:"Hisob yarating",
    l_email:"Email", l_password:"Parol", l_name:"To'liq ism", l_phone:"Telefon raqami",
    err_login:"Email yoki parol noto'g'ri.", err_signup:"Xatolik yuz berdi. Qayta urinib ko'ring.",
    check_email:'Hisob yaratildi — uni faollashtirish uchun emailingizni tekshiring, so\'ng <a href="client-auth.html">kiring</a>.',
    submit_login:"Kirish", submit_signup:"Hisob yaratish",
    foot:'Sartaroshmisiz? <a href="barber-login.html">Bu yerdan kiring</a>' },
  ru:{ eyebrow:"Клиентам", tab_login:"Войти", tab_signup:"Регистрация",
    login_title:"С возвращением", signup_title:"Создайте аккаунт",
    l_email:"Email", l_password:"Пароль", l_name:"Полное имя", l_phone:"Номер телефона",
    err_login:"Неверный email или пароль.", err_signup:"Что-то пошло не так. Попробуйте снова.",
    check_email:'Аккаунт создан — проверьте почту, чтобы активировать его, затем <a href="client-auth.html">войдите</a>.',
    submit_login:"Войти", submit_signup:"Создать аккаунт",
    foot:'Вы барбер? <a href="barber-login.html">Войти здесь</a>' }
};
const browserLang = (navigator.language || 'en').slice(0,2);
const currentLang = I18N[browserLang] ? browserLang : 'en';
document.querySelectorAll('[data-i18n]').forEach(el=> el.textContent = I18N[currentLang][el.dataset.i18n]);
document.querySelectorAll('[data-i18n-html]').forEach(el=> el.innerHTML = I18N[currentLang][el.dataset.i18nHtml]);

document.querySelectorAll('.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.form-panel').forEach(p=>p.classList.toggle('active', p.dataset.panel === btn.dataset.tab));
  });
});

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  err.style.display = 'none';
  btn.disabled = true; const orig = btn.textContent; btn.textContent = '...';

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value.trim(),
    password: document.getElementById('loginPassword').value
  });

  btn.disabled = false; btn.textContent = orig;
  if(error){ err.style.display = 'block'; return; }
  window.location.href = 'client-dashboard.html';
});

document.getElementById('signupForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const form = this;
  const btn = document.getElementById('signupBtn');
  const err = document.getElementById('signupError');
  const info = document.getElementById('signupInfo');
  err.style.display = 'none';
  info.style.display = 'none';
  btn.disabled = true; const orig = btn.textContent; btn.textContent = '...';

  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const fullName = document.getElementById('signupName').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();

  const { data: authData, error: authError } = await supabaseClient.auth.signUp({
    email, password,
    options: { data: { role: 'client', full_name: fullName, phone: phone } }
  });
  btn.disabled = false; btn.textContent = orig;
  if(authError){
    err.textContent = authError.message || I18N[currentLang].err_signup;
    err.style.display = 'block';
    return;
  }
  if(authData.session){
    window.location.href = 'client-dashboard.html';
  } else {
    form.style.display = 'none';
    info.style.display = 'block';
  }
});

supabaseClient.auth.getSession().then(({ data })=>{
  if(data.session) window.location.href = 'client-dashboard.html';
});
</script>
</body>
</html>
