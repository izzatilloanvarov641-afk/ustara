<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ustara</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#12151C">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#F6F1E4; --surface:#ECE5D2; --line:#D8CFB8; --ink:#1C1A14; --ink-dim:#6B6455;
    --brass:#A9DB3A; --brass-soft:#CDFF5E; --dark-bg:#12151C; --on-dark:#F3EFE2; --on-dark-dim:#9AA0AD;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body{ height:100%; }
  body{
    background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:14px;
    max-width:480px; margin:0 auto;
  }
  a{ color:inherit; text-decoration:none; }

  .top-row{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 2px; }
  .logo{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:19px; }
  .logo em{ font-style:italic; color:var(--brass); }
  .launch-pill{
    display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:700;
    color:var(--ink-dim); background:var(--surface); border:1px solid var(--line);
    padding:6px 12px 6px 10px; border-radius:999px;
  }
  .launch-pill .dot{ width:6px; height:6px; border-radius:50%; background:var(--brass); flex-shrink:0; }

  /* ---- oval hero card: big radius, never touches the screen edges ---- */
  .hero-card{
    position:relative; border-radius:44px; overflow:hidden; flex:1;
    min-height:340px; background:var(--dark-bg); display:flex; flex-direction:column; justify-content:flex-end;
    padding:26px 26px 28px;
  }
  .hero-card__img{
    position:absolute; inset:0; background-image:url('https://images.pexels.com/photos/6487888/pexels-photo-6487888.jpeg?auto=compress&cs=tinysrgb&w=900');
    background-size:cover; background-position:center 30%; filter:grayscale(0.25) brightness(0.65);
  }
  .hero-card::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(18,21,28,0.05) 0%, rgba(18,21,28,0.15) 40%, rgba(18,21,28,0.92) 100%);
  }
  .hero-card__content{ position:relative; z-index:1; color:var(--on-dark); }
  .hero-card__title{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:clamp(26px,7vw,32px); line-height:1.12; margin-bottom:10px; }
  .hero-card__title em{ font-style:italic; color:var(--brass-soft); }
  .hero-card__lede{ font-size:13px; color:var(--on-dark-dim); line-height:1.55; max-width:34ch; }

  /* ---- short value-prop row: pill-shaped, oval mini-cards ---- */
  .props-row{ display:flex; gap:10px; }
  .prop-pill{
    flex:1; background:var(--surface); border:1px solid var(--line); border-radius:22px;
    padding:14px 10px; text-align:center;
  }
  .prop-pill .emoji{ font-size:20px; display:block; margin-bottom:6px; }
  .prop-pill .label{ font-size:11px; font-weight:600; color:var(--ink-dim); line-height:1.3; }

  /* ---- CTAs ---- */
  .choices{ display:flex; flex-direction:column; gap:10px; }
  .choice-btn{
    width:100%; padding:17px; border-radius:999px; font-size:14.5px; font-weight:700; cursor:pointer;
    border:none; text-align:center; transition:transform .12s cubic-bezier(.3,1.5,.5,1);
  }
  .choice-btn:active{ transform:scale(0.96); }
  .choice-btn.primary{ background:var(--brass); color:var(--ink); }
  .choice-btn.secondary{ background:var(--surface); color:var(--ink); border:1px solid var(--line); }

  .foot-link{ text-align:center; font-size:11px; color:var(--ink-dim); padding:2px 6px; }
  .foot-link a{ color:var(--ink); font-weight:600; text-decoration:underline; }

  .install-btn{
    display:none; width:100%; padding:14px; border-radius:999px; font-size:13px; font-weight:700;
    cursor:pointer; background:none; border:1.5px dashed var(--line); color:var(--ink-dim);
    align-items:center; justify-content:center; gap:8px; transition:transform .12s cubic-bezier(.3,1.5,.5,1), border-color .15s ease, color .15s ease;
  }
  .install-btn:active{ transform:scale(0.96); }
  .install-btn:hover{ border-color:var(--brass); color:var(--ink); }
</style>
</head>
<body>

<div class="top-row">
  <div class="logo">ust<em>a</em>ra</div>
  <span class="launch-pill"><span class="dot"></span><span id="launchPillText">Now live in Tashkent</span></span>
</div>

<div class="hero-card">
  <div class="hero-card__img"></div>
  <div class="hero-card__content">
    <div class="hero-card__title" id="heroTitle">Find your <em>barber.</em><br>Not just a shop.</div>
    <p class="hero-card__lede" id="heroLede">A barber's reputation belongs to the barber — portfolio, clients, and bookings that follow them.</p>
  </div>
</div>

<div class="props-row">
  <div class="prop-pill"><span class="emoji">🔍</span><span class="label" id="prop1">Browse real portfolios</span></div>
  <div class="prop-pill"><span class="emoji">📅</span><span class="label" id="prop2">Book in seconds</span></div>
  <div class="prop-pill"><span class="emoji">🔁</span><span class="label" id="prop3">Rebook your favorite</span></div>
</div>

<div class="choices">
  <a class="choice-btn primary" id="signupLink" href="auth.html?tab=signup">Create account</a>
  <a class="choice-btn secondary" id="loginLink" href="auth.html?tab=login">Sign in</a>
</div>

<a href="client-dashboard.html" id="guestLink" style="text-align:center; font-size:12.5px; color:var(--ink-dim); text-decoration:underline; padding:4px 6px;">Continue as a guest</a>

<button type="button" class="install-btn" id="installAppBtn">📲 <span id="installBtnText">Install app</span></button>

<div class="foot-link">
  <a href="terms.html" id="termsLink">Terms</a> &amp; <a href="privacy.html" id="privacyLink">Privacy</a>
</div>

<script>
const SUPABASE_URL = 'https://gbvfesorkmsxugpvcuqy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_k7wdvlBvnpPHPNCrl9i_eg_ktsfJAst';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const I18N = {
  en:{ launch:"Now live in Tashkent",
    heroTitle:'Find your <em>barber.</em><br>Not just a shop.',
    heroLede:"A barber's reputation belongs to the barber — portfolio, clients, and bookings that follow them.",
    prop1:"Browse real portfolios", prop2:"Book in seconds", prop3:"Rebook your favorite",
    signup:"Create account", login:"Sign in", guest:"Continue as a guest", terms:"Terms", privacy:"Privacy", install:"Install app" },
  uz:{ launch:"Toshkentda ishga tushdi",
    heroTitle:'<em>Sartaroshingizni</em> toping.<br>Shunchaki do\'kon emas.',
    heroLede:"Sartaroshning obro'si sartaroshning o'ziga tegishli — portfolio, mijozlar va bandlovlar u bilan boradi.",
    prop1:"Haqiqiy portfoliolarni ko'ring", prop2:"Soniyalarda band qiling", prop3:"Sevimlingizni qayta band qiling",
    signup:"Hisob yaratish", login:"Kirish", guest:"Mehmon sifatida davom etish", terms:"Shartlar", privacy:"Maxfiylik", install:"Ilovani o'rnatish" },
  ru:{ launch:"Уже работает в Ташкенте",
    heroTitle:'Найдите своего <em>барбера.</em><br>Не просто салон.',
    heroLede:"Репутация барбера принадлежит барберу — портфолио, клиенты и записи следуют за ним.",
    prop1:"Смотрите реальные портфолио", prop2:"Бронируйте за секунды", prop3:"Повторяйте у любимого барбера",
    signup:"Создать аккаунт", login:"Войти", guest:"Продолжить как гость", terms:"Условия", privacy:"Конфиденциальность", install:"Установить приложение" }
};

const storedLang = localStorage.getItem('ustara_lang');
const browserLang = (navigator.language || 'en').slice(0,2);
const lang = I18N[storedLang] ? storedLang : (I18N[browserLang] ? browserLang : 'en');
const dict = I18N[lang];
document.getElementById('launchPillText').textContent = dict.launch;
document.getElementById('heroTitle').innerHTML = dict.heroTitle;
document.getElementById('heroLede').textContent = dict.heroLede;
document.getElementById('prop1').textContent = dict.prop1;
document.getElementById('prop2').textContent = dict.prop2;
document.getElementById('prop3').textContent = dict.prop3;
document.getElementById('signupLink').textContent = dict.signup;
document.getElementById('loginLink').textContent = dict.login;
document.getElementById('guestLink').textContent = dict.guest;
document.getElementById('termsLink').textContent = dict.terms;
document.getElementById('privacyLink').textContent = dict.privacy;
document.getElementById('installBtnText').textContent = dict.install;
document.getElementById('htmlRoot').lang = lang;

// "Install app" — same beforeinstallprompt pattern as the desktop landing
// page, just shown here since this is the phone/app entry point.
let deferredInstallPrompt = null;
const installBtn = document.getElementById('installAppBtn');
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (installBtn && !isStandalone) installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
});

// "auto sign" lives here (the phone/app entry point) — if already logged
// in, skip straight to the right dashboard instead of showing the chooser
(async function checkExistingSession(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session) return;
  const userId = data.session.user.id;
  const { data: client } = await supabaseClient.from('clients').select('id').eq('id', userId).single();
  if(client){ window.location.replace('client-dashboard.html'); return; }
  const { data: barber } = await supabaseClient.from('barbers').select('id').eq('id', userId).single();
  if(barber){ window.location.replace('barber-dashboard.html'); return; }
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(console.warn);
    });
  }
</script>
</body>
</html>
