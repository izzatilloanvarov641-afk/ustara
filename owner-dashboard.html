<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ustara — Owner dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#12151C">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#F6F1E4; --surface:#ECE5D2; --surface-alt:#E3DAC4; --line:#D8CFB8;
    --ink:#1C1A14; --ink-dim:#6B6455;
    --dark-bg:#12151C; --dark-surface:#1B1F29; --dark-surface-2:#232838; --dark-line:#2B3140;
    --on-dark:#F3EFE2; --on-dark-dim:#9AA0AD;
    --gold:#A9DB3A; --gold-soft:#CDFF5E;
    --coral:#FF6A4D; --sky:#5B8DEF; --sun:#FFB84D;
    --success:#3D9E2F; --success-bg:#E4F5EE; --warning:#FFB84D; --warning-bg:#FBF1DF; --danger:#FF6A4D; --danger-bg:#FCEAEA;
    --r-card:16px; --r-btn:999px; --r-input:12px;
    --sh-soft:0 20px 50px rgba(28,26,20,0.06), 0 4px 12px rgba(28,26,20,0.04);
    --sh-dark:0 24px 60px rgba(0,0,0,0.45);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; background:var(--bg); }
  body{
    color:var(--ink); font-family:'IBM Plex Sans', sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(96px + env(safe-area-inset-bottom)); max-width:560px; margin:0 auto; min-height:100vh; position:relative;
  }
  a{ color:inherit; text-decoration:none; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  button{ font-family:'IBM Plex Sans', sans-serif; }
  button:active{ transform:scale(0.96); }
  button, .tap{ transition:transform .12s cubic-bezier(.3,1.5,.5,1), opacity .15s ease, background .15s ease, border-color .15s ease; }

  .view{ display:none; }
  .view.active{ display:block; position:relative; z-index:1; animation:fadein .45s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadein{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
  .wrap{ padding:0 20px; }
  .reveal{ opacity:0; transform:translateY(10px); transition:opacity .5s cubic-bezier(.2,.8,.2,1), transform .5s cubic-bezier(.2,.8,.2,1); }
  .reveal.in{ opacity:1; transform:none; }
  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1 !important; transform:none !important; transition:none !important; } }
  .letter{ display:inline-block; filter:blur(6px); opacity:0; transform:scale(1.15); transition:filter .4s ease, opacity .4s ease, transform .4s ease; }
  .letter.in{ filter:blur(0); opacity:1; transform:scale(1); }

  /* ================= HOME (dark hero) ================= */
  .home-dark{ background:var(--dark-bg); color:var(--on-dark); padding:22px 20px 30px; border-radius:0 0 36px 36px; margin-bottom:-20px; }
  .home-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; }
  .home-greeting{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:26px; line-height:1.15; }
  .eyebrow-gold{ font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-soft); font-weight:700; margin-bottom:10px; }

  .dark-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .dark-tile{ background:var(--dark-surface); border:1px solid var(--dark-line); border-radius:20px; padding:16px; }
  .tile-emoji{ width:30px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:14px; margin-bottom:8px; }
  .chipD-gold{ background:rgba(205,255,94,0.18); } .chipD-blue{ background:rgba(91,141,239,0.22); }
  .chipD-teal{ background:rgba(255,184,77,0.2); } .chipD-terracotta{ background:rgba(255,106,77,0.2); }
  .stat-dark-num{ font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:21px; color:var(--gold-soft); }
  .stat-dark-label{ font-size:11px; color:var(--on-dark-dim); font-weight:600; margin-top:2px; }

  .board-card{ background:var(--dark-surface); border:1px solid var(--dark-line); border-radius:20px; padding:16px; margin-bottom:14px; }
  .board-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .board-row{ display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid var(--dark-line); }
  .board-row:first-child{ border-top:none; }
  .board-rank{ width:22px; text-align:center; font-size:14px; flex-shrink:0; }
  .board-avatar{
    width:32px; height:32px; border-radius:50%; background:var(--dark-surface-2); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk', sans-serif; font-weight:600; color:var(--gold-soft); font-size:12px;
  }
  .board-avatar img{ width:100%; height:100%; object-fit:cover; }
  .board-name{ flex:1; font-size:12.5px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .board-value{ font-size:12px; color:var(--gold-soft); font-weight:700; font-family:'IBM Plex Mono', monospace; flex-shrink:0; }

  .chart-bars{ display:flex; align-items:flex-end; gap:6px; height:74px; margin-top:6px; }
  .chart-bar-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
  .chart-bar{ width:100%; max-width:22px; background:linear-gradient(180deg, var(--gold-soft), var(--gold)); border-radius:6px 6px 2px 2px; min-height:3px; transition:height .5s cubic-bezier(.2,.8,.2,1); }
  .chart-bar-label{ font-size:9px; color:var(--on-dark-dim); }

  .schedule-preview-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--dark-line); }
  .schedule-preview-row:first-child{ border-top:none; }
  .sp-time{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--gold-soft); font-weight:600; width:44px; flex-shrink:0; }
  .sp-info{ flex:1; min-width:0; }
  .sp-name{ font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sp-sub{ font-size:11px; color:var(--on-dark-dim); }

  /* ================= LIGHT SECTIONS ================= */
  section{ padding:26px 0 4px; }
  .section-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:19px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .st-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .see-all{ font-size:12px; color:var(--gold); font-weight:700; cursor:pointer; }
  .title-chip{ display:inline-flex; width:32px; height:32px; border-radius:999px; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .chip-gold{ background:var(--gold-soft); color:var(--ink); }
  .chip-blue{ background:var(--sky); color:#fff; }
  .chip-terracotta{ background:var(--coral); color:#fff; }
  .chip-teal{ background:var(--sun); color:var(--ink); }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:20px; box-shadow:var(--sh-soft); margin-bottom:16px; }
  .field-row{ display:flex; gap:10px; }
  input{ flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink); padding:12px 14px; border-radius:var(--r-input); font-size:14px; font-family:'IBM Plex Mono', monospace; letter-spacing:1px; text-transform:uppercase; }
  input:focus{ outline:none; border-color:var(--gold); }
  .btn{ padding:12px 18px; border-radius:var(--r-btn); font-size:13px; font-weight:700; cursor:pointer; border:none; background:var(--gold-soft); color:var(--ink); white-space:nowrap; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-ghost{ background:none; border:1px solid var(--line); color:var(--ink-dim); }
  .btn-ghost:hover{ border-color:var(--danger); color:var(--danger); }
  .link-msg{ font-size:12.5px; margin-top:10px; display:none; }
  .link-msg.ok{ color:var(--success); display:block; }
  .link-msg.err{ color:var(--danger); display:block; }

  .barber-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:16px; margin-bottom:12px;
    box-shadow:var(--sh-soft); display:flex; gap:12px; align-items:center; cursor:pointer;
  }
  .barber-avatar{
    width:48px; height:48px; border-radius:50%; background:var(--surface-alt); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk', sans-serif; font-weight:600; color:var(--gold); font-size:16px;
  }
  .barber-avatar img{ width:100%; height:100%; object-fit:cover; }
  .barber-info{ flex:1; min-width:0; }
  .barber-name{ font-weight:700; font-size:14.5px; }
  .barber-status{ font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; display:inline-block; margin-top:4px; }
  .barber-status.free{ background:var(--success-bg); color:var(--success); }
  .barber-status.busy{ background:var(--danger-bg); color:var(--danger); }
  .barber-mini-stats{ display:flex; gap:14px; margin-top:8px; flex-wrap:wrap; }
  .mini-stat{ font-size:11px; color:var(--ink-dim); }
  .mini-stat strong{ display:block; font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink); font-weight:600; }
  .barber-arrow{ color:var(--ink-dim); font-size:18px; flex-shrink:0; }

  .status-badge{ font-size:10px; padding:5px 11px; border-radius:20px; text-transform:capitalize; font-weight:700; }
  .status-badge.confirmed{ background:var(--success-bg); color:var(--success); }
  .status-badge.pending{ background:var(--warning-bg); color:var(--warning); }
  .status-badge.cancelled{ background:var(--danger-bg); color:var(--danger); }
  .status-badge.completed{ background:var(--surface-alt); color:var(--ink-dim); }
  .status-badge.no_show{ background:var(--danger-bg); color:var(--danger); }

  .schedule-row{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:14px 16px; margin-bottom:10px;
    box-shadow:var(--sh-soft); display:flex; align-items:center; gap:12px;
  }
  .sr-time{ font-family:'IBM Plex Mono', monospace; font-size:13px; font-weight:700; color:var(--gold); width:52px; flex-shrink:0; }
  .sr-info{ flex:1; min-width:0; }
  .sr-barber{ font-size:12.5px; font-weight:700; }
  .sr-client{ font-size:12px; color:var(--ink-dim); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .info-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:4px 20px; box-shadow:var(--sh-soft); margin-bottom:16px; }
  .info-row{ display:flex; justify-content:space-between; align-items:center; padding:17px 0; border-bottom:1px solid var(--line); font-size:14px; gap:12px; }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--ink-dim); font-weight:500; flex-shrink:0; }
  .info-row .v{ font-weight:700; }
  .info-row input{ text-align:right; text-transform:none; letter-spacing:normal; font-family:'IBM Plex Sans', sans-serif; padding:8px 10px; }

  .lang-row{ display:flex; gap:8px; margin-top:16px; }
  .lang-btn{ flex:1; padding:13px; border-radius:var(--r-input); border:1px solid var(--line); background:var(--surface); color:var(--ink-dim); font-size:13px; font-weight:700; cursor:pointer; }
  .lang-btn.active{ background:var(--gold-soft); border-color:var(--gold-soft); color:var(--ink); }
  .logout-btn{ width:100%; margin-top:24px; font-size:13.5px; color:var(--danger); background:var(--surface); border:1px solid var(--line); padding:16px; border-radius:var(--r-input); cursor:pointer; font-weight:700; }
  .logout-btn:hover{ background:var(--danger-bg); }

  .empty-state{ text-align:center; padding:40px 24px; border:1.5px dashed var(--line); border-radius:var(--r-card); color:var(--ink-dim); font-size:13.5px; }
  .empty-state .icon{ font-size:26px; margin:0 auto 14px; width:52px; height:52px; border-radius:50%; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; }
  .empty-state strong{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:17px; color:var(--ink); display:block; margin-bottom:4px; }

  /* ================= BARBER DETAIL MODAL ================= */
  .details-modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:none;
    align-items:flex-end; justify-content:center; backdrop-filter:blur(4px);
  }
  .details-modal-overlay.open{ display:flex; }
  .details-modal{
    background:var(--bg); border-radius:24px 24px 0 0; padding:24px 20px calc(28px + env(safe-area-inset-bottom));
    max-width:560px; width:100%; max-height:88vh; overflow-y:auto; position:relative; box-shadow:0 -20px 60px rgba(0,0,0,0.3);
  }
  .details-modal-close{
    position:absolute; top:14px; right:14px; background:var(--surface-alt); border:none; width:30px; height:30px;
    border-radius:50%; font-size:16px; color:var(--ink-dim); cursor:pointer; z-index:1;
  }
  .dm-head{ display:flex; align-items:center; gap:14px; margin-bottom:18px; padding-right:36px; }
  .dm-avatar{
    width:56px; height:56px; border-radius:50%; background:var(--surface-alt); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk', sans-serif; font-weight:600; color:var(--gold); font-size:19px;
  }
  .dm-avatar img{ width:100%; height:100%; object-fit:cover; }
  .dm-name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:18px; }
  .dm-status{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; display:inline-block; margin-top:4px; }
  .dm-status.free{ background:var(--success-bg); color:var(--success); }
  .dm-status.busy{ background:var(--danger-bg); color:var(--danger); }
  .dm-stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px; }
  .dm-stat{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:10px 8px; text-align:center; }
  .dm-stat-num{ font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px; color:var(--gold); }
  .dm-stat-label{ font-size:9.5px; color:var(--ink-dim); margin-top:2px; }
  .dm-section-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14px; margin:18px 0 10px; }
  .dm-chart-card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:4px; }
  .dm-chart-bars{ display:flex; align-items:flex-end; gap:6px; height:64px; margin-top:6px; }
  .dm-chart-bar-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
  .dm-chart-bar{ width:100%; max-width:20px; background:linear-gradient(180deg, var(--gold-soft), var(--gold)); border-radius:5px 5px 2px 2px; min-height:3px; }
  .dm-chart-bar-label{ font-size:8.5px; color:var(--ink-dim); }
  .dm-booking-row, .dm-review-row{
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:8px; font-size:12.5px;
  }
  .dm-booking-row .r1{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .dm-review-stars{ color:var(--gold); font-weight:700; }
  .dm-review-comment{ margin-top:4px; color:var(--ink-dim); font-style:italic; }
  .dm-unlink-btn{ width:100%; margin-top:8px; }

  /* ================= FLOATING BOTTOM NAV ================= */
  .bottom-nav{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    width:calc(100% - 32px); max-width:400px; background:rgba(20,20,20,0.85); backdrop-filter:blur(20px) saturate(1.6);
    border:1px solid rgba(255,255,255,0.08); border-radius:28px; display:flex; padding:10px 8px; z-index:50; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 4px;
    background:none; border:none; color:rgba(245,243,239,0.45); font-size:10px; font-weight:700; cursor:pointer; border-radius:16px;
  }
  .nav-btn.active{ color:var(--gold-soft); }
  .nav-btn svg{ width:20px; height:20px; }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div class="view active" data-view="home">
  <div class="home-dark">
    <div class="home-head">
      <div>
        <div class="eyebrow-gold">Ustara · Owner</div>
        <div class="home-greeting" id="greeting">Your shop</div>
      </div>
    </div>

    <div class="dark-grid" id="statTiles"></div>

    <div class="board-card">
      <div class="board-title">🏆 <span data-i18n="leaderboard_title">This month's leaderboard</span></div>
      <div id="leaderboardArea"></div>
    </div>

    <div class="board-card">
      <div class="board-title">📈 <span data-i18n="trend_title">Revenue, last 8 weeks</span></div>
      <div class="chart-bars" id="trendChart"></div>
    </div>

    <div class="board-card">
      <div class="board-title" style="justify-content:space-between;">
        <span>🗓️ <span data-i18n="today_title">Today</span></span>
        <span class="see-all" data-nav="schedule" data-i18n="see_all" style="color:var(--gold-soft);">See all</span>
      </div>
      <div id="todayPreview"></div>
    </div>
  </div>
</div>

<!-- ============ SCHEDULE ============ -->
<div class="view" data-view="schedule">
  <div class="wrap" style="padding-top:24px;">
    <div class="section-title"><span class="st-left"><span class="title-chip chip-gold">🗓️</span><span data-i18n="schedule_title">Today's schedule</span></span></div>
    <div id="scheduleArea"></div>
  </div>
</div>

<!-- ============ ROSTER ============ -->
<div class="view" data-view="roster">
  <div class="wrap" style="padding-top:24px;">
    <div class="section-title"><span class="st-left"><span class="title-chip chip-terracotta">💈</span><span data-i18n="roster_title">Your barbers</span></span></div>

    <div class="card">
      <div style="font-weight:700; font-size:14px; margin-bottom:4px;" data-i18n="link_title">Add a barber</div>
      <p style="font-size:12.5px; color:var(--ink-dim); margin-bottom:12px;" data-i18n="link_sub">Ask your barber for their code (Profile tab, "Shop owner code").</p>
      <div class="field-row">
        <input type="text" id="codeInput" maxlength="8" placeholder="ABCD1234">
        <button class="btn" id="linkBtn" data-i18n="link_btn">Link</button>
      </div>
      <div class="link-msg" id="linkMsg"></div>
    </div>

    <div id="rosterArea"></div>
  </div>
</div>

<!-- ============ ACCOUNT ============ -->
<div class="view" data-view="account">
  <div class="wrap" style="padding-top:24px;">
    <div class="section-title"><span class="st-left"><span class="title-chip chip-gold">👤</span><span data-i18n="account_title">Account</span></span></div>
    <div class="info-card">
      <div class="info-row"><span class="k" data-i18n="l_owner_name">Name</span><span class="v" id="ownerNameView"></span></div>
      <div class="info-row">
        <span class="k" data-i18n="l_shop_name">Shop name</span>
        <input type="text" id="shopNameInput" style="max-width:160px;">
      </div>
      <div class="info-row"><span class="v" id="saveShopMsg" style="color:var(--success); font-weight:600; font-size:12px; display:none;"></span>
        <button class="btn" id="saveShopBtn" data-i18n="save_btn" style="margin-left:auto;">Save</button>
      </div>
    </div>

    <div class="section-title" style="margin-top:30px;"><span class="st-left"><span class="title-chip chip-blue">🌐</span><span data-i18n="language_title">Language</span></span></div>
    <div class="info-card" style="padding:18px 20px;">
      <div class="lang-row" id="langSwitch">
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="uz">UZ</button>
        <button type="button" class="lang-btn" data-lang="ru">RU</button>
      </div>
    </div>

    <button class="logout-btn" id="logoutBtn" data-i18n="logout">Log out</button>
  </div>
</div>

<!-- ============ BARBER DETAIL MODAL ============ -->
<div class="details-modal-overlay" id="barberModalOverlay">
  <div class="details-modal">
    <button class="details-modal-close">&times;</button>
    <div id="barberModalBody"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    <span data-i18n="nav_home">Home</span>
  </button>
  <button class="nav-btn" data-view="schedule">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
    <span data-i18n="nav_schedule">Schedule</span>
  </button>

let currentLang = I18N[localStorage.getItem('ustara_lang')] ? localStorage.getItem('ustara_lang') : 'en';
function t(key){ return I18N[currentLang][key]; }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function formatPrice(n){ return n ? Number(n).toLocaleString('en-US').replace(/,/g,' ') + ' UZS' : '0 UZS'; }
function avatarFor(b){
  const initials = (b.full_name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return b.avatar_url ? `<img src="${escapeHtml(b.avatar_url)}" alt="">` : initials;
}

function letterReveal(el, text, startDelay){
  if(!el) return;
  startDelay = startDelay || 0;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){ el.textContent = text; return; }
  el.innerHTML = '';
  [...text].forEach((ch, i)=>{
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = ch === ' ' ? ' ' : ch;
    span.style.animationDelay = (startDelay + i * 22) + 'ms';
    el.appendChild(span);
  });
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    el.querySelectorAll('.letter').forEach(s => s.classList.add('in'));
  }));
}
function revealNow(container){
  (container ? container.querySelectorAll('.reveal') : document.querySelectorAll('.reveal')).forEach((el, i)=>{
    setTimeout(()=> el.classList.add('in'), i * 60);
  });
}

function applyLang(lang){
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(I18N[lang][el.dataset.i18n] !== undefined) el.textContent = I18N[lang][el.dataset.i18n];
  });
  document.querySelectorAll('#langSwitch .lang-btn').forEach(b=> b.classList.toggle('active', b.dataset.lang === lang));
  document.getElementById('htmlRoot').lang = lang;
  if(ownerData) render();
}
document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('.lang-btn');
  if(btn){ localStorage.setItem('ustara_lang', btn.dataset.lang); applyLang(btn.dataset.lang); }
});

function goToView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === name));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  window.scrollTo({ top:0, behavior:'smooth' });
  const view = document.querySelector(`.view[data-view="${name}"]`);
  requestAnimationFrame(()=> requestAnimationFrame(()=> revealNow(view)));
}
document.getElementById('bottomNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-btn');
  if(btn) goToView(btn.dataset.view);
});

let ownerData = null;
let barbersData = [];
let bookingsByBarber = {};
let reviewsByBarber = {};

async function init(){
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if(!sessionData.session){ window.location.href = 'auth.html'; return; }
  const userId = sessionData.session.user.id;

  const { data: owner, error } = await supabaseClient.from('owners').select('*').eq('id', userId).single();
  if(error || !owner){
    document.body.innerHTML = '<p style="padding:40px; font-family:sans-serif;">Could not load your account. Please contact support.</p>';
    return;
  }
  ownerData = owner;

  applyLang(currentLang);
  await loadRoster();
  revealNow();
}

async function loadRoster(){
  const { data: barbers } = await supabaseClient.from('barbers').select('*').eq('owner_id', ownerData.id).order('created_at', { ascending:true });
  barbersData = barbers || [];
  if(barbersData.length === 0){ bookingsByBarber = {}; reviewsByBarber = {}; render(); return; }

  const barberIds = barbersData.map(b => b.id);
  const { data: bookings } = await supabaseClient.from('bookings').select('*').in('barber_id', barberIds);
  const { data: reviews } = await supabaseClient.from('reviews').select('*').in('barber_id', barberIds);

  bookingsByBarber = {};
  (bookings || []).forEach(b => { (bookingsByBarber[b.barber_id] = bookingsByBarber[b.barber_id] || []).push(b); });
  reviewsByBarber = {};
  (reviews || []).forEach(r => { (reviewsByBarber[r.barber_id] = reviewsByBarber[r.barber_id] || []).push(r); });

  render();
}

function barberStats(barberId){
  const bookings = bookingsByBarber[barberId] || [];
  const reviews = reviewsByBarber[barberId] || [];
  const completed = bookings.filter(b => b.status === 'completed');
  const revenue = completed.reduce((s,b) => s + (b.service_price || 0), 0);
  const rating = reviews.length ? (reviews.reduce((s,r) => s + r.rating, 0) / reviews.length) : null;
  const now = new Date();
  const isBusy = bookings.some(b => {
    if(b.status !== 'confirmed') return false;
    const start = new Date(b.start_time);
    const end = new Date(start.getTime() + (b.service_duration_minutes || 30) * 60000);
    return now >= start && now <= end;
  });
  const todayCount = bookings.filter(b => {
    if(b.status === 'cancelled') return false;
    return new Date(b.start_time).toDateString() === now.toDateString();
  }).length;
  const monthRevenue = completed
    .filter(b => { const d = new Date(b.completed_at || b.start_time); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); })
    .reduce((s,b) => s + (b.service_price || 0), 0);
  return { completedCount: completed.length, revenue, rating, isBusy, todayCount, monthRevenue };
}

// rolling 7-day buckets, oldest first, for a barber (or all linked barbers combined if barberId is null)
function weeklyRevenueTrend(barberId){
  const now = new Date();
  const bookings = barberId
    ? (bookingsByBarber[barberId] || [])
    : Object.values(bookingsByBarber).flat();
  const completed = bookings.filter(b => b.status === 'completed');
  const buckets = [];
  for(let i = 7; i >= 0; i--){
    const end = new Date(now.getTime() - i * 7 * 86400000);
    const start = new Date(end.getTime() - 7 * 86400000);
    const value = completed
      .filter(b => { const d = new Date(b.completed_at || b.start_time); return d > start && d <= end; })
      .reduce((s,b) => s + (b.service_price || 0), 0);
    buckets.push({ label: `${end.getMonth()+1}/${end.getDate()}`, value });
  }
  return buckets;
}

function renderChart(buckets, containerId, barClass, labelClass){
  const max = Math.max(...buckets.map(b => b.value), 1);
  document.getElementById(containerId).innerHTML = buckets.map(b => `
    <div class="${containerId === 'trendChart' ? 'chart-bar-wrap' : 'dm-chart-bar-wrap'}">
      <div class="${barClass}" style="height:${Math.max((b.value / max) * 100, 3)}%" title="${formatPrice(b.value)}"></div>
      <div class="${labelClass}">${b.label}</div>
    </div>
  `).join('');
}

function render(){
  document.getElementById('greeting').textContent = ownerData.shop_name || t('account_title');
  document.getElementById('ownerNameView').textContent = ownerData.full_name || '—';
  document.getElementById('shopNameInput').value = ownerData.shop_name || '';

  const perBarber = barbersData.map(b => ({ barber: b, stats: barberStats(b.id) }));
  const totalRevenue = perBarber.reduce((s,x) => s + x.stats.revenue, 0);
  const totalCuts = perBarber.reduce((s,x) => s + x.stats.completedCount, 0);
  const ratedOnes = perBarber.filter(x => x.stats.rating !== null);
  const avgRating = ratedOnes.length ? (ratedOnes.reduce((s,x) => s + x.stats.rating, 0) / ratedOnes.length) : null;

  document.getElementById('statTiles').innerHTML = `
    <div class="dark-tile"><div class="tile-emoji chipD-blue">💈</div><div class="stat-dark-num">${barbersData.length}</div><div class="stat-dark-label">${t('stat_barbers')}</div></div>
    <div class="dark-tile"><div class="tile-emoji chipD-gold">💰</div><div class="stat-dark-num">${formatPrice(totalRevenue)}</div><div class="stat-dark-label">${t('stat_revenue')}</div></div>
    <div class="dark-tile"><div class="tile-emoji chipD-teal">✂️</div><div class="stat-dark-num">${totalCuts}</div><div class="stat-dark-label">${t('stat_cuts')}</div></div>
    <div class="dark-tile"><div class="tile-emoji chipD-terracotta">⭐</div><div class="stat-dark-num">${avgRating !== null ? avgRating.toFixed(1) : '—'}</div><div class="stat-dark-label">${t('stat_rating')}</div></div>
  `;

  // ---------- leaderboard (this month's revenue) ----------
  const ranked = [...perBarber].sort((a,b) => b.stats.monthRevenue - a.stats.monthRevenue).filter(x => x.stats.monthRevenue > 0);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('leaderboardArea').innerHTML = ranked.length === 0
    ? `<div style="font-size:12px; color:var(--on-dark-dim);">${t('empty_leaderboard')}</div>`
    : ranked.slice(0,5).map((x,i) => `
      <div class="board-row">
        <div class="board-rank">${medals[i] || (i+1)}</div>
        <div class="board-avatar">${avatarFor(x.barber)}</div>
        <div class="board-name">${escapeHtml(x.barber.full_name)}</div>
        <div class="board-value">${formatPrice(x.stats.monthRevenue)}</div>
      </div>
    `).join('');

  // ---------- shop-wide revenue trend ----------
  renderChart(weeklyRevenueTrend(null), 'trendChart', 'chart-bar', 'chart-bar-label');

  // ---------- today preview (home) ----------
  const now = new Date();
  const todayAll = Object.values(bookingsByBarber).flat()
    .filter(b => b.status !== 'cancelled' && new Date(b.start_time).toDateString() === now.toDateString())
    .sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
  document.getElementById('todayPreview').innerHTML = todayAll.length === 0
    ? `<div style="font-size:12px; color:var(--on-dark-dim);">${t('empty_schedule')}</div>`
    : todayAll.slice(0,3).map(b => {
      const barber = barbersData.find(x => x.id === b.barber_id);
      return `
        <div class="schedule-preview-row">
          <div class="sp-time">${new Date(b.start_time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}</div>
          <div class="sp-info">
            <div class="sp-name">${escapeHtml(b.client_name || '—')}</div>
            <div class="sp-sub">${escapeHtml(barber ? barber.full_name : '')}${b.service_label ? ' · ' + escapeHtml(b.service_label) : ''}</div>
          </div>
        </div>`;
    }).join('');

  // ---------- schedule tab (full today's agenda) ----------
  const scheduleArea = document.getElementById('scheduleArea');
  if(todayAll.length === 0){
    scheduleArea.innerHTML = `<div class="empty-state"><div class="icon">🗓️</div><strong>${t('empty_schedule')}</strong></div>`;
  } else {
    scheduleArea.innerHTML = todayAll.map(b => {
      const barber = barbersData.find(x => x.id === b.barber_id);
      return `
        <div class="schedule-row">
          <div class="sr-time">${new Date(b.start_time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}</div>
          <div class="sr-info">
            <div class="sr-barber">${escapeHtml(barber ? barber.full_name : '—')}</div>
            <div class="sr-client">${escapeHtml(b.client_name || '—')}${b.service_label ? ' · ' + escapeHtml(b.service_label) : ''}</div>
          </div>
          <span class="status-badge ${b.status}">${b.status}</span>
        </div>`;
    }).join('');
  }

  // ---------- roster tab ----------
  const rosterArea = document.getElementById('rosterArea');
  if(perBarber.length === 0){
    rosterArea.innerHTML = `<div class="empty-state"><div class="icon">💈</div><strong>${t('empty_roster')}</strong></div>`;
  } else {
    rosterArea.innerHTML = perBarber.map(({ barber: b, stats: s }) => `
      <div class="barber-card" data-open-barber="${b.id}">
        <div class="barber-avatar">${avatarFor(b)}</div>
        <div class="barber-info">
          <div class="barber-name">${escapeHtml(b.full_name)}</div>
          <span class="barber-status ${s.isBusy ? 'busy' : 'free'}">${s.isBusy ? t('status_busy') : t('status_free')}</span>
          <div class="barber-mini-stats">
            <div class="mini-stat"><strong>${s.todayCount}</strong>${t('mini_today')}</div>
            <div class="mini-stat"><strong>${s.completedCount}</strong>${t('mini_cuts')}</div>
            <div class="mini-stat"><strong>${s.rating !== null ? s.rating.toFixed(1) + ' ★' : '—'}</strong>${t('mini_rating')}</div>
          </div>
        </div>
        <span class="barber-arrow">›</span>
      </div>
    `).join('');
    rosterArea.querySelectorAll('[data-open-barber]').forEach(card=>{
      card.addEventListener('click', ()=> openBarberDetail(card.dataset.openBarber));
    });
  }
}

function openBarberDetail(barberId){
  const barber = barbersData.find(b => b.id === barberId);
  if(!barber) return;
  const s = barberStats(barberId);
  const bookings = (bookingsByBarber[barberId] || []).slice().sort((a,b) => new Date(b.start_time) - new Date(a.start_time));
  const reviews = (reviewsByBarber[barberId] || []).slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  document.getElementById('barberModalBody').innerHTML = `
    <div class="dm-head">
      <div class="dm-avatar">${avatarFor(barber)}</div>
      <div>
        <div class="dm-name">${escapeHtml(barber.full_name)}</div>
        <span class="dm-status ${s.isBusy ? 'busy' : 'free'}">${s.isBusy ? t('status_busy') : t('status_free')}</span>

      <div class="dm-stat"><div class="dm-stat-num">${formatPrice(s.revenue)}</div><div class="dm-stat-label">${t('mini_revenue')}</div></div>
      <div class="dm-stat"><div class="dm-stat-num">${s.rating !== null ? s.rating.toFixed(1) + ' ★' : '—'}</div><div class="dm-stat-label">${t('mini_rating')}</div></div>
    </div>

    <div class="dm-section-title">📈 ${t('dm_trend_title')}</div>
    <div class="dm-chart-card"><div class="dm-chart-bars" id="dmChart"></div></div>

    <div class="dm-section-title">🗓️ ${t('dm_bookings_title')}</div>
    ${bookings.length === 0 ? `<div style="font-size:12px; color:var(--ink-dim);">${t('empty_dm_bookings')}</div>` : bookings.slice(0,6).map(b => `
      <div class="dm-booking-row">
        <div class="r1">
          <span>${escapeHtml(b.client_name || '—')}${b.service_label ? ' · ' + escapeHtml(b.service_label) : ''}</span>

      <div class="dm-review-row">
        <span class="dm-review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
        <div class="dm-review-comment">${r.comment ? escapeHtml(r.comment) : t('no_comment')}</div>
      </div>
    `).join('')}

    <button class="btn btn-ghost dm-unlink-btn" id="dmUnlinkBtn" data-id="${barber.id}">${t('unlink_btn')}</button>
  `;
  renderChart(weeklyRevenueTrend(barberId), 'dmChart', 'dm-chart-bar', 'dm-chart-bar-label');

    e.target.disabled = true;
    const { error } = await supabaseClient.rpc('unlink_barber_from_owner', { p_barber_id: barberId });
    if(error) console.error('Unlink failed:', error);
    closeBarberDetail();
    await loadRoster();
  });
  document.getElementById('barberModalOverlay').classList.add('open');
}
function closeBarberDetail(){ document.getElementById('barberModalOverlay').classList.remove('open'); }
document.querySelector('#barberModalOverlay .details-modal-close').addEventListener('click', closeBarberDetail);
document.getElementById('barberModalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'barberModalOverlay') closeBarberDetail();
});

document.getElementById('linkBtn').addEventListener('click', async ()=>{
  const input = document.getElementById('codeInput');
  const code = input.value.trim();
  const msg = document.getElementById('linkMsg');
  msg.className = 'link-msg';
  if(!code) return;
  const btn = document.getElementById('linkBtn');
  btn.disabled = true;
  const { data, error } = await supabaseClient.rpc('link_barber_to_owner', { p_code: code });
  btn.disabled = false;
  if(error){ msg.className = 'link-msg err'; msg.textContent = t('link_error'); return; }
  if(data === 'ok'){
    msg.className = 'link-msg ok'; msg.textContent = t('link_ok');
    input.value = '';
    await loadRoster();
  } else if(data === 'not_found'){
    msg.className = 'link-msg err'; msg.textContent = t('link_not_found');
  } else if(data === 'already_linked'){
    msg.className = 'link-msg err'; msg.textContent = t('link_already');
  }
});

document.getElementById('saveShopBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('saveShopBtn');
  const msg = document.getElementById('saveShopMsg');
  btn.disabled = true;
  const shopName = document.getElementById('shopNameInput').value.trim();
  const { error } = await supabaseClient.from('owners').update({ shop_name: shopName || null }).eq('id', ownerData.id);
  btn.disabled = false;
  if(error){ console.error('Failed to save shop name:', error); return; }
  ownerData.shop_name = shopName;
  document.getElementById('greeting').textContent = shopName || t('account_title');
  msg.style.display = 'inline';
  msg.textContent = t('saved');
  setTimeout(()=> msg.style.display = 'none', 1800);
});

init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(console.warn);
  });
}
</script>
</body>
</html>
